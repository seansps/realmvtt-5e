<script>
	// Convert 5e formatted damage strings to string Realm VTT needs such as 1d4 piercing + 3 piercing + 2d6 poison (converted from (1d4 + 3) piercing damage plus (2d6) poison damage)
	function getDamage(description) {
		const damagePattern = /(\d+) \((\d+d\d+)(?:\s*([-+])\s*(\d+))?\) (\w+) damage/gi;
		let match;
		let damageString = '';

		while ((match = damagePattern.exec(description)) !== null) {
			const [, , dice, math, bonus, type] = match;
			const typeLower = type.toLowerCase();
			if (math) {
				damageString += `${dice} ${typeLower} ${math} ${bonus} ${typeLower} + `;
			} else {
				damageString += `${dice} ${typeLower} + `;
			}
		}

		// Remove trailing ' + ' if present
		damageString = damageString.replace(/ \+ $/, '');
		return damageString;
	}

	function updateSettings(description) {
		// Here we parse the description to extract the settings for an NPC action to try to set them automatically
		// e.g. Melee Attack Roll: +5, reach 5 ft. Hit: 7 (1d8 + 3) Piercing damage plus 7 (2d6) Poison damage.
		const actionDataPath = dataPath.replace('.data.description', '');
		const valuesToSet = {};
		const isAttack = description.toLowerCase().includes('attack roll');
		const isRanged = description.toLowerCase().includes('ranged attack roll');

		if (isAttack || isRanged) {
			valuesToSet[`${actionDataPath}.data.isAttack`] = isAttack;
			valuesToSet[`${actionDataPath}.data.isRanged`] = isRanged;

			// Extract attack to hit
			const attackMod = parseInt(description.match(/Attack Roll: ([+-]?\d+)/)?.[1] || '0', 10);
			valuesToSet[`${actionDataPath}.data.attackMod`] = attackMod;

			// Extract damage components
			const damageString = getDamage(description);
			valuesToSet[`${actionDataPath}.data.damage`] = damageString;

			if (isRanged) {
				// Extract normal and max range (e.g. Ranged Attack Roll: +5, range 80/320 ft.)
				const rangeMatch = description.match(/range\s+(\d+)\s*\/\s*(\d+)/);
				if (rangeMatch) {
					valuesToSet[`${actionDataPath}.data.normalRange`] = parseInt(rangeMatch[1], 10);
					valuesToSet[`${actionDataPath}.data.maxRange`] = parseInt(rangeMatch[2], 10);
				}
			}

			// If these are set, we also need to show the damage/attack buttons
			valuesToSet[`${actionDataPath}.fields.rollAttackBtn.hidden`] = false;
			valuesToSet[`${actionDataPath}.fields.rollDamageBtn.hidden`] = false;
			valuesToSet[`${actionDataPath}.fields.rollCriticalBtn.hidden`] = false;
		}
		else {
			valuesToSet[`${actionDataPath}.fields.rollAttackBtn.hidden`] = true;
			valuesToSet[`${actionDataPath}.fields.rollDamageBtn.hidden`] = true;
			valuesToSet[`${actionDataPath}.fields.rollCriticalBtn.hidden`] = true;
		}

		const isSave = description.toLowerCase().includes('save');
		const isRecharge = description.toLowerCase().includes('recharge');
		const isSpellcasting = description.toLowerCase().includes('spellcasting');

		if (Object.keys(valuesToSet).length > 0) {
			api.setValues(valuesToSet);
		}
	}

	function onAttackChange(isAttack) {
		const valuesToSet = {};
		const actionDataPath = dataPath.replace('.data.isAttack', '');

		valuesToSet[`${actionDataPath}.fields.rollAttackBtn.hidden`] = !isAttack;
		valuesToSet[`${actionDataPath}.fields.rollDamageBtn.hidden`] = !isAttack;
		valuesToSet[`${actionDataPath}.fields.rollCriticalBtn.hidden`] = !isAttack;

		api.setValues(valuesToSet);
	}

	function showHideSpellcasting(isSpellcasting) {
		const spellListDataPath = dataPath.replace('.data.isSpellcasting', '.fields.spells.hidden');
		api.setValue(spellListDataPath, !isSpellcasting);
	}

	// Roll Attack
	function handleAttack() {
		const attackDataPath = dataPath.replace('.data.rollAttackBtn', '');
		const attack = api.getValue(attackDataPath);

		let name = attack?.name || 'New Attack';

		const attackMod = parseInt(attack?.data?.attackMod || '0', 10);

		const atkRoll = '1d20';
		const modifiers = getEffectsAndModifiers(['attackBonus', 'attackPenalty'], undefined, attack._id);

		let ranged = attack?.data?.isRanged || false;

		// Add the modifier to the modifiers array
		if (attackMod !== 0) {
			modifiers.push({
				name: 'Attack Modifier',
				value: attackMod,
				active: true
			});
		}

		let icon = 'IconSword';
		if (ranged) {
			icon = 'IconBow';
		}

		const normalRange = parseInt(attack?.data?.normalRange || '0', 10);
		const maxRange = parseInt(attack?.data?.maxRange || '0', 10);

		// If ranged, you have Disadvantage on the roll if you are within 5 feet of an enemy who can see you and doesn’t have the Incapacitated condition
		// Get range to all other tokens
		let disDueToProximity = false;
		const ourToken = api.getToken();
		if (ranged && ourToken) {
			api.getOtherTokens().forEach(token => {
				if (disDueToProximity) {
					// Short circuit if we already have disadvantage due to proximity
					return;
				}
				if (token?.faction !== 'neutral' && token?.faction !== ourToken?.faction) {
					// Check if they have incapacitated condition
					const hasIncapacitated = (token?.effects || []).some(eff => eff.name === 'Incapacitated');
					if (!hasIncapacitated) {
						// Check distance
						const distance = api.getDistance(ourToken, token);
						if (distance <= 5) {
							disDueToProximity = true;
						}
					}
				}
			});
		}

		let damage = attack?.data?.damage || '1';

		let damageModifiers = getEffectsAndModifiers(['damageBonus', 'damagePenalty'], undefined, attack._id);
		// Get the default damage type of the attack and apply that to damage modifiers that have no type
		const damageType = getDamageType(damage);
		damageModifiers = damageModifiers.map(mod => {
			const modType = getDamageType(mod?.value?.toString() || '');
			const type = modType === 'untyped' ? mod?.type || damageType : '';
			return {
				...mod,
				type: type
			}
		});

		if (disDueToProximity) {
			modifiers.push({
				name: 'Enemy is Within 5 Feet',
				value: 'disadvantage',
				active: true
			});
		}

		const targets = api.getTargets();
		targets.forEach(target => {
			// Get calculated AC from modifiers - use if any
			const targetAc = getArmorClassForToken(target?.token);
			const targetName = target?.token?.identified === false ? target?.token?.record?.unidentifiedName : target?.token?.record?.name;
			const targetDistance = target?.distance || 0;

			// If the target is beyond normal range, and normal range is > 0, add a disadvantage modifier
			// and if it was greater than the max, make it apparent in the roll prompt
			if (ranged && targetDistance > maxRange && maxRange > 0) {
				modifiers.push({
					name: 'Target is Beyond Max Range',
					value: 'disadvantage',
					active: true
				});
			}
			else if (ranged && targetDistance > normalRange && normalRange > 0) {
				modifiers.push({
					name: 'Target is Beyond Normal Range',
					value: 'disadvantage',
					active: true
				});
			}

			const diceRoll = '1d20';
			const metadata = {
				"rollName": 'Attack',
				"attack": `${name}`,
				"icon": icon,
				"targetName": targetName,
				"tooltip": `Attack Roll for ${name}`,
				"dc": targetAc,
				"damage": damage,
				"damageModifiers": damageModifiers,
			}
			api.promptRoll(`${name} Attack`, diceRoll, modifiers, metadata, 'attack');
		});

		if (!targets.length) {
			const diceRoll = '1d20';
			const metadata = {
				"rollName": 'Attack',
				"attack": `${name}`,
				"icon": icon,
				"tooltip": `Attack Roll for ${name}`,
				"dc": 0,
				"damage": damage,
				"damageModifiers": damageModifiers,
			}
			api.promptRoll(`Attack ${name}`, diceRoll, modifiers, metadata, 'attack');
		}
	}

	function rollDamage(isCritical) {
		const attackDataPath = isCritical ? dataPath.replace('.data.rollCriticalBtn', '') : dataPath.replace('.data.rollDamageBtn', '');
		const attack = api.getValue(attackDataPath);

		let name = attack?.name || 'New Attack';
		let ranged = attack?.data?.isRanged || false;


		let damage = attack?.data?.damage || '1';

		if (isCritical) {
			damage = doubleDamageDice(damage);
		}

		let damageModifiers = getEffectsAndModifiers(['damageBonus', 'damagePenalty'], undefined, attack._id);
		// Get the default damage type of the attack and apply that to damage modifiers that have no type
		const damageType = getDamageType(damage);
		damageModifiers = damageModifiers.map(mod => {
			const modType = getDamageType(mod?.value?.toString() || '');
			const type = modType === 'untyped' ? mod?.type || damageType : '';
			return {
				...mod,
				value: isCritical ? doubleDamageDice(mod.value) : mod.value,
				type: type
			}
		});

		const damageMetadata = {
			// This is so that our damage handler script can tell if it was from a critical hit
			// And is set if the Attack Roll was a critical hit, but not in the case of using the Damage Button
			"critical": isCritical,
		}

		api.promptRoll(`${name} Damage`, damage, damageModifiers, damageMetadata, 'damage')
	}
</script>

<div style='width: 100%'>

	<!-- Name and Buttons -->
	<div style='display: flex; flex-direction: row; gap: 4px;'>
		<namefield size='xs' width='100%' field="namefield" placeholder='Enter Name...' variant="unstyled"></namefield>
		<!-- Roll Attack -->
		<iconbutton hidden="true" size="md" field="rollAttackBtn" variant="outline"
			options='[{"icon": "D20", "label": "Roll Attack", "value": "roll"}]' onchange='() => { }'
			onclick='handleAttack();'>
		</iconbutton>
		<div>
			<!-- Roll Damage -->
			<button hidden="true" size="xs" radius="xs" field="rollDamageBtn" label="Damage" variant='light'
				onclick='rollDamage(false);'></button>
		</div>
		<!-- Roll Crit -->
		<div>
			<button hidden="true" size="xs" radius="xs" field="rollCriticalBtn" label="Critical" variant='light' color="red"
				onclick='rollDamage(true);'></button>
		</div>
	</div>

	<!-- Description -->
	<stringfield size='xs' width='100%' field="description" placeholder='Enter Description...'
		onchange="updateSettings(value);" multiline='true' maxrows='6'></stringfield>

	<!-- Settings -->
	<accordion hideonlocked='true' field='settingsAccordion' label='Settings' size="xs">
		<div style='display: flex; flex-direction: row; gap: 8px; align-items: flex-start'>
			<div style='display: flex; flex-direction: column; gap: 4px;'>
				<checkbox field='isAttack' label='Is Attack' size='sm' textalign="left" onchange='onAttackChange(value);'>
				</checkbox>
				<checkbox field='isRanged' label='Is Ranged' size='sm' textalign="left" onchange=''></checkbox>
			</div>
			<numberfield showsign="true" field='normalRange' label='Normal Range' width="80px" size='xs' placeholder='0'>
			</numberfield>
			<numberfield showsign="true" field='maxRange' label='Max Range' width="80px" size='xs' placeholder='0'>
			</numberfield>
		</div>
		<numberfield showsign="true" field='attackMod' label='Attack Modifier' size='xs' width='200px' placeholder='+0'>
		</numberfield>
		<div style='display: flex; flex-direction: row; gap: 8px; align-items: flex-end'>
			<stringfield field='damage' label='Damage' size='xs' width='200px' placeholder='Enter Damage...'></stringfield>
			<stringfield field='healing' label='Healing' size='xs' width='200px' placeholder='Enter Healing...'></stringfield>
		</div>
		<div style='display: flex; flex-direction: row; gap: 8px; margin-top: 8px; align-items: flex-end'>
			<checkbox field='isSave' label='Is Save' size='sm' textalign="left"></checkbox>
			<numberfield field='saveDC' size='xs' width='100px' placeholder='Enter DC...'></numberfield>
			<dropdown size='xs' width="250px" field='savingThrows' placeholder='Select up to 2 Saving Throws...'
				multiselect='2'
				options='[{"label": "Strength", "value": "strength"}, {"label": "Dexterity", "value": "dexterity"}, {"label": "Constitution", "value": "constitution"}, {"label": "Intelligence", "value": "intelligence"}, {"label": "Wisdom", "value": "wisdom"}, {"label": "Charisma", "value": "charisma"}]'>
			</dropdown>
		</div>
		<div style='display: flex; flex-direction: row; gap: 8px; margin-top: 8px; align-items: flex-end'>
			<checkbox field='isRecharge' label='Is Recharge' size='sm' textalign="left"></checkbox>
			<stringfield field='recharge' size='xs' width='150px' placeholder='Enter Recharge Range...'></stringfield>
		</div>
		<div style='display: flex; flex-direction: row; gap: 8px; margin-top: 8px; align-items: flex-end'>
			<checkbox field='isSpellcasting' label='Is Spellcasting' size='sm' textalign="left"
				onchange='showHideSpellcasting(value);'></checkbox>
			<numberfield width="150px" field="spellDC" label="Spellcasting DC" placeholder='N/A' size='xs'
				description="The DC used for Saves against this NPC's Spells">
			</numberfield>
			<numberfield width="150px" field="spellDCBonus" label="Spell Casting Modifier" placeholder='N/A' showsign="true"
				size='xs' description="The modifier used for this NPC's Spell Attack Rolls">
			</numberfield>
		</div>
	</accordion>

	<!-- Spellcasting -->
	<div style='width: 100%'>
		<list hidden="true" listtype="npc_spell_list" field='spells'></list>
	</div>
</div>
