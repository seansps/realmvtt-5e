<div style="border-bottom: 1px solid var(--mantine-color-default-border)">
  <accordion
    size="xs"
    field="descriptionOpen"
    label="Description"
    variant="minimal"
  >
    <accordion.control>
      <div style="display: column; gap: 2px; width: 100%">
        <div style="display: flex; gap: 2px; width: 100%; align-items: center">
          <div
            style="width: 30px; height: 30px; min-width: 30px; min-height: 30px"
          >
            <portrait width="30px" height="30px" field="portrait"></portrait>
          </div>
          <label size="xs" variant="bold" field="namefield"></label>
        </div>
      </div>
    </accordion.control>
    <richtextfield
      disablecontrols="true"
      field="description"
      placeholder="Enter description..."
    ></richtextfield>
  </accordion>
</div>
