<accordion
  size="xs"
  variant="default"
  field="descriptionAcc"
  label="Description"
>
  <accordion.control>
    <div
      style="min-height: 30px; display: flex; flex-direction: column; gap: 4px"
    >
      <div style="display: flex; gap: 4px">
        <namefield
          width="100%"
          size="xs"
          variant="unstyled"
          field="namefield"
        ></namefield>
        <div style="margin-left: auto">
          <stringfield field="source" size="xs"></stringfield>
        </div>
        <numberfield size="xs" field="level" width="80px"></numberfield>
      </div>
    </div>
  </accordion.control>
  <richtextfield
    disablecontrols="true"
    field="description"
    placeholder="Enter Feature description..."
  >
  </richtextfield>
</accordion>
