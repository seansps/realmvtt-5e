<script>
  function onDropItem(recordLink) {
    const item = recordLink?.value;

    // NPC Item list does not determine attacks or other properties,
    // we just list it here so it can be looted by players
    const itemToAdd = {
      ...item,
      icon: "IconMoneybag",
      data: {
        ...item?.data,
        // Track old ID for count tracking
        fromId: item._id,
        // Default count to 1
        count: 1,
      },
      fields: {
        ...item?.fields,
      },
    };

    // Determine if we are adding the item or adding count to an existing item
    const items = record?.data?.inventory || [];
    const index = items.findIndex((i) => i.data?.fromId === item._id);

    // If the item is an item pack, we're adding a list of items
    if (item.data?.type === "pack") {
      const itemsInPack = item.data?.items || [];
      const valuesToSet = {};
      const itemsToAdd = itemsInPack
        .map((item) => {
          // If this is existing item, get the current count
          const thisIndex = items.findIndex((i) => i.data?.fromId === item._id);
          const existingItem = thisIndex !== -1 ? items[thisIndex] : undefined;
          const itemCount = parseFloat(item?.data?.count || "0");
          let curCount = parseFloat(existingItem?.data?.count || "0");
          if (!existingItem) {
            return {
              ...item,
              icon: "IconMoneybag",
              data: {
                ...item.data,
                fromId: item._id,
                count: itemCount,
              },
            };
          } else {
            valuesToSet[`data.inventory.${thisIndex}.data.count`] =
              curCount + itemCount;
          }
        })
        .filter((i) => i);
      api.addValues(`data.inventory`, itemsToAdd, (record) => {
        if (Object.keys(valuesToSet).length > 0) {
          api.setValues(valuesToSet);
        }
      });
    } else {
      const existingItem = index !== -1 ? items[index] : undefined;
      if (existingItem) {
        // Add count to existing item
        const count = parseFloat(existingItem.data?.count || "0");
        // Update the value
        api.setValue(`data.inventory.${index}.data.count`, count + 1);
      } else {
        // Add the item to the list
        api.addValue(`data.inventory`, itemToAdd);
      }
    }
  }

  function onDrop(type, recordLink) {
    if (type === "items") {
      onDropItem(recordLink);
    }
  }
</script>

<div>
  <label variant="bold" textalign="center" label="Gear"></label>

  <div style="margin-left: 34px">
    <label variant="bold" size="xs" textalign="left" label="Count"></label>
  </div>
  <div style="margin-left: 30px">
    <label variant="bold" size="xs" textalign="left" label="Item"></label>
  </div>
</div>

<div style="display: flex; flex-direction: column; flex-grow: 1">
  <list
    listtype="npc_inventory_list"
    radius="none"
    variant="striped"
    field="inventory"
  ></list>
</div>
