<script>
  // Convert 5e formatted damage strings to string Realm VTT needs such as 1d4 piercing + 3 piercing + 2d6 poison (converted from (1d4 + 3) piercing damage plus (2d6) poison damage)
  function getDamage(description) {
    // Handle both formats: "7 (1d8 + 3)" and "1d8 + 3"
    const patterns = [
      /(\d+) \((\d+d\d+)(?:\s*([-+])\s*(\d+))?\) (\w+) damage(?!\s+or)/gi, // Format: "7 (1d8 + 3) piercing" not followed by "or"
      /(\d+d\d+)(?:\s*([-+])\s*(\d+))? (\w+) damage(?!\s+or)/gi, // Format: "1d8 + 3 piercing" not followed by "or"
    ];

    let damageString = "";

    // Take only the part before "or" if it exists
    const mainDescription = description.split(/,?\s+or\s+/)[0];

    for (const pattern of patterns) {
      let match;
      while ((match = pattern.exec(mainDescription)) !== null) {
        if (match[0].includes("(")) {
          // Format: "7 (1d8 + 3) piercing"
          const [, , dice, math, bonus, type] = match;
          const typeLower = type.toLowerCase();
          if (math) {
            damageString += `${dice} ${typeLower} ${math} ${bonus} ${typeLower} + `;
          } else {
            damageString += `${dice} ${typeLower} + `;
          }
        } else {
          // Format: "1d8 + 3 piercing"
          const [, dice, math, bonus, type] = match;
          const typeLower = type.toLowerCase();
          if (math) {
            damageString += `${dice} ${typeLower} ${math} ${bonus} ${typeLower} + `;
          } else {
            damageString += `${dice} ${typeLower} + `;
          }
        }
      }
    }

    // Remove trailing ' + ' if present
    damageString = damageString.replace(/ \+ $/, "");
    return damageString;
  }

  function onTraitNameChange(name) {
    const traitDataPath = dataPath.replace(".name", "");
    const trait = api.getValue(traitDataPath);

    const valuesToSet = {};

    // Parse name for (x/Day or y/Day in Lair)
    const usesPerDay = parseInt(
      name.match(/\(\s*(\d+)\s*\/day\s*/i)?.[1] || "0",
      10,
    );
    const usesPerDayInLair = parseInt(
      name.match(/(\d+)\s*\/day in lair/i)?.[1] || "0",
      10,
    );
    if (!isNaN(usesPerDay) && usesPerDay > 0) {
      if (trait.data.uses === undefined) {
        valuesToSet[`${traitDataPath}.data.uses`] = 0;
      }
      valuesToSet[`${traitDataPath}.data.maxUsesOutsideLair`] = usesPerDay;
      valuesToSet[`${traitDataPath}.data.maxUses`] = usesPerDay;
      valuesToSet[`${traitDataPath}.fields.uses.hidden`] = false;

      if (!isNaN(usesPerDayInLair) && usesPerDayInLair > 0) {
        valuesToSet[`${traitDataPath}.data.maxUsesInLair`] = usesPerDayInLair;
        if (record?.data?.inLair) {
          valuesToSet[`${traitDataPath}.data.maxUses`] = usesPerDayInLair;
        }
      }
    } else {
      if (trait?.fields?.uses?.hidden === false) {
        valuesToSet[`${traitDataPath}.fields.uses.hidden`] = true;
      }
    }

    if (Object.keys(valuesToSet).length > 0) {
      api.setValues(valuesToSet);
    }
  }

  function updateUsesPerDay(value) {
    const traitDataPath = dataPath.replace(".data.maxUses", "");
    const trait = api.getValue(traitDataPath);
    const valuesToSet = {};

    if (value > 0) {
      valuesToSet[`${traitDataPath}.fields.uses.hidden`] = false;
    } else {
      valuesToSet[`${traitDataPath}.fields.uses.hidden`] = true;
    }

    valuesToSet[`${traitDataPath}.data.maxUsesOutsideLair`] = value;

    api.setValues(valuesToSet);
  }

  function updateEffects(effects) {
    const traitDataPath = dataPath.replace(".data.effects", "");
    api.setValue(
      `${traitDataPath}.fields.useBtn.hidden`,
      (effects || []).length === 0,
    );
  }

  function updateIsSave(isSave) {
    const traitDataPath = dataPath.replace(".data.isSave", "");
    api.setValue(`${traitDataPath}.fields.useBtn.hidden`, !isSave);
  }

  function updateDamage(damage) {
    const traitDataPath = dataPath.replace(".data.damage", "");
    api.setValue(
      `${traitDataPath}.fields.rollDamageBtn.hidden`,
      damage === "" || damage === undefined || damage === null,
    );
  }

  function updateHealing(healing) {
    const traitDataPath = dataPath.replace(".data.healing", "");
    api.setValue(`${traitDataPath}.fields.useBtn.hidden`, !healing);
  }

  function rollDamage() {
    const traitDataPath = dataPath.replace(".data.rollDamageBtn", "");
    const trait = api.getValue(traitDataPath);
    const name = trait?.name || "Trait";
    const damage = trait?.data?.damage || "1";

    api.promptRoll(`${name} Damage`, damage, [], {}, "damage");
  }

  function showHideSpellcasting(isSpellcasting) {
    const traitDataPath = dataPath.replace(".data.isSpellcasting", "");
    api.setValue(`${traitDataPath}.fields.spells.hidden`, !isSpellcasting);
  }

  function updateTraitDescription(description) {
    const traitDataPath = dataPath.replace(".data.description", "");
    const valuesToSet = {};

    // Parse for a saving throw — supports multiple formats:
    // "Strength Saving Throw: DC 12"
    // "DC 13 Strength saving throw"
    // "makes a DC 15 Wisdom saving throw"
    const saveMatch =
      description.match(/([A-Za-z]+)\s+[Ss]aving\s+[Tt]hrow:\s+DC\s+(\d+)/) ||
      description.match(/DC\s+(\d+)\s+([A-Za-z]+)\s+[Ss]aving\s+[Tt]hrow/);
    if (saveMatch) {
      // First format: ability is group 1, DC is group 2
      // Second format: DC is group 1, ability is group 2
      const ability = saveMatch[1].match(/^\d+$/) ? saveMatch[2] : saveMatch[1];
      const dc = saveMatch[1].match(/^\d+$/)
        ? parseInt(saveMatch[1], 10)
        : parseInt(saveMatch[2], 10);
      valuesToSet[`${traitDataPath}.data.saveDC`] = dc;
      valuesToSet[`${traitDataPath}.data.isSave`] = true;
      valuesToSet[`${traitDataPath}.data.savingThrows`] = [
        ability.toLowerCase(),
      ];
      valuesToSet[`${traitDataPath}.fields.useBtn.hidden`] = false;
    }

    // Parse damage from description
    const damageString = getDamage(description);
    if (damageString) {
      valuesToSet[`${traitDataPath}.data.damage`] = damageString;
      valuesToSet[`${traitDataPath}.fields.rollDamageBtn.hidden`] = false;
    }

    // Parse for spellcasting — supports two common formats:
    // "using Wisdom as the spellcasting ability (spell save DC 12)"
    // "spellcasting ability is Charisma (spell save DC 20)"
    const spellcastingMatch = description.match(
      /(?:using (\w+) as the spellcasting ability|spellcasting ability\s+is\s+(\w+))\s*\(spell save DC (\d+)[^)]*\)/i,
    );
    if (spellcastingMatch) {
      const spellcastingAbility = (
        spellcastingMatch[1] || spellcastingMatch[2]
      ).toLowerCase();
      const spellSaveDC = parseInt(spellcastingMatch[3] || "0", 10);
      // Check for explicit spell attack modifier like "+4 to hit"
      const spellAttackMatch = description.match(
        /([+-]\d+)\s+to hit with spell/i,
      );
      let spellMod;
      if (spellAttackMatch) {
        spellMod = parseInt(spellAttackMatch[1], 10);
      } else {
        const spellcastingAbilityMod =
          api.getValue(`data.${spellcastingAbility}Mod`) || 0;
        const proficiencyBonus = api.getValue("data.proficiencyBonus") || 2;
        spellMod = spellcastingAbilityMod + proficiencyBonus;
      }
      valuesToSet[`${traitDataPath}.data.isSpellcasting`] = true;
      valuesToSet[`${traitDataPath}.data.spellcastingAbility`] =
        spellcastingAbility;
      valuesToSet[`${traitDataPath}.data.spellMod`] = spellMod;
      valuesToSet[`${traitDataPath}.data.spellDC`] = spellSaveDC;
      valuesToSet[`${traitDataPath}.fields.spells.hidden`] = false;
    }

    if (Object.keys(valuesToSet).length > 0) {
      api.setValues(valuesToSet);
    }
  }

  function useTrait() {
    const traitDataPath = dataPath.replace(".data.useBtn", "");
    const trait = api.getValue(traitDataPath);
    const name = trait?.name || "";
    const description = trait?.data?.description || "";

    const uses = parseInt(trait?.data?.uses || "0", 10);
    const maxUses = parseInt(trait?.data?.maxUses || "0", 10);
    const valuesToSet = {};

    if (maxUses > 0) {
      if (uses < maxUses) {
        // Deduct one use
        valuesToSet[`${traitDataPath}.data.uses`] = uses + 1;
      }
    }

    if (Object.keys(valuesToSet).length > 0) {
      api.setValues(valuesToSet);
    }

    // We'll send a message with the description of the trait as well as macros as relevant
    let savingThrowButtons = "";
    if (trait?.data?.isSave) {
      const savingThrows = trait?.data?.savingThrows || [];
      const saveDc = trait?.data?.saveDC || 0;
      savingThrows.forEach((savingThrow) => {
        // Look up saves of selected tokens and prompt roll for each
        const rollSaveButton = `\`\`\`Roll_${capitalize(savingThrow)}_Save
const selectedTokens = api.getSelectedOrDroppedToken();
selectedTokens.forEach(token => {
	let saveModifiers = [];
	const modifier = token?.data?.['${savingThrow}Save'] || 0;
	saveModifiers.push({
		name: '${capitalize(savingThrow)} Save',
		value: modifier,
		active: true,
	});

	const saveMods = getEffectsAndModifiersForToken(token, ['saveBonus', 'savePenalty'], '${savingThrow}');
	saveMods.forEach(mod => {
		saveModifiers.push(mod);
	});

	const minRoll = getMinRollModifier(saveModifiers);
  // Filter these out of the modifiers array, we don't need them to be toggleable
  saveModifiers = saveModifiers.filter(m => !m.value.toString().startsWith('minroll'));

	const metadata = {
		"rollName": '${capitalize(savingThrow)} Save',
		"tooltip": '${capitalize(savingThrow)} Saving Throw',
		"dc": ${saveDc},
		"minRoll": minRoll
	}

	api.promptRollForToken(token, '${capitalize(
    savingThrow,
  )} Save', '1d20', saveModifiers, metadata, 'save');
});
\`\`\``;
        // Add the rollSaveButton to the savingThrowButtons
        savingThrowButtons += rollSaveButton + "\n";
      });
    }

    const healingButton = trait?.data?.healing
      ? `\`\`\`Roll_Healing
api.promptRoll('${name} Healing', '${trait?.data?.healing}', [], {}, 'healing')
\`\`\``
      : "";

    // Create macros for all effects that this trait can apply
    const effects = trait?.data?.effects || [];
    let effectButtons = getEffectMacrosFor(effects);

    const message = `
#### ${name}

---

${description}

---

${savingThrowButtons}
${healingButton}
${effectButtons}
`;

    api.sendMessage(message, undefined, [], []);
  }
</script>

<div style="width: 100%">

  <div
    style="display: flex; flex-direction: row; gap: 4px; align-items: center"
  >
    <div style="flex: 1">

        size="xs"
        field="namefield"
        hideonlocked="true"
        placeholder="Enter Name..."
        variant="unstyled"
        onchange="updateName(value)"
      ></namefield>
      <label
        field="namefield"
        size="xs"
        variant="bold"
        hideonlocked="false"
      ></label>
    </div>
    <div style="align-self: center">
      <checkbox
        hidden="true"
        field="inLair"
        width="70px"
        label="In Lair"
        size="xs"
      ></checkbox>
    </div>
    <div style="margin-bottom: 2px">
      <counter
        hidden="true"
        width="100px"
        size="xs"
        field="uses"
        label="Uses"
        maxvaluefield="maxUses"
        editable="true"
      ></counter>
    </div>
    <!-- Use Button -->
    <button
      hidden="true"
      size="xxs"
      field="useBtn"
      label="Use"
      onclick="useTrait()"
    ></button>
    <!-- Roll Damage -->
    <button
      hidden="true"
      size="xxs"
      field="rollDamageBtn"
      label="Damage"
      onclick="rollDamage()"
    ></button>
  </div>

  <!-- Description -->
  <div style="margin-top: 2px">
    <stringfield
      size="xs"
      width="100%"
      field="description"
      placeholder="Enter Description..."
      multiline="true"
      onchange="updateTraitDescription(value)"
    ></stringfield>
  </div>

  <accordion
    hideonlocked="true"
    field="modifiersAccordion"
    label="Modifiers"
    size="xs"
  >
    <list
      listtype="modifier_list"
      field="modifiers"
      variant="striped"
      allowadd=""
    ></list>
  </accordion>

  <!-- Settings -->
  <accordion
    hideonlocked="true"
    field="settingsAccordion"
    label="Settings"
    size="xs"
  >
    <div
      style="
        display: flex;
        flex-direction: row;
        gap: 8px;
        align-items: flex-end;
      "
    >
      <numberfield
        field="maxUses"
        label="Uses per Day"
        description="Number of Uses / Day"
        size="xs"
        width="50%"
        placeholder="0"
        onchange="updateUsesPerDay(value)"
      >
      </numberfield>
      <numberfield
        field="maxUsesInLair"
        label="Uses per Day in Lair"
        description="Number of Uses / Day in Lair"
        size="xs"
        width="50%"
        placeholder="0"
      >
      </numberfield>
    </div>
    <div
      style="
        display: flex;
        flex-direction: row;
        gap: 8px;
        align-items: flex-end;
      "
    >
      <stringfield
        field="damage"
        label="Damage"
        size="xs"
        width="50%"
        placeholder="Enter Damage..."
        onchange="updateDamage(value)"
      ></stringfield>
      <stringfield
        field="healing"
        label="Is Healing"
        description="Healing roll, if applicable"
        size="xs"
        width="50%"
        placeholder="Enter Healing..."
        onchange="updateHealing(value)"
      ></stringfield>
    </div>
    <dropdown
      size="xs"
      width="100%"
      field="effects"
      label="Effects"
      searchable="true"
      multiselect="10"
      description="Effects that this Trait can apply"
      optionsquery='{"type": "effects", "query": {}}'
      placeholder="Select Effects..."
      onchange="updateEffects(value)"
    >
    </dropdown>
    <div
      style="
        display: flex;
        flex-direction: row;
        gap: 8px;
        margin-top: 8px;
        align-items: flex-end;
      "
    >
      <checkbox
        field="isSave"
        label="Is Save"
        size="sm"
        textalign="left"
        onchange="updateIsSave(value)"
      ></checkbox>
      <numberfield
        field="saveDC"
        size="xs"
        width="100px"
        placeholder="Enter DC..."
      ></numberfield>
      <dropdown
        size="xs"
        width="250px"
        field="savingThrows"
        placeholder="Select up to 2 Saving Throws..."
        multiselect="2"
        options='[{"label": "Strength", "value": "strength"}, {"label": "Dexterity", "value": "dexterity"}, {"label": "Constitution", "value": "constitution"}, {"label": "Intelligence", "value": "intelligence"}, {"label": "Wisdom", "value": "wisdom"}, {"label": "Charisma", "value": "charisma"}]'
      ></dropdown>
    </div>
    <div
      style="
        display: flex;
        flex-direction: row;
        gap: 8px;
        margin-top: 8px;
        align-items: flex-end;
      "
    >
      <checkbox
        field="isSpellcasting"
        label="Is Spellcasting"
        size="sm"
        textalign="left"
        onchange="showHideSpellcasting(value)"
      ></checkbox>
      <dropdown
        field="spellcastingAbility"
        size="xs"
        label="Spellcasting Ability"
        placeholder="Select Spellcasting Ability..."
        options='[{"label": "Strength", "value": "strength"}, {"label": "Dexterity", "value": "dexterity"}, {"label": "Constitution", "value": "constitution"}, {"label": "Intelligence", "value": "intelligence"}, {"label": "Wisdom", "value": "wisdom"}, {"label": "Charisma", "value": "charisma"}]'
      ></dropdown>
    </div>
    <div style="display: flex; flex-direction: row; gap: 8px; margin-top: 8px">
      <numberfield
        width="150px"
        field="spellDC"
        label="Spellcasting DC"
        placeholder="N/A"
        size="xs"
        description="The DC used for Saves against this NPC's Spells"
      ></numberfield>
      <numberfield
        width="150px"
        field="spellMod"
        label="Spell Casting Modifier"
        placeholder="N/A"
        showsign="true"
        size="xs"
        description="The modifier used for this NPC's Spell Attack Rolls"
      ></numberfield>
    </div>
  </accordion>

  <numberfield field="maxUsesOutsideLair" hidden="true"></numberfield>

  <!-- Spellcasting -->
  <div style="width: 100%">
    <list hidden="true" listtype="npc_spell_list" field="spells"></list>
  </div>
</div>
