<script>
  function onTraitNameChange(name) {
    const traitDataPath = dataPath.replace(".name", "");
    const trait = api.getValue(traitDataPath);

    const valuesToSet = {};

    // Parse name for (x/Day or y/Day in Lair)
    const usesPerDay = parseInt(
      name.match(/\(\s*(\d+)\s*\/day\s*/i)?.[1] || "0",
      10,
    );
    const usesPerDayInLair = parseInt(
      name.match(/(\d+)\s*\/day in lair/i)?.[1] || "0",
      10,
    );
    if (!isNaN(usesPerDay) && usesPerDay > 0) {
      if (trait.data.uses === undefined) {
        valuesToSet[`${traitDataPath}.data.uses`] = 0;
      }
      valuesToSet[`${traitDataPath}.data.maxUsesOutsideLair`] = usesPerDay;
      valuesToSet[`${traitDataPath}.data.maxUses`] = usesPerDay;
      valuesToSet[`${traitDataPath}.fields.uses.hidden`] = false;

      if (!isNaN(usesPerDayInLair) && usesPerDayInLair > 0) {
        valuesToSet[`${traitDataPath}.data.maxUsesInLair`] = usesPerDayInLair;
        if (record?.data?.inLair) {
          valuesToSet[`${traitDataPath}.data.maxUses`] = usesPerDayInLair;
        }
      }
    } else {
      if (trait?.fields?.uses?.hidden === false) {
        valuesToSet[`${traitDataPath}.fields.uses.hidden`] = true;
      }
    }

    if (Object.keys(valuesToSet).length > 0) {
      api.setValues(valuesToSet);
    }
  }

  function updateUsesPerDay(value) {
    const traitDataPath = dataPath.replace(".data.maxUses", "");
    const trait = api.getValue(traitDataPath);
    const valuesToSet = {};

    if (value > 0) {
      valuesToSet[`${traitDataPath}.fields.uses.hidden`] = false;
    } else {
      valuesToSet[`${traitDataPath}.fields.uses.hidden`] = true;
    }

    valuesToSet[`${traitDataPath}.data.maxUsesOutsideLair`] = value;

    api.setValues(valuesToSet);
  }

  function updateEffects(effects) {
    const traitDataPath = dataPath.replace(".data.effects", "");
    api.setValue(
      `${traitDataPath}.fields.useBtn.hidden`,
      (effects || []).length === 0,
    );
  }

  function showHideSpellcasting(isSpellcasting) {
    const traitDataPath = dataPath.replace(".data.isSpellcasting", "");
    api.setValue(`${traitDataPath}.fields.spells.hidden`, !isSpellcasting);
  }

  function updateTraitDescription(description) {
    const traitDataPath = dataPath.replace(".data.description", "");
    const valuesToSet = {};

    // Parse for spellcasting — supports two common formats:
    // "using Wisdom as the spellcasting ability (spell save DC 12)"
    // "spellcasting ability is Charisma (spell save DC 20)"
    const spellcastingMatch = description.match(
      /(?:using (\w+) as the spellcasting ability|spellcasting ability\s+is\s+(\w+))\s*\(spell save DC (\d+)[^)]*\)/i,
    );
    if (spellcastingMatch) {
      const spellcastingAbility = (
        spellcastingMatch[1] || spellcastingMatch[2]
      ).toLowerCase();
      const spellSaveDC = parseInt(spellcastingMatch[3] || "0", 10);
      // Check for explicit spell attack modifier like "+4 to hit"
      const spellAttackMatch = description.match(
        /([+-]\d+)\s+to hit with spell/i,
      );
      let spellMod;
      if (spellAttackMatch) {
        spellMod = parseInt(spellAttackMatch[1], 10);
      } else {
        const spellcastingAbilityMod =
          api.getValue(`data.${spellcastingAbility}Mod`) || 0;
        const proficiencyBonus = api.getValue("data.proficiencyBonus") || 2;
        spellMod = spellcastingAbilityMod + proficiencyBonus;
      }
      valuesToSet[`${traitDataPath}.data.isSpellcasting`] = true;
      valuesToSet[`${traitDataPath}.data.spellcastingAbility`] =
        spellcastingAbility;
      valuesToSet[`${traitDataPath}.data.spellMod`] = spellMod;
      valuesToSet[`${traitDataPath}.data.spellDC`] = spellSaveDC;
      valuesToSet[`${traitDataPath}.fields.spells.hidden`] = false;
    }

    if (Object.keys(valuesToSet).length > 0) {
      api.setValues(valuesToSet);
    }
  }

  function useTrait() {
    const traitDataPath = dataPath.replace(".data.useBtn", "");
    const trait = api.getValue(traitDataPath);
    const name = trait?.name || "";
    const description = trait?.data?.description || "";

    const uses = parseInt(trait?.data?.uses || "0", 10);
    const maxUses = parseInt(trait?.data?.maxUses || "0", 10);
    const valuesToSet = {};

    if (maxUses > 0) {
      if (uses < maxUses) {
        // Deduct one use
        valuesToSet[`${traitDataPath}.data.uses`] = uses + 1;
      }
    }

    if (Object.keys(valuesToSet).length > 0) {
      api.setValues(valuesToSet);
    }

    // We'll send a message with the description of the trait as well as macros as relevant

    // Create macros for all effects that this trait can apply
    const effects = trait?.data?.effects || [];
    let effectButtons = getEffectMacrosFor(effects);

    const message = `
#### ${name}

---
${description}

---

${effectButtons}
`;

    api.sendMessage(message, undefined, [], []);
  }
</script>

<div style="width: 100%">
  <!-- Name and Buttons -->
  <div style="display: flex; flex-direction: row; gap: 4px">
    <namefield
      size="xs"
      width="100%"
      field="namefield"
      placeholder="Enter Name..."
      variant="unstyled"
      onchange="onTraitNameChange(value)"
    ></namefield>
    <div style="align-self: center">
      <checkbox
        hidden="true"
        field="inLair"
        width="70px"
        label="In Lair"
        size="xs"
      ></checkbox>
    </div>
    <div style="margin-bottom: 2px">
      <counter
        hidden="true"
        width="100px"
        size="xs"
        field="uses"
        label="Uses"
        maxvaluefield="maxUses"
        editable="true"
      ></counter>
    </div>
    <!-- Use Button -->
    <div>
      <button
        hidden="true"
        size="xs"
        radius="xs"
        field="useBtn"
        label="Use"
        variant="light"
        onclick="useTrait()"
      ></button>
    </div>
  </div>

  <!-- Description -->
  <div style="margin-top: 2px">
    <stringfield
      size="xs"
      width="100%"
      field="description"
      placeholder="Enter Description..."
      multiline="true"
      onchange="updateTraitDescription(value)"
    ></stringfield>
  </div>

  <accordion
    hideonlocked="true"
    field="modifiersAccordion"
    label="Modifiers"
    size="xs"
  >
    <list
      listtype="modifier_list"
      field="modifiers"
      variant="striped"
      allowadd=""
    ></list>
  </accordion>

  <!-- Settings -->
  <accordion
    hideonlocked="true"
    field="settingsAccordion"
    label="Settings"
    size="xs"
  >
    <div
      style="
        display: flex;
        flex-direction: row;
        gap: 8px;
        align-items: flex-end;
      "
    >
      <numberfield
        field="maxUses"
        label="Uses per Day"
        description="Number of Uses / Day"
        size="xs"
        width="50%"
        placeholder="0"
        onchange="updateUsesPerDay(value)"
      >
      </numberfield>
      <numberfield
        field="maxUsesInLair"
        label="Uses per Day in Lair"
        description="Number of Uses / Day in Lair"
        size="xs"
        width="50%"
        placeholder="0"
      >
      </numberfield>
    </div>
    <dropdown
      size="xs"
      width="100%"
      field="effects"
      label="Effects"
      searchable="true"
      multiselect="10"
      description="Effects that this Trait can apply"
      optionsquery='{"type": "effects", "query": {}}'
      placeholder="Select Effects..."
      onchange="updateEffects(value)"
    >
    </dropdown>
    <div
      style="
        display: flex;
        flex-direction: row;
        gap: 8px;
        margin-top: 8px;
        align-items: flex-end;
      "
    >
      <checkbox
        field="isSpellcasting"
        label="Is Spellcasting"
        size="sm"
        textalign="left"
        onchange="showHideSpellcasting(value)"
      ></checkbox>
      <dropdown
        field="spellcastingAbility"
        size="xs"
        label="Spellcasting Ability"
        placeholder="Select Spellcasting Ability..."
        options='[{"label": "Strength", "value": "strength"}, {"label": "Dexterity", "value": "dexterity"}, {"label": "Constitution", "value": "constitution"}, {"label": "Intelligence", "value": "intelligence"}, {"label": "Wisdom", "value": "wisdom"}, {"label": "Charisma", "value": "charisma"}]'
      ></dropdown>
    </div>
    <div style="display: flex; flex-direction: row; gap: 8px; margin-top: 8px">
      <numberfield
        width="150px"
        field="spellDC"
        label="Spellcasting DC"
        placeholder="N/A"
        size="xs"
        description="The DC used for Saves against this NPC's Spells"
      ></numberfield>
      <numberfield
        width="150px"
        field="spellMod"
        label="Spell Casting Modifier"
        placeholder="N/A"
        showsign="true"
        size="xs"
        description="The modifier used for this NPC's Spell Attack Rolls"
      ></numberfield>
    </div>
  </accordion>

  <numberfield field="maxUsesOutsideLair" hidden="true"></numberfield>

  <!-- Spellcasting -->
  <div style="width: 100%">
    <list hidden="true" listtype="npc_spell_list" field="spells"></list>
  </div>
</div>
