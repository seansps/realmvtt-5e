<!-- Level scaling entry: at a given character level, the ability group value changes -->
<div style="display: flex; gap: 4px; align-items: center">
  <numberfield
    width="80px"
    size="xs"
    field="level"
    label="At Level"
    placeholder="1"
  ></numberfield>
  <stringfield
    width="100%"
    size="xs"
    field="value"
    label="Value"
    placeholder="e.g., 3d6"
  ></stringfield>
</div>
