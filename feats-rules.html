<div style="margin-bottom: 8px">
  <label label="Slug" size="md" variant="bold" textalign="center"></label>
  <label
    label="A unique identifier used to group related feats (e.g. 'dragonborn-paragon'). Other features can add all feats matching a slug."
    size="sm"
    textalign="center"
  ></label>
  <stringfield
    size="xs"
    field="slug"
    label="Slug"
    placeholder="e.g. dragonborn-paragon"
  ></stringfield>
</div>

<div>
  <label label="Ability" size="md" variant="bold" textalign="center"></label>
  <label
    label="Details for Ability granted by this Feat, if applicable"
    size="sm"
    textalign="center"
  ></label>
</div>

<div style="display: flex; gap: 8px">
  <dropdown
    size="xs"
    width="50%"
    field="ability"
    label="Grants Ability"
    searchable="true"
    description="If applicable, an Ability that this Feature grants"
    optionsquery='{"type": "abilities", "query": {}}'
    placeholder="Select Ability..."
  >
  </dropdown>
  <stringfield
    width="50%"
    label="Ability Group Name"
    description="Adds an Ability Group with this Name"
    field="abilityGroupName"
    size="xs"
    placeholder="N/A"
  >
  </stringfield>
</div>
<div style="display: flex; gap: 8px">
  <numberfield
    width="33%"
    label="Ability Uses per Day"
    field="maxDailyUses"
    description="Initial uses per day"
    size="xs"
    placeholder="N/A"
  >
  </numberfield>
  <stringfield
    width="33%"
    label="Ability Value"
    description="Value of the Ability Group"
    field="value"
    size="xs"
    placeholder="N/A"
  >
  </stringfield>
  <dropdown
    width="33%"
    size="xs"
    field="restoreOn"
    placeholder="N/A"
    description="How uses are restored"
    label="Ability Restores On"
    options='[{"label": "Short Rest", "value": "shortrest"}, {"label": "Long Rest", "value": "longrest"}, {"label": "Once on Short Rest", "value": "shortrestonce"}]'
  >
  </dropdown>
</div>
<div style="display: flex; gap: 8px">
  <dropdown
    width="50%"
    label="Max Daily Uses Fields"
    description="Uses the values of these fields to calculate Uses"
    field="fieldsToAddToUses"
    size="xs"
    placeholder="Select Fields"
    multiselect="10"
    options='[{"label": "Strength Modifier", "value": "strengthMod"}, 
      {"label": "Dexterity Modifier", "value": "dexterityMod"}, 
      {"label": "Constitution Modifier", "value": "constitutionMod"},
      {"label": "Intelligence Modifier", "value": "intelligenceMod"},
      {"label": "Wisdom Modifier", "value": "wisdomMod"},
      {"label": "Charisma Modifier", "value": "charismaMod"},
      {"label": "Proficiency Bonus", "value": "proficiencyBonus"},
      {"label": "Half Proficiency Bonus", "value": "halfProficiencyBonus"},
      {"label": "Artificer Level", "value": "artificerLevel"},
      {"label": "Barbarian Level", "value": "barbarianLevel"},
      {"label": "Bard Level", "value": "bardLevel"},
      {"label": "Cleric Level", "value": "clericLevel"},
      {"label": "Druid Level", "value": "druidLevel"},
      {"label": "Fighter Level", "value": "fighterLevel"}, 
      {"label": "Monk Level", "value": "monkLevel"},
      {"label": "Paladin Level", "value": "paladinLevel"},
      {"label": "Ranger Level", "value": "rangerLevel"},
      {"label": "Rogue Level", "value": "rogueLevel"},
      {"label": "Sorcerer Level", "value": "sorcererLevel"},
      {"label": "Warlock Level", "value": "warlockLevel"},
      {"label": "Wizard Level", "value": "wizardLevel"},
      {"label": "Total of Values x 2", "value": "times2"},
      {"label": "Total of Values x 5", "value": "times5"},
      {"label": "Total of Values Plus 1", "value": "plus1"},
      {"label": "Total of Values Plus 2", "value": "plus2"},
      {"label": "Total of Values Plus 3", "value": "plus3"},
      {"label": "Total of Values Plus 4", "value": "plus4"},
      {"label": "Total of Values Plus 5", "value": "plus5"},
      {"label": "Total of Values Plus 6", "value": "plus6"},
      {"label": "Total of Values Plus 7", "value": "plus7"},
      {"label": "Total of Values Plus 8", "value": "plus8"},
      {"label": "Total of Values Plus 9", "value": "plus9"},
      {"label": "Total of Values Plus 10", "value": "plus10"}]'
  >
  </dropdown>
  <dropdown
    width="33%"
    field="savingThrowAbility"
    label="Saving Throw Ability"
    placeholder="N/A"
    size="xs"
    description="How to calculate the DC in this Group, if any saves"
    options='[{"label": "Strength", "value": "strength"}, {"label": "Dexterity", "value": "dexterity"}, {"label": "Constitution", "value": "constitution"}, {"label": "Intelligence", "value": "intelligence"}, {"label": "Wisdom", "value": "wisdom"}, {"label": "Charisma", "value": "charisma"}]'
  >
  </dropdown>
  <dropdown
    width="33%"
    field="altSavingThrowAbility"
    label="Alt Saving Throw Ability"
    placeholder="N/A"
    size="xs"
    description="Use the higher modifier of the two abilities for DC"
    options='[{"label": "Strength", "value": "strength"}, {"label": "Dexterity", "value": "dexterity"}, {"label": "Constitution", "value": "constitution"}, {"label": "Intelligence", "value": "intelligence"}, {"label": "Wisdom", "value": "wisdom"}, {"label": "Charisma", "value": "charisma"}]'
  >
  </dropdown>
</div>

<div style="margin-top: 8px">
  <label label="Modifiers" size="md" variant="bold" textalign="center"></label>
  <label
    label="Modifiers applied to Characters with this Feat"
    size="sm"
    textalign="center"
  ></label>
</div>

<div style="width: 100%">
  <list
    listtype="modifier_list"
    field="modifiers"
    variant="striped"
    allowadd=""
  ></list>
</div>

<div style="margin-top: 8px">
  <label label="Choices" size="md" variant="bold" textalign="center"></label>
  <label
    label="Choices granted by this Feat, if applicable"
    size="sm"
    textalign="center"
  ></label>
</div>

<div style="width: 100%">
  <list
    listtype="feature_choice_list"
    field="choices"
    variant="striped"
    allowadd=""
  ></list>
</div>

<div style="margin-top: 8px">
  <label
    label="Provides Items"
    size="md"
    variant="bold"
    textalign="center"
  ></label>
  <label
    label="Items, Spells, Abilities, or Feats granted when this Feature is applied"
    size="sm"
    textalign="center"
  ></label>
</div>

<div style="width: 100%">
  <list
    listtype="provides_items_list"
    field="providesItems"
    variant="striped-outline"
  ></list>
</div>

<div style="margin-top: 8px">
  <label
    label="Adds Features With Slug"
    size="md"
    variant="bold"
    textalign="center"
  ></label>
  <label
    label="When this feature is applied, all feats matching this slug are added to the character. Use @record.data.fieldName to read the slug from a character data field."
    size="sm"
    textalign="center"
  ></label>
  <stringfield
    size="xs"
    field="addsFeatsWithSlug"
    label="Slug to Add"
    placeholder="e.g. dragonborn-paragon or @record.data.paragonGift"
  ></stringfield>
</div>
