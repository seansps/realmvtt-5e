<script>
  function showHideCounter() {
    const maxDailyUses = value;
    // We're in a list, so we need to use the data path to the fields metadata
    const dataPathToHideCounter = dataPath.replace('.data.maxDailyUses', '.fields.dailyUses.hidden');
    if (maxDailyUses > 0) {
      api.setValue(dataPathToHideCounter, false);
    } else {
      api.setValue(dataPathToHideCounter, true);
    }
  }
</script>

<label textalign='center' variant='bold' size='md' field='namefield'></label>

<div style="width: 100%; display: flex; justify-content: center; margin-bottom: 8px;">
  <counter hidden="true" textalign="center" label="Uses" field="dailyUses" maxvalue='1' maxvaluefield="maxDailyUses"
    color='default' size="xs">
  </counter>
</div>

<accordion size="sm" field="settingsOpen" label="Settings" hideonlocked="true" variant="contained">
  <namefield width="100%" size='xs' label='Abilty List Name' placeholder='Enter Ability List Name...' field="namefield"
    size='md'></namefield>
  <dropdown field="restore" label="Restore Uses On" placeholder="N/A" size="xs"
    options='[{"label": "Long Rest", "value": "longrest"}, {"label": "Short Rest", "value": "shortrest"}, {"label": "Once on Short Rest", "value": "shortrestonce"}]'>
  </dropdown>
  <div style='display: flex; gap: 4px;'>
    <numberfield width="50%" field="maxDailyUses" label="Number of Uses" placeholder='N/A' size='xs'
      description='Max number of times abilities can be used' onchange="showHideCounter();"></numberfield>
    <stringfield width="50%" field="value" label="Ability Value" placeholder='N/A'
      description='Dice string or number value for the ability group' size='xs'></stringfield>
  </div>
  <div style='display: flex; gap: 4px;'>
    <dropdown width="50%" field="savingThrowAbility" label="Saving Throw Ability" placeholder='N/A' size='xs'
      description='How to calculate the DC for relevant Saving Throws'
      options='[{"label": "Strength", "value": "strength"}, {"label": "Dexterity", "value": "dexterity"}, {"label": "Constitution", "value": "constitution"}, {"label": "Intelligence", "value": "intelligence"}, {"label": "Wisdom", "value": "wisdom"}, {"label": "Charisma", "value": "charisma"}]'>
    </dropdown>
  </div>
</accordion>

<div style='margin-top: 8px; width: 100%'>
  <list listtype="ability_list" field='abilities' variant='outline-striped' radius='xs' allowadd=''></list>
</div>
