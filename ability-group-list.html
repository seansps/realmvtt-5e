<script>
  function showHideCounter() {
    const maxDailyUses = value;
    // We're in a list, so we need to use the data path to the fields metadata
    const dataPathToHideCounter = dataPath.replace(
      ".data.maxDailyUses",
      ".fields.dailyUses.hidden",
    );
    if (maxDailyUses > 0) {
      api.setValue(dataPathToHideCounter, false);
    } else {
      api.setValue(dataPathToHideCounter, true);
    }
  }

  function updateUses(fieldsToAddToUses) {
    if (fieldsToAddToUses && fieldsToAddToUses.length > 0) {
      // Pass the ability group's name so any "Ability Group Uses Bonus" modifiers
      // targeting this group are added to the total.
      const abilityGroup = api.getValue(getNearestParentDataPath(dataPath));
      const totalUses = getTotalValueFromFields(
        record,
        fieldsToAddToUses,
        undefined,
        abilityGroup?.name,
      );
      const valuesToSet = {};
      if (totalUses > 0) {
        const dataPathToMaxDailyUses = dataPath.replace(
          ".data.fieldsToAddToUses",
          ".data.maxDailyUses",
        );
        valuesToSet[dataPathToMaxDailyUses] = totalUses;
        const dataPathToHideCounter = dataPath.replace(
          ".data.fieldsToAddToUses",
          ".fields.dailyUses.hidden",
        );
        valuesToSet[dataPathToHideCounter] = false;
        api.setValues(valuesToSet);
      }
    }
  }
</script>
