<script>
  function updateSpellSlots() {
    // Determine if we should hide/unhide spell slots and labels
    const valuesToHide = [];
    const valuesToUnhide = [];
    if (
      record?.data?.numSpellSlots1 > 0 ||
      record?.data?.numSpellSlots2 > 0 ||
      record?.data?.numSpellSlots3 > 0 ||
      record?.data?.numSpellSlots4 > 0 ||
      record?.data?.numSpellSlots5 > 0 ||
      record?.data?.numSpellSlots6 > 0 ||
      record?.data?.numSpellSlots7 > 0 ||
      record?.data?.numSpellSlots8 > 0 ||
      record?.data?.numSpellSlots9 > 0
    ) {
      valuesToUnhide.push("spellSlotsLabel");
    } else {
      valuesToHide.push("spellSlotsLabel");
    }
    if (record?.data?.numSpellSlots1 > 0) {
      valuesToUnhide.push("spellSlots1");
    } else {
      valuesToHide.push("spellSlots1");
    }
    if (record?.data?.numSpellSlots2 > 0) {
      valuesToUnhide.push("spellSlots2");
    } else {
      valuesToHide.push("spellSlots2");
    }
    if (record?.data?.numSpellSlots3 > 0) {
      valuesToUnhide.push("spellSlots3");
    } else {
      valuesToHide.push("spellSlots3");
    }
    if (record?.data?.numSpellSlots4 > 0) {
      valuesToUnhide.push("spellSlots4");
    } else {
      valuesToHide.push("spellSlots4");
    }
    if (record?.data?.numSpellSlots5 > 0) {
      valuesToUnhide.push("spellSlots5");
    } else {
      valuesToHide.push("spellSlots5");
    }
    if (record?.data?.numSpellSlots6 > 0) {
      valuesToUnhide.push("spellSlots6");
    } else {
      valuesToHide.push("spellSlots6");
    }
    if (record?.data?.numSpellSlots7 > 0) {
      valuesToUnhide.push("spellSlots7");
    } else {
      valuesToHide.push("spellSlots7");
    }
    if (record?.data?.numSpellSlots8 > 0) {
      valuesToUnhide.push("spellSlots8");
    } else {
      valuesToHide.push("spellSlots8");
    }
    if (record?.data?.numSpellSlots9 > 0) {
      valuesToUnhide.push("spellSlots9");
    } else {
      valuesToHide.push("spellSlots9");
    }

    api.setHidden(valuesToHide, true, () => {
      api.setHidden(valuesToUnhide, false);
    });
  }

  function updateLairState(inLair) {
    // Go through traits and check if uses need updating
    const npcDataPath = dataPath.replace(".inLair", "");
    const traits = record?.data?.features || [];
    const valuesToSet = {};
    traits.forEach((trait, index) => {
      const traitDataPath = `${npcDataPath}.features.${index}.data`;
      if (trait?.data?.maxUsesOutsideLair && trait?.data?.maxUsesInLair) {
        valuesToSet[`${traitDataPath}.maxUses`] = inLair
          ? trait?.data?.maxUsesInLair
          : trait?.data?.maxUsesOutsideLair;
      }
    });

    valuesToSet["data.maxReactions"] = inLair
      ? record?.data?.maxReactionsInLair || 1
      : record?.data?.maxReactionsOutsideLair || 1;

    valuesToSet["data.maxLegendaryActions"] = inLair
      ? record?.data?.maxLegendaryActionsInLair || 1
      : record?.data?.maxLegendaryActionsOutsideLair || 1;

    if (Object.keys(valuesToSet).length > 0) {
      api.setValues(valuesToSet);
    }
  }

  function updateMaxReactions() {
    // Update the max reactions based on the inLair state
    const valuesToSet = {};
    if (record?.data?.inLair) {
      valuesToSet["data.maxReactions"] = record?.data?.maxReactionsInLair || 1;
    } else {
      valuesToSet["data.maxReactions"] =
        record?.data?.maxReactionsOutsideLair || 1;
    }
    api.setValues(valuesToSet);
  }

  function updateMaxLegendaryActions() {
    // Update the max legendary actions based on the inLair state
    const valuesToSet = {};
    if (record?.data?.inLair) {
      valuesToSet["data.maxLegendaryActions"] =
        record?.data?.maxLegendaryActionsInLair || 1;
    } else {
      valuesToSet["data.maxLegendaryActions"] =
        record?.data?.maxLegendaryActionsOutsideLair || 1;
    }
    api.setValues(valuesToSet);
  }
</script>

<div style="margin-bottom: 4px">
  <divider label="Settings"></divider>
</div>

<checkbox
  field="inLair"
  label="In Lair"
  description="Toggles the 'In Lair' State for Legendary Resistances and Reactions"
  onchange="updateLairState(value);"
>
</checkbox>

<div style="display: flex; flex-direction: row; gap: 8px; flex-wrap: wrap">
  <numberfield
    size="xs"
    description="Number of Reactions per round"
    field="maxReactionsOutsideLair"
    label="Max Reactions"
    onchange="updateMaxReactions();"
    width="250px"
    placeholder="1"
  ></numberfield>
  <numberfield
    size="xs"
    description="Number of Reactions when in their Lair"
    field="maxReactionsInLair"
    label="Max Reactions In Lair"
    onchange="updateMaxReactions();"
    width="250px"
    placeholder="1"
  >
  </numberfield>
</div>

<div style="display: flex; flex-direction: row; gap: 8px; flex-wrap: wrap">
  <numberfield
    size="xs"
    description="Number of Legendary Actions per round"
    field="maxLegendaryActionsOutsideLair"
    label="Max Legendary Actions"
    onchange="updateMaxLegendaryActions();"
    width="250px"
    placeholder="1"
  ></numberfield>
  <numberfield
    size="xs"
    description="Number of Legendary Actions when in their Lair"
    field="maxLegendaryActionsInLair"
    label="Max Legendary Actions In Lair"
    onchange="updateMaxLegendaryActions();"
    width="250px"
    placeholder="1"
  >
  </numberfield>
</div>

<div style="margin-bottom: 4px">
  <divider label="Spellcasting"></divider>
</div>

<label variant="bold" label="Spell Slots by Level" size="sm"></label>
<label
  label="If this NPC has Spell Slots instead of Uses per Spell, enter the number of slots below"

></label>
<div style="display: flex; flex-direction: row; gap: 4px; flex-wrap: wrap">
  <numberfield

    label="Level 1"

  <numberfield

  ></numberfield>
  <numberfield

  ></numberfield>
  <numberfield

  <numberfield
    field="numSpellSlots7"
    placeholder="--"
    label="Level 7"

    width="50px"
    onchange="updateSpellSlots();"
  ></numberfield>
  <numberfield
    field="numSpellSlots8"
    placeholder="--"
    label="Level 8"

  ></numberfield>
  <numberfield

  ></numberfield>
</div>
