<label label="Rules Elements" size="lg"></label>
<div style="display: flex; flex-direction: column; gap: 4px">
  <checkbox
    size="md"
    field="isAttack"
    label="Is Attack"
    textalign="right"
  ></checkbox>
  <div style="display: flex; gap: 8px; align-items: center">
    <checkbox
      size="md"
      field="isSave"
      label="Has Save"
      textalign="right"
    ></checkbox>
    <dropdown
      size="xs"
      field="savingThrow"
      placeholder="Select Saving Throw..."
      options='[{"label": "Strength", "value": "strength"}, {"label": "Dexterity", "value": "dexterity"}, {"label": "Constitution", "value": "constitution"}, {"label": "Intelligence", "value": "intelligence"}, {"label": "Wisdom", "value": "wisdom"}, {"label": "Charisma", "value": "charisma"}]'
    >
    </dropdown>
  </div>
</div>

<dropdown
  size="sm"
  field="additionalSavingThrows"
  label="Additional Saving Throws"
  placeholder="Select Additional Saving Throws..."
  width="100%"
  description="For spells that have more than one saving throw"
  multiselect="6"
  options='[{"label": "Strength", "value": "strength"}, {"label": "Dexterity", "value": "dexterity"}, {"label": "Constitution", "value": "constitution"}, {"label": "Intelligence", "value": "intelligence"}, {"label": "Wisdom", "value": "wisdom"}, {"label": "Charisma", "value": "charisma"}]'
>
</dropdown>

<div style="display: flex; gap: 4px; align-items: flex-end">
  <stringfield
    width="100%"
    field="damage"
    label="Base Damage"
    placeholder="Enter Damage, if applicable..."
  ></stringfield>
  <checkbox
    field="addAbility"
    width="100%"
    label="Add Ability Score Modifier"
    textalign="right"
    size="md"
  >
  </checkbox>
</div>

<div style="display: flex; gap: 4px; align-items: flex-end">
  <stringfield
    width="100%"
    field="damage2"
    label="Alternate Damage"
    description="For spells that have secondary damage options (comma separated)"
    placeholder="Enter Alt. Damage, if applicable..."
  ></stringfield>
  <checkbox
    field="addAbility2"
    width="100%"
    label="Add Ability Score Modifier"
    textalign="right"
    size="md"
  >
  </checkbox>
</div>

<div style="display: flex; gap: 4px; align-items: flex-end">
  <stringfield
    width="100%"
    field="healing"
    label="Base Healing"
    description="For spells that provide healing (use temp for temporary hit points)"
    placeholder="Enter Healing, if applicable..."
  ></stringfield>
  <checkbox
    width="100%"
    field="addAbilityHealing"
    label="Add Ability Score Modifier"
    textalign="right"
    size="md"
  >
  </checkbox>
</div>

<div style="margin-top: 4px; margin-bottom: 4px">
  <dropdown
    size="sm"
    field="effects"
    label="Effects"
    searchable="true"
    multiselect="20"
    description="Effects that this spell can apply"
    optionsquery='{"type": "effects", "query": {}}'
    placeholder="Select Effects..."
  >
  </dropdown>
</div>
