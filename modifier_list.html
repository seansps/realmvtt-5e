<div
  style="
    display: flex;
    flex-direction: row;
    gap: 4px;
    align-items: center;
    margin-top: 4px;
  "
>
  <dropdown
    width="35%"
    size="xs"
    field="valueType"
    placeholder="Select Value Type"
    label="Value Type"
    options='[{"label": "Number", "value": "number"},
    {"label": "String", "value": "string"}, {"label": "From Field", "value": "field"}]'
  >
  </dropdown>

  <stringfield
    width="35%"
    size="xs"
    field="value"
    label="Value"
    placeholder="Enter Value"
  ></stringfield>

  <div style="display: flex; flex-direction: column; gap: 4px">
    <checkbox size="xs" field="active" label="Active by Default"></checkbox>
    <checkbox
      size="xs"
      hidden="true"
      width="175px"
      field="itemOnly"
      label="Only Applies To This Item"
    ></checkbox>
  </div>
</div>
<stringfield
  width="100%"
  size="xs"
  field="predicate"
  label="Predicate"
  placeholder='e.g. focused-shot or {"or":["focused-shot","power-attack"]}'
  description='Toggle predicate. Simple string for single toggle, JSON for complex: ["a","b"] (AND), {"or":[...]} {"not":"x"}'
></stringfield>
