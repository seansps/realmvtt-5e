<div style="display: flex; flex-direction: row; gap: 4px">
  <dropdown
    width="50%"
    size="xs"
    field="type"
    placeholder="Select Modifier Type"
    label="Modifier Type"
    options='[{"label": "Attack Bonus", "value": "attackBonus"}, 
    {"label": "Attack Penalty", "value": "attackPenalty"},
    {"label": "Damage Bonus", "value": "damageBonus"},
    {"label": "Damage Penalty", "value": "damagePenalty"},
    {"label": "Attack Calculation", "value": "attackCalculation"},
    {"label": "Healing Bonus", "value": "healingBonus"},
    {"label": "Healing Penalty", "value": "healingPenalty"},
    {"label": "Cantrip Damage Bonus", "value": "cantripDamageBonus"},
    {"label": "Cantrip Damage Penalty", "value": "cantripDamagePenalty"},
    {"label": "Spell Damage Bonus", "value": "spellDamageBonus"},
    {"label": "Spell Damage Penalty", "value": "spellDamagePenalty"},
    {"label": "Spell Attack Bonus", "value": "spellAttackBonus"},
    {"label": "Spell Attack Penalty", "value": "spellAttackPenalty"},
    {"label": "Spell DC Bonus", "value": "spellDCBonus"},
    {"label": "Saving Throw Bonus", "value": "saveBonus"},
    {"label": "Saving Throw Penalty", "value": "savePenalty"},
    {"label": "Ability Check Bonus", "value": "abilityBonus"},
    {"label": "Ability Check Penalty", "value": "abilityPenalty"},
    {"label": "Skill Check Bonus", "value": "skillBonus"},
    {"label": "Skill Check Penalty", "value": "skillPenalty"},
    {"label": "Armor Class Calculation", "value": "armorClassCalculation"},
    {"label": "Armor Class Bonus", "value": "armorClassBonus"},
    {"label": "Armor Class Penalty", "value": "armorClassPenalty"},
    {"label": "Hit Point Maximum", "value": "hitpoints"},
    {"label": "Add Resistance", "value": "resistance"},
    {"label": "Add Vulnerability", "value": "vulnerability"},
    {"label": "Add Immunity", "value": "immunity"},
    {"label": "Initiative Bonus", "value": "initiativeBonus"},
    {"label": "Initiative Penalty", "value": "initiativePenalty"},
    {"label": "Additional Weapon Mastery", "value": "weaponMastery"},
    {"label": "Regeneration", "value": "regeneration"}]'
  >
  </dropdown>

  <stringfield
    width="50%"
    size="xs"
    field="field"
    label="Field"
    placeholder="Enter Field, if Applicable"
  ></stringfield>
</div>

<div
  style="
    display: flex;
    flex-direction: row;
    gap: 4px;
    align-items: center;
    margin-top: 4px;
  "
>
  <dropdown
    width="35%"
    size="xs"
    field="valueType"
    placeholder="Select Value Type"
    label="Value Type"
    options='[{"label": "Number", "value": "number"}, 
    {"label": "String", "value": "string"}, {"label": "From Field", "value": "field"}]'
  >
  </dropdown>

  <stringfield
    width="35%"
    size="xs"
    field="value"
    label="Value"
    placeholder="Enter Value"
  ></stringfield>

  <div style="display: flex; flex-direction: column; gap: 4px">
    <checkbox size="xs" field="active" label="Active by Default"></checkbox>
    <checkbox
      size="xs"
      hidden="true"
      width="175px"
      field="itemOnly"
      label="Only Applies To This Item"
    ></checkbox>
  </div>
</div>
