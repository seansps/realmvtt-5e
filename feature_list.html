<!-- Click-to-open feature row: the portrait opens the linked feature record so it
     is edited on its own sheet (feats-main / feats-rules) rather than inline. -->
<div style="min-height: 30px; display: flex; flex-direction: column; gap: 4px">
  <div style="display: flex; gap: 4px; align-items: center">
    <div style="width: 30px; min-width: 30px">
      <portrait width="30px" height="30px" name="portrait"></portrait>
    </div>
    <numberfield
      width="70px"
      size="xs"
      field="level"
      variant="tooltip"
      label="Level"
    ></numberfield>
    <namefield
      width="100%"
      size="xs"
      variant="tooltip"
      label="Name"
      field="namefield"
    ></namefield>
  </div>
</div>
