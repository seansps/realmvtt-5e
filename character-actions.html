<script>
  function onDropSpell(recordLink) {
    const spell = recordLink?.value;

    // Determine which list to add the spell to
    let spellLevel = spell?.data?.level || "0";
    if (spellLevel === "Cantrip") {
      spellLevel = "0";
    }
    let spellList = `cantrips`;
    if (spellLevel !== "0") {
      spellList = `spells${spellLevel}`;
    }

    // Set the ability to the most likely relevant ability based on
    // which classes the character has
    const spellLists = spell?.data?.spellLists || [];
    const spellClasses = record?.data?.classes || [];
    let ability = "intelligence"; // Default

    // First, try to find classes that match the spell's spell lists
    const matchingClasses = spellClasses.filter((c) =>
      spellLists.includes(c?.name),
    );

    if (matchingClasses.length > 0) {
      // If we have matching classes, pick the one with the highest ability modifier
      let highestMod = -999;
      let bestAbility = "intelligence";

      for (const c of matchingClasses) {
        const classAbility = c?.data?.spellcastingAbility;
        if (classAbility) {
          const abilityMod = parseInt(
            record?.data?.[`${classAbility}Mod`] || "0",
            10,
          );
          if (abilityMod > highestMod) {
            highestMod = abilityMod;
            bestAbility = classAbility;
          }
        }
      }

      ability = bestAbility;
    } else if (spellClasses.length > 0) {
      // Fall back to the class with the highest spellcasting ability modifier
      let highestMod = -999;
      let bestAbility = "intelligence";

      for (const c of spellClasses) {
        const classAbility = c?.data?.spellcastingAbility;
        if (classAbility) {
          const abilityMod = parseInt(
            record?.data?.[`${classAbility}Mod`] || "0",
            10,
          );
          if (abilityMod > highestMod) {
            highestMod = abilityMod;
            bestAbility = classAbility;
          }
        }
      }

      ability = bestAbility;
    }

    // Set the ability
    const spellToAdd = {
      ...spell,
      data: {
        ...spell?.data,
        ability,
      },
    };

    const curLength = record?.data?.[spellList]?.length || 0;

    // Add the spell to the list
    api.addValue(`data.${spellList}`, spellToAdd, (updatedRecord) => {
      // If cantrip was added, hide the upcast button
      if (spellLevel === "0" || spellLevel === "Cantrip") {
        api.setValue(
          `data.${spellList}.${curLength}.fields.upcastLevel.hidden`,
          true,
        );
      }
    });
  }

  function onDrop(type, recordLink) {
    if (type === "spells") {
      onDropSpell(recordLink);
    }
  }

  function updateSpellLevels() {
    api.setHidden(
      [
        "cantripsOpen",
        "level1spellsOpen",
        "level2spellsOpen",
        "level3spellsOpen",
        "level4spellsOpen",
        "level5spellsOpen",
        "level6spellsOpen",
        "level7spellsOpen",
        "level8spellsOpen",
        "level9spellsOpen",
      ],
      true,
      () => {
        if (value === undefined || value === null) {
          return;
        }

        let spellValue = value === "Cantrip" ? 0 : parseInt(value, 10);

        const valuesToUnhide = [];
        if (spellValue >= 9) {
          valuesToUnhide.push("level9spellsOpen");
        }
        if (spellValue >= 8) {
          valuesToUnhide.push("level8spellsOpen");
        }
        if (spellValue >= 7) {
          valuesToUnhide.push("level7spellsOpen");
        }
        if (spellValue >= 6) {
          valuesToUnhide.push("level6spellsOpen");
        }
        if (spellValue >= 5) {
          valuesToUnhide.push("level5spellsOpen");
        }
        if (spellValue >= 4) {
          valuesToUnhide.push("level4spellsOpen");
        }
        if (spellValue >= 3) {
          valuesToUnhide.push("level3spellsOpen");
        }
        if (spellValue >= 2) {
          valuesToUnhide.push("level2spellsOpen");
        }
        if (spellValue >= 1) {
          valuesToUnhide.push("level1spellsOpen");
        }
        if (spellValue >= 0) {
          valuesToUnhide.push("cantripsOpen");
        }

        api.setHidden(valuesToUnhide, false);
      },
    );
  }

  function updateSpellSlots() {
    // Determine if we should hide/unhide spell slots and labels
    const valuesToHide = [];
    const valuesToUnhide = [];

    // Spell Slots (individual visibility inside spellSlotsBox)
    if (
      record?.data?.numSpellSlots1 > 0 ||
      record?.data?.numSpellSlots2 > 0 ||
      record?.data?.numSpellSlots3 > 0 ||
      record?.data?.numSpellSlots4 > 0 ||
      record?.data?.numSpellSlots5 > 0 ||
      record?.data?.numSpellSlots6 > 0 ||
      record?.data?.numSpellSlots7 > 0 ||
      record?.data?.numSpellSlots8 > 0 ||
      record?.data?.numSpellSlots9 > 0
    ) {
      valuesToUnhide.push("spellSlotsLabel");
      valuesToUnhide.push("spellSlotsBox");
    } else {
      valuesToHide.push("spellSlotsLabel");
      valuesToHide.push("spellSlotsBox");
    }
    if (record?.data?.numSpellSlots1 > 0) {
      valuesToUnhide.push("spellSlots1");
    } else {
      valuesToHide.push("spellSlots1");
    }
    if (record?.data?.numSpellSlots2 > 0) {
      valuesToUnhide.push("spellSlots2");
    } else {
      valuesToHide.push("spellSlots2");
    }
    if (record?.data?.numSpellSlots3 > 0) {
      valuesToUnhide.push("spellSlots3");
    } else {
      valuesToHide.push("spellSlots3");
    }
    if (record?.data?.numSpellSlots4 > 0) {
      valuesToUnhide.push("spellSlots4");
    } else {
      valuesToHide.push("spellSlots4");
    }
    if (record?.data?.numSpellSlots5 > 0) {
      valuesToUnhide.push("spellSlots5");
    } else {
      valuesToHide.push("spellSlots5");
    }
    if (record?.data?.numSpellSlots6 > 0) {
      valuesToUnhide.push("spellSlots6");
    } else {
      valuesToHide.push("spellSlots6");
    }
    if (record?.data?.numSpellSlots7 > 0) {
      valuesToUnhide.push("spellSlots7");
    } else {
      valuesToHide.push("spellSlots7");
    }
    if (record?.data?.numSpellSlots8 > 0) {
      valuesToUnhide.push("spellSlots8");
    } else {
      valuesToHide.push("spellSlots8");
    }
    if (record?.data?.numSpellSlots9 > 0) {
      valuesToUnhide.push("spellSlots9");
    } else {
      valuesToHide.push("spellSlots9");
    }

    // Pact Magic
    if (
      record?.data?.numPactMagic1 > 0 ||
      record?.data?.numPactMagic2 > 0 ||
      record?.data?.numPactMagic3 > 0 ||
      record?.data?.numPactMagic4 > 0 ||
      record?.data?.numPactMagic5 > 0 ||
      record?.data?.numPactMagic6 > 0 ||
      record?.data?.numPactMagic7 > 0 ||
      record?.data?.numPactMagic8 > 0 ||
      record?.data?.numPactMagic9 > 0
    ) {
      valuesToUnhide.push("pactMagicLabel");
    } else {
      valuesToHide.push("pactMagicLabel");
    }
    if (record?.data?.numPactMagic1 > 0) {
      valuesToUnhide.push("pactMagic1");
    } else {
      valuesToHide.push("pactMagic1");
    }
    if (record?.data?.numPactMagic2 > 0) {
      valuesToUnhide.push("pactMagic2");
    } else {
      valuesToHide.push("pactMagic2");
    }
    if (record?.data?.numPactMagic3 > 0) {
      valuesToUnhide.push("pactMagic3");
    } else {
      valuesToHide.push("pactMagic3");
    }
    if (record?.data?.numPactMagic4 > 0) {
      valuesToUnhide.push("pactMagic4");
    } else {
      valuesToHide.push("pactMagic4");
    }
    if (record?.data?.numPactMagic5 > 0) {
      valuesToUnhide.push("pactMagic5");
    } else {
      valuesToHide.push("pactMagic5");
    }
    if (record?.data?.numPactMagic6 > 0) {
      valuesToUnhide.push("pactMagic6");
    } else {
      valuesToHide.push("pactMagic6");
    }
    if (record?.data?.numPactMagic7 > 0) {
      valuesToUnhide.push("pactMagic7");
    } else {
      valuesToHide.push("pactMagic7");
    }
    if (record?.data?.numPactMagic8 > 0) {
      valuesToUnhide.push("pactMagic8");
    } else {
      valuesToHide.push("pactMagic8");
    }
    if (record?.data?.numPactMagic9 > 0) {
      valuesToUnhide.push("pactMagic9");
    } else {
      valuesToHide.push("pactMagic9");
    }

    api.setHidden(valuesToHide, true, () => {
      api.setHidden(valuesToUnhide, false);
    });
  }

  function onUseSpellPointsChanged(checked) {
    if (checked) {
      // Hide spell slots, show spell points + 6th-9th checkboxes based on max spell level
      const maxSpellLevel = parseInt(record?.data?.maxSpellLevel || "0", 10);
      const spToShow = ["spellPointsLabel", "spellPointsCounter"];
      const spToHide = [];
      for (let lvl = 6; lvl <= 9; lvl++) {
        if (maxSpellLevel >= lvl) {
          spToShow.push(`spellPointSlot${lvl}Box`);
        } else {
          spToHide.push(`spellPointSlot${lvl}Box`);
        }
      }
      api.setHidden(["spellSlotsBox", ...spToHide], true, () => {
        api.setHidden(spToShow, false);
      });
    } else {
      // Hide spell points, show spell slots (updateSpellSlots handles individual slot visibility)
      api.setHidden(
        [
          "spellPointsLabel",
          "spellPointsCounter",
          "spellPointSlot6Box",
          "spellPointSlot7Box",
          "spellPointSlot8Box",
          "spellPointSlot9Box",
        ],
        true,
        () => {
          api.setHidden(["spellSlotsBox"], false, () => {
            updateSpellSlots();
          });
        },
      );
    }
  }

  function canAddSpell(spellLevel) {
    // Return true if the given spell being added can be added to the given spell list
    let levelOfSpell = value?.data?.level || "Cantrip";
    if (levelOfSpell === "Cantrip") {
      levelOfSpell = "0";
    }
    levelOfSpell = parseInt(levelOfSpell, 10);
    const levelOfList = parseInt(spellLevel, 10);
    return levelOfSpell === levelOfList;
  }

  function getSpellFilters() {
    // If "Hide Unprepared Spells" is checked, filter out unprepared spells
    if (record?.data?.hideUnpreparedSpells) {
      return [
        { field: "prepared", operator: "not_equals", value: "unprepared" },
      ];
    }
    return [];
  }

  function rollInitiative() {
    // Roll initiative for the character

    const roll = "1d20";

    // Get modifiers for initiative, which is a dexterity check
    const modifiers = [];

    // Add dexterity modifier
    const dexMod = parseInt(record.data?.dexterityMod || "0", 10);
    modifiers.push({
      name: "Dexterity",
      value: dexMod,
      active: true,
    });

    // Check effects for all initiative bonuses and penalties
    const initiativeModifiers = getEffectsAndModifiers([
      "initiativeBonus",
      "initiativePenalty",
    ]);
    initiativeModifiers.forEach((modifier) => {
      modifiers.push(modifier);
    });

    const dextertyCheckModifiers = getEffectsAndModifiers(
      ["abilityBonus", "abilityPenalty"],
      "dexterity",
    );
    dextertyCheckModifiers.forEach((modifier) => {
      modifiers.push(modifier);
    });

    api.promptRoll(
      "Initiative",
      roll,
      modifiers,
      {
        rollName: "Initiative",
        tooltip: "Initiative Roll",
        isCharacter: true,
        dc: 0,
      },
      "initiative",
    );
  }

  // Standard 2024 combat actions for the "Actions in Combat" accordion. Posts the
  // action's rules text to chat; actions with an `effect` also append a macro
  // button that applies that effect to the selected/dropped token(s).
  const STANDARD_ACTIONS = {
    Dodge: {
      icon: "https://assets.realmvtt.com/icons/fantasy/skills/buffs/speed-boost.webp",
      effect: "Dodge",
      description:
        "Until the start of your next turn, any attack roll made against you has Disadvantage if you can see the attacker, and you make Dexterity saving throws with Advantage. You lose these benefits if you have the Incapacitated condition or if your Speed is 0.",
    },
    Help: {
      icon: "https://assets.realmvtt.com/icons/fantasy/skills/buffs/empowerment-boost.webp",
      description:
        "Do one of the following:\n\n**Assist an Ability Check.** Choose one of your skill or tool proficiencies and one ally near enough to assist; that ally has Advantage on their next ability check with the chosen skill or tool. Expires at the start of your next turn.\n\n**Assist an Attack Roll.** Distract an enemy within 5 feet of you, giving one ally Advantage on their next attack roll against that enemy. Expires at the start of your next turn.",
    },
    Dash: {
      icon: "https://assets.realmvtt.com/icons/fantasy/skills/buffs/blazing-speed.webp",
      description:
        "You gain extra movement for the current turn equal to your Speed after applying any modifiers. You can use a special speed (Fly, Swim, etc.) instead of your Speed when you take this action.",
    },
    Disengage: {
      icon: "https://assets.realmvtt.com/icons/fantasy/skills/buffs/enhanced-armor-vest.webp",
      description:
        "Your movement doesn't provoke Opportunity Attacks for the rest of the current turn.",
    },
    Hide: {
      icon: "https://assets.realmvtt.com/icons/fantasy/magic/nature/stealth-hide-eyes-green.webp",
      description:
        "Make a DC 15 Dexterity (Stealth) check while you're Heavily Obscured or behind Three-Quarters or Total Cover and out of any enemy's line of sight. On a success you have the Invisible condition while hidden; note your check total (the DC for a creature to find you with a Wisdom (Perception) check).\n\nYou stop being hidden if you make a sound louder than a whisper, an enemy finds you, you make an attack roll, or you cast a spell with a Verbal component.",
    },
    Ready: {
      icon: "https://assets.realmvtt.com/icons/scifi/skills/blue/timer-icon.webp",
      description:
        "Decide a perceivable trigger and the action (or movement up to your Speed) you'll take in response via your Reaction before the start of your next turn. A readied spell is cast as normal (expending resources) and held with Concentration until released by the trigger; if your Concentration breaks, the spell dissipates.",
    },
    Utilize: {
      icon: "https://assets.realmvtt.com/icons/fantasy/skills/melee/hand-grip-sword-strike-orange.webp",
      description:
        "Use an object that requires an action to use (objects you'd normally interact with as part of another action don't require the Utilize action).",
    },
    Study: {
      icon: "https://assets.realmvtt.com/icons/scifi/general/magnifying-glass.webp",
      description:
        "Make an Intelligence check to study your memory, a book, a clue, or another source of knowledge and call to mind an important piece of information about it.",
    },
    Influence: {
      icon: "https://assets.realmvtt.com/icons/fantasy/skills/buffs/empowerment-boost.webp",
      description:
        "Urge a monster to do something. The DM decides whether it's Willing (complies, no check), Unwilling (refuses, no check), or Hesitant (an ability check is required). A Hesitant check's default DC is 15 or the monster's Intelligence score, whichever is higher.",
    },
  };

  function useStandardAction(name) {
    const action = STANDARD_ACTIONS[name];
    if (!action) return;
    const iconImg = action.icon ? `![](${action.icon}?width=24&height=24) ` : "";
    let message = `#### ${iconImg}${name} [Action]\n\n---\n\n${action.description}`;
    if (action.effect) {
      message += `\n\n\`\`\`Apply_${action.effect}
let targets = api.getSelectedOrDroppedToken();
targets.forEach(target => {
api.addEffect('${action.effect}', target);
});
\`\`\``;
    }
    api.sendMessage(message, undefined, [], []);
  }
</script>
