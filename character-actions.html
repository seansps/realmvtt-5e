<script>
  function updateSpellLevels() {
    api.setHidden('level9spellsOpen', true);
    api.setHidden('level8spellsOpen', true);
    api.setHidden('level7spellsOpen', true);
    api.setHidden('level6spellsOpen', true);
    api.setHidden('level5spellsOpen', true);
    api.setHidden('level4spellsOpen', true);
    api.setHidden('level3spellsOpen', true);
    api.setHidden('level2spellsOpen', true);
    api.setHidden('level1spellsOpen', true);
    api.setHidden('cantripsOpen', true);

    if (value === undefined || value === null) {
      return;
    }

    if (value >= 9) {
      api.setHidden('level9spellsOpen', false);
    }
    if (value >= 8) {
      api.setHidden('level8spellsOpen', false);
    }
    if (value >= 7) {
      api.setHidden('level7spellsOpen', false);
    }
    if (value >= 6) {
      api.setHidden('level6spellsOpen', false);
    }
    if (value >= 5) {
      api.setHidden('level5spellsOpen', false);
    }
    if (value >= 4) {
      api.setHidden('level4spellsOpen', false);
    }
    if (value >= 3) {
      api.setHidden('level3spellsOpen', false);
    }
    if (value >= 2) {
      api.setHidden('level2spellsOpen', false);
    }
    if (value >= 1) {
      api.setHidden('level1spellsOpen', false);
    }
    if (value >= 0) {
      api.setHidden('cantripsOpen', false);
    }
  }
</script>
