<script>
  function onDropSpell(recordLink) {
    const spell = recordLink?.value;

    // Determine which list to add the spell to
    let spellLevel = spell?.data?.level || '0';
    if (spellLevel === 'Cantrip') {
      spellLevel = '0';
    }
    let spellList = `cantrips`;
    if (spellLevel !== '0') {
      spellList = `spells${spellLevel}`;
    }

    // Set the ability to the most likely relevant ability based on spell
    // list and which classes the character has
    const spellLists = spell?.data?.spellLists || ['Wizard']; // Assume Wizard if not specified
    // Get classes on the character
    const spellClasses = record?.data?.classes || [];
    // Default abiltiy to Intelligence
    let ability = 'intelligence';

    // Find the first class that matches a class in the spell list
    const matchingClass = spellClasses.find(c => spellLists.includes(c?.name));

    if (matchingClass) {
      ability = matchingClass?.data?.spellcastingAbility || 'intelligence';
    }

    // Set the ability
    const spellToAdd = {
      ...spell,
      data: {
        ...spell?.data,
        ability
      }
    }

    const curLength = record?.data?.[spellList]?.length || 0;

    // Add the spell to the list
    api.addValue(`data.${spellList}`, spellToAdd, (updatedRecord) => {
      // If cantrip was added, hide the upcast button
      if (spellLevel === '0') {
        api.setValue(`data.${spellList}.${curLength}.fields.upcastLevel.hidden`, true);
      }
    });
  }

  function onDrop(type, recordLink) {
    if (type === 'spells') {
      onDropSpell(recordLink);
    }
  }

  function updateSpellLevels() {
    api.setHidden(['cantripsOpen', 'level1spellsOpen', 'level2spellsOpen', 'level3spellsOpen', 'level4spellsOpen', 'level5spellsOpen', 'level6spellsOpen', 'level7spellsOpen', 'level8spellsOpen', 'level9spellsOpen'], true, () => {
      if (value === undefined || value === null) {
        return;
      }

      let spellValue = value === 'Cantrip' ? 0 : parseInt(value, 10);

      const valuesToUnhide = [];
      if (spellValue >= 9) {
        valuesToUnhide.push('level9spellsOpen');
      }
      if (spellValue >= 8) {
        valuesToUnhide.push('level8spellsOpen');
      }
      if (spellValue >= 7) {
        valuesToUnhide.push('level7spellsOpen');
      }
      if (spellValue >= 6) {
        valuesToUnhide.push('level6spellsOpen');
      }
      if (spellValue >= 5) {
        valuesToUnhide.push('level5spellsOpen');
      }
      if (spellValue >= 4) {
        valuesToUnhide.push('level4spellsOpen');
      }
      if (spellValue >= 3) {
        valuesToUnhide.push('level3spellsOpen');
      }
      if (spellValue >= 2) {
        valuesToUnhide.push('level2spellsOpen');
      }
      if (spellValue >= 1) {
        valuesToUnhide.push('level1spellsOpen');
      }
      if (spellValue >= 0) {
        valuesToUnhide.push('cantripsOpen');
      }

      api.setHidden(valuesToUnhide, false);
    });
  }

  function updateSpellSlots() {

    const valuesToHide = [];

      || record?.data?.numSpellSlots3 > 0 || record?.data?.numSpellSlots4 > 0 ||
      record?.data?.numSpellSlots5 > 0 || record?.data?.numSpellSlots6 > 0 ||
      record?.data?.numSpellSlots7 > 0 || record?.data?.numSpellSlots8 > 0 ||
      record?.data?.numSpellSlots9 > 0) {
      valuesToUnhide.push('spellSlotsLabel');
    }
    else {
      valuesToHide.push('spellSlotsLabel');
    }
    if (record?.data?.numSpellSlots1 > 0) {
      valuesToUnhide.push('spellSlots1');
    }
    else {
      valuesToHide.push('spellSlots1');
    }
    if (record?.data?.numSpellSlots2 > 0) {

    }

    }

    }

    api.setHidden(valuesToHide, true, () => {
      api.setHidden(valuesToUnhide, false);
    });
  }

  function canAddSpell(spellLevel) {
    // Return true if the given spell being added can be added to the given spell list
    let levelOfSpell = value?.data?.level || 'Cantrip'
    if (levelOfSpell === 'Cantrip') {
      levelOfSpell = '0';
    }
    levelOfSpell = parseInt(levelOfSpell, 10);
    const levelOfList = parseInt(spellLevel, 10);
    return levelOfSpell === levelOfList;
  }

  function getSpellFilters() {
    // If "Hide Unprepared Spells" is checked, filter out unprepared spells
    if (record?.data?.hideUnpreparedSpells) {
      return [{ field: 'prepared', operator: 'not_equals', value: 'unprepared' }];
    }
    return [];
  }

  // Collects all effects and modifiers for the record
  // If types is provided, it will only return effects of those types
  // If field is provided, it will only return effects that match that field
  function getEffectsAndModifiers(types = [], field = '', itemId = undefined) {
    let results = [];

    // First collect modifiers from effects
    const effects = record?.effects || [];
    effects.forEach((effect) => {
      const rules = effect.rules || [];
      rules.forEach((rule) => {
        const ruleType = rule?.type || '';
        const isPenalty = ruleType.toLowerCase().includes('penalty');
        let value = rule.value || '';
        if (rule.valueType === 'number') {
          value = parseInt(rule.value, 10);
          if (isNaN(value)) {
            value = 0;
          }
          if (isPenalty && value > 0) {
            value = -value;
          }
        }
        else if (rule.valueType === 'string' && !value.trim().startsWith('-') && isPenalty) {
          value = '-' + value;
        }
        if (value !== 0 && (rule.valueType === 'number' || rule.valueType === 'string')) {
          results.push({
            name: effect.name || 'Effect',
            value: value,
            active: true,
            modifierType: ruleType,
            field: rule?.field || '',
            valueType: rule.valueType,
            isPenalty: isPenalty
          });
        }
        else if (rule.valueType === 'api') {
          let value = parseInt(record?.effectValues?.[effect?._id] || '0', 10);
          if (isPenalty && value > 0) {
            value = -value;
          }
          if (value !== 0) {
            results.push({
              name: effect.name || 'Effect',
              value: value,
              active: true,
              modifierType: ruleType,
              field: rule?.field || '',
              valueType: rule.valueType,
              isPenalty: isPenalty
            });
          }
        }
        else if (rule.valueType === 'stack') {
          // The value is the number of times they have this effect
          let value = record?.effectIds?.filter(id => id === effect?._id).length;
          if (isPenalty && value > 0) {
            value = -value;
          }
          // Check if there is addtional math to apply to it
          const math = rule?.value || '';
          if (math) {
            value = applyMath(value, math);
          }
          if (value !== 0) {
            results.push({
              name: effect.name || 'Effect',
              value: value,
              active: true,
              modifierType: ruleType,
              field: rule?.field || '',
              valueType: rule.valueType,
              isPenalty: isPenalty
            });
          }
        }
      });
    });

    // Now collect all modifiers from Features and Items
    const features = record?.data?.features || [];
    const items = record?.data?.inventory || [];
    // Filter items that are not equipped or that require attunement and not attuned
    const equippedItems = items.filter(item => item.data?.carried === 'equipped'
      && (!item.data?.attunement || item.data?.attuned === 'true'));
    [...features, ...equippedItems].forEach((feature) => {
      const modifiers = feature.data?.modifiers || [];
      modifiers.forEach((modifier) => {
        const ruleType = modifier.data?.type || '';
        const isPenalty = ruleType.toLowerCase().includes('penalty');
        let value = modifier.data?.value || '';
        if (modifier.data?.valueType === 'number') {
          value = parseInt(modifier.data?.value, 10);
          if (isNaN(value)) {
            value = 0;
          }
          if (isPenalty && value > 0) {
            value = -value;
          }
        }
        else if (modifier.data?.valueType === 'field') {
          const fieldToUse = modifier.data?.value || '';
          if (fieldToUse) {
            value = record?.data?.[fieldToUse] || '';
          }
        }
        else if (modifier.data?.valueType === 'string' && !value.trim().startsWith('-') && isPenalty) {
          value = '-' + value;
        }

        // Only relevant if it has a value
        if (value !== 0) {
          // Check if this only applies to equipped item and mark it with ID if so 
          const itemOnly = modifier.data?.itemOnly || false;
          results.push({
            name: feature?.name || 'Feature',
            value: value,
            active: modifier.data?.active === true,
            modifierType: ruleType,
            field: modifier.data?.field || '',
            valueType: modifier.data?.valueType,
            itemId: itemOnly ? feature?._id : undefined,
            isPenalty: isPenalty
          });
        }
      });
    });

    if (types && types.length > 0) {
      results = results.filter(r => types.includes(r.modifierType));
    }

    if (field && field !== '') {
      results = results.filter(r => r.field === field || r.field === 'all' || !r.field);
    }

    // Filter by itemId if provided
    results = results.filter(r => r.itemId === itemId || r.itemId === undefined);

    return results;
  }

  function rollInitiative() {
    // Roll initiative for the character

    const roll = '1d20';

    // Get modifiers for initiative, which is a dexterity check
    const modifiers = [];

    // Add dexterity modifier
    const dexMod = parseInt(record.data?.dexterityMod || '0', 10);
    modifiers.push({
      name: 'Dexterity',
      value: dexMod,
      active: true
    });

    // Check effects for all initiative bonuses and penalties
    const initiativeModifiers = getEffectsAndModifiers(['initiativeBonus', 'initiativePenalty']);
    initiativeModifiers.forEach(modifier => {
      modifiers.push(modifier);
    });

    const dextertyCheckModifiers = getEffectsAndModifiers(['abilityBonus', 'abilityPenalty'], 'dexterity');
    dextertyCheckModifiers.forEach(modifier => {
      modifiers.push(modifier);
    });

    api.promptRoll('Initiative', roll, modifiers, {
      "rollName": "Initiative",
      "tooltip": "Initiative Roll",
      "dc": 0
    }, 'initiative');
  }
</script>
