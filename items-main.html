<script>
  // Show or hide relavant values based on the type of item
  // gear, melee weapon, ranged weapon, armor, shield, tool, magic item
  // Subtypes are optional and are generally one of:
  // Simple Melee Weapon, Martial Melee Weapon, Simple Ranged Weapon, Martial Ranged Weapon, Light Armor, Medium Armor, Heavy Armor, Ammunition, Treasure, Art Object, Scroll, Potion, Jewelry, Staff, Wand, Clothing
  // Weapon Type is used for weapon masteries and is one of
  // Club, Dagger, Greatclub, Handaxe, Javelin, Light Hammer, Mace, Quarterstaff, Sickle, Spear, Dart, Light Crossbow, Shortbow, Sling, Battleaxe, Flail, Glaive, Greataxe, Greatsword, Halberd, Lance, Longsword, Maul, Morningstar, Pike, Rapier, Scimitar, Shortsword, Trident, Warhammer, War Pick, Whip, Blowgun, Hand Crossbow, Heavy Crossbow, Longbow, Musket, Pistol
  function showHideValues(typeStr) {
    const valuesToHide = [];
    const valuesToShow = [];
    if (typeStr === "melee weapon" || typeStr === "ranged weapon") {
      valuesToShow.push("damage");
      valuesToShow.push("weaponType");
      valuesToShow.push("weaponMastery");
    }
    else {
      valuesToHide.push("damage");
      valuesToHide.push("weaponType");
      valuesToHide.push("weaponMastery");
    }
    if (valuesToHide.length > 0) {
      api.setHidden(valuesToHide, true);
    }
    if (valuesToShow.length > 0) {
      api.setHidden(valuesToShow, false);
    }
  }
</script>
