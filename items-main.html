<script>
  // Show or hide relavant values based on the type of item
  // gear, melee weapon, ranged weapon, armor, shield, tool, magic item, pack
  // Subtypes are optional and are generally one of:
  // Simple Melee Weapon, Martial Melee Weapon, Simple Ranged Weapon, Martial Ranged Weapon, Light Armor, Medium Armor, Heavy Armor, Ammunition, Treasure, Art Object, Scroll, Potion, Jewelry, Staff, Wand, Clothing
  // Weapon Type is used for weapon masteries and is one of
  // Club, Dagger, Greatclub, Handaxe, Javelin, Light Hammer, Mace, Quarterstaff, Sickle, Spear, Dart, Light Crossbow, Shortbow, Sling, Battleaxe, Flail, Glaive, Greataxe, Greatsword, Halberd, Lance, Longsword, Maul, Morningstar, Pike, Rapier, Scimitar, Shortsword, Trident, Warhammer, War Pick, Whip, Blowgun, Hand Crossbow, Heavy Crossbow, Longbow, Musket, Pistol
  function showHideValues(typeStr) {
    const valuesToHide = [];
    const valuesToShow = [];
    if (typeStr === "melee weapon" || typeStr === "ranged weapon") {
      valuesToShow.push("damage");
      valuesToShow.push("weaponType");
      valuesToShow.push("weaponMastery");
      valuesToShow.push("weaponProperties");
    } else {
      valuesToHide.push("damage");
      valuesToHide.push("weaponType");
      valuesToHide.push("weaponMastery");
      valuesToHide.push("weaponProperties");
    }

    if (typeStr === "shield" || typeStr === "armor") {
      valuesToShow.push("armorClass");
    } else {
      valuesToHide.push("armorClass");
    }

    if (typeStr === "armor") {
      valuesToShow.push("armorCategory");
      valuesToShow.push("addDex");
      valuesToShow.push("maxDex");
      valuesToShow.push("strength");
      valuesToShow.push("stealth");
    } else {
      valuesToHide.push("armorCategory");
      valuesToHide.push("addDex");
      valuesToHide.push("maxDex");
      valuesToHide.push("strength");
      valuesToHide.push("stealth");
    }

    if (
      typeStr === "armor" ||
      typeStr === "shield" ||
      typeStr === "melee weapon" ||
      typeStr === "ranged weapon"
    ) {
      valuesToHide.push("consumable");
    } else if (typeStr !== "pack") {
      valuesToShow.push("consumable");
    }

    if (typeStr === "pack") {
      valuesToShow.push("itemListLabel");
      valuesToShow.push("items");
      valuesToShow.push("cp");
      valuesToShow.push("sp");
      valuesToShow.push("ep");
      valuesToShow.push("gp");
      valuesToShow.push("pp");
      valuesToHide.push("rarity");
      valuesToHide.push("consumable");
      valuesToHide.push("attunement");
    } else {
      valuesToHide.push("itemListLabel");
      valuesToHide.push("items");
      valuesToHide.push("cp");
      valuesToHide.push("sp");
      valuesToHide.push("ep");
      valuesToHide.push("gp");
      valuesToHide.push("pp");
      valuesToShow.push("rarity");
      valuesToShow.push("attunement");
    }

    if (valuesToHide.length > 0) {
      api.setHidden(valuesToHide, true);
    }
    if (valuesToShow.length > 0) {
      api.setHidden(valuesToShow, false);
    }
  }

  function showHideValuesSubtype(subtype) {
    const valuesToHide = [];
    const valuesToShow = [];

    if (subtype.toLowerCase().includes("scroll")) {
      valuesToShow.push("spell");
      valuesToShow.push("spellLevel");
    } else {
      valuesToHide.push("spell");
      valuesToHide.push("spellLevel");
    }

    if (valuesToHide.length > 0) {
      api.setHidden(valuesToHide, true);
    }
    if (valuesToShow.length > 0) {
      api.setHidden(valuesToShow, false);
    }
  }

  function showHideConsumableValues(isConsumable) {
    const valuesToHide = [];
    const valuesToShow = [];

    if (isConsumable) {
      valuesToShow.push("effects");
      valuesToShow.push("healing");
      valuesToShow.push("useDamage");
    } else {
      valuesToHide.push("effects");
      valuesToHide.push("healing");
      valuesToHide.push("useDamage");
    }

    if (valuesToHide.length > 0) {
      api.setHidden(valuesToHide, true);
    }
    if (valuesToShow.length > 0) {
      api.setHidden(valuesToShow, false);
    }
  }

  function showHideWeaponValues(values) {
    const valuesToHide = [];
    const valuesToShow = [];
    if (values.includes("Ammunition")) {
      valuesToShow.push("ammoType");
      valuesToShow.push("normalRange");
      valuesToShow.push("maxRange");
      valuesToShow.push("rangeLabel");
    }

    if (values.includes("Range")) {
      valuesToShow.push("normalRange");
      valuesToShow.push("maxRange");
      valuesToShow.push("rangeLabel");
    }

    if (values.includes("Thrown")) {
      valuesToShow.push("normalRange");
      valuesToShow.push("maxRange");
      valuesToShow.push("rangeLabel");
    }

    if (values.includes("Versatile")) {
      valuesToShow.push("versatileDamage");
    }

    if (
      !values.includes("Range") &&
      !values.includes("Thrown") &&
      !values.includes("Ammunition")
    ) {
      valuesToHide.push("normalRange");
      valuesToHide.push("maxRange");
      valuesToHide.push("rangeLabel");
    }

    if (!values.includes("Ammunition")) {
      valuesToHide.push("ammoType");
    }

    if (!values.includes("Versatile")) {
      valuesToHide.push("versatileDamage");
    }

    if (valuesToHide.length > 0) {
      api.setHidden(valuesToHide, true);
    }
    if (valuesToShow.length > 0) {
      api.setHidden(valuesToShow, false);
    }
  }
</script>
