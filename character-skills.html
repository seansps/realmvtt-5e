<script>
  // Collects all effects and modifiers for the record
  // If types is provided, it will only return effects of those types
  // If field is provided, it will only return effects that match that field
  function getEffectsAndModifiers(types = [], field = '') {
    let results = [];

    // First collect modifiers from effects
    const effects = record?.effects || [];
    effects.forEach((effect) => {
      const rules = effect.rules || [];
      rules.forEach((rule) => {
        const ruleType = rule?.type || '';
        const isPenalty = ruleType.toLowerCase().includes('penalty');
        let value = rule.value || '';
        if (rule.valueType === 'number') {
          value = parseInt(rule.value, 10);
          if (isNaN(value)) {
            value = 0;
          }
          if (isPenalty && value > 0) {
            value = -value;
          }
        }
        else if (rule.valueType === 'string' && !value.trim().startsWith('-') && isPenalty) {
          value = '-' + value;
        }
        if (value) {
          results.push({
            name: effect.name || 'Effect',
            value: value,
            active: true,
            modifierType: ruleType,
            field: rule?.field || '',
            valueType: rule.valueType,
            isPenalty: isPenalty
          });
        }
        else if (rule.valueType === 'api') {
          let value = parseInt(record?.effectValues?.[effect?._id] || '0', 10);
          if (isPenalty && value > 0) {
            value = -value;
          }
          if (value !== 0) {
            results.push({
              name: effect.name || 'Effect',
              value: value,
              active: true,
              modifierType: ruleType,
              field: rule?.field || '',
              valueType: rule.valueType,
              isPenalty: isPenalty
            });
          }
        }
        else if (rule.valueType === 'stack') {
          // The value is the number of times they have this effect
          let value = record?.effectIds?.filter(id => id === effect?._id).length;
          if (isPenalty && value > 0) {
            value = -value;
          }
          if (value !== 0) {
            results.push({
              name: effect.name || 'Effect',
              value: value,
              active: true,
              modifierType: ruleType,
              field: rule?.field || '',
              valueType: rule.valueType,
              isPenalty: isPenalty
            });
          }
        }
      });
    });

    // Now collect all modifiers from Features
    const features = record?.data?.features || [];
    features.forEach((feature) => {
      const modifiers = feature.data?.modifiers || [];
      modifiers.forEach((modifier) => {
        const ruleType = modifier.data?.type || '';
        const isPenalty = ruleType.toLowerCase().includes('penalty');
        let value = modifier.data?.value || '';
        if (modifier.data?.valueType === 'number') {
          value = parseInt(modifier.data?.value, 10);
          if (isNaN(value)) {
            value = 0;
          }
          if (isPenalty && value > 0) {
            value = -value;
          }
        }
        else if (modifier.data?.valueType === 'string' && !value.trim().startsWith('-') && isPenalty) {
          value = '-' + value;
        }

        // Only relevant if it has a value
        if (value) {
          results.push({
            name: feature?.name || 'Feature',
            value: value,
            active: modifier.data?.active === true,
            modifierType: ruleType,
            field: modifier.data?.field || '',
            valueType: modifier.data?.valueType,
            isPenalty: isPenalty
          });
        }
      });
    });

    if (types && types.length > 0) {
      results = results.filter(r => types.includes(r.modifierType));
    }

    if (field && field !== '') {
      results = results.filter(r => r.field === field || r.field === 'all');
    }

    return results;
  }

  function getAbilityFromSkill(skill) {
    switch (skill) {
      case 'acrobatics':
        return 'dexterity';
      case 'animalHandling':
        return 'wisdom';
      case 'arcana':
        return 'intelligence';
      case 'athletics':
        return 'strength';
      case 'deception':
        return 'charisma';
      case 'history':
        return 'intelligence';
      case 'insight':
        return 'wisdom';
      case 'intimidation':
        return 'charisma';
      case 'investigation':
        return 'intelligence';
      case 'medicine':
        return 'wisdom';
      case 'nature':
        return 'intelligence';
      case 'perception':
        return 'wisdom';
      case 'performance':
        return 'charisma';
      case 'persuasion':
        return 'charisma';
      case 'religion':
        return 'intelligence';
      case 'sleightOfHand':
        return 'dexterity';
      case 'stealth':
        return 'dexterity';
      case 'survival':
        return 'wisdom';
      default:
        return 'strength'; // Default to strength if no match
    }
  }

  function setProficiencyFor(skill, proficiencyValue, ability) {
    // Skills can be also be half, proficient, or expertise
    const proficiency = proficiencyValue || 'false';
    const isHalfProficient = proficiency === 'half';
    const isExpertise = proficiency === 'expertise';
    const isProficient = proficiency === 'true';
    const abilityMod = parseInt(record?.data?.[`${ability}Mod`] || '0', 10);
    const proficiencyBonus = parseInt(record?.data?.proficiencyBonus || '0', 10);
    let proficiencyMod = 0;

    const valuesToSet = {};

    if (isHalfProficient) {
      proficiencyMod = abilityMod + Math.floor(proficiencyBonus / 2);
      valuesToSet[`data.${skill}Mod`] = proficiencyMod;
    }
    else if (isExpertise) {
      proficiencyMod = abilityMod + (proficiencyBonus * 2);
      valuesToSet[`data.${skill}Mod`] = proficiencyMod;
    }
    else if (isProficient) {
      proficiencyMod = abilityMod + proficiencyBonus;
      valuesToSet[`data.${skill}Mod`] = proficiencyMod;
    }
    else {
      proficiencyMod = abilityMod;
      valuesToSet[`data.${skill}Mod`] = proficiencyMod;
    }

    // Set a hidden field for passivePerception if this is for perception
    if (skill === 'perception') {
      valuesToSet['data.passivePerception'] = proficiencyMod;
    }

    api.setValues(valuesToSet);
  }

  function setProficiency(value, skill) {
    const ability = record?.data?.[`${skill}Ability`] || getAbilityFromSkill(skill);
    setProficiencyFor(skill, value, ability);
  }

  function onAbilityChange(ability, skill) {
    const proficiency = record?.data?.[`${skill}Prof`] || 'false';
    setProficiencyFor(skill, proficiency, ability);
  }

  function camelToNormal(skill) {
    return skill.replace(/([A-Z])/g, ' $1').replace(/^./, function (str) { return str.toUpperCase(); });
  }

  function rollCheck(skill) {
    const ability = record?.data?.[`${skill}Ability`] || getAbilityFromSkill(skill);
    const mod = `${ability}Mod`;

    const modifiers = [];
    let abilityMod = parseInt(record?.data?.[mod] || '0', 10);
    if (abilityMod === undefined || isNaN(abilityMod)) {
      abilityMod = 0;
    }

    const proficiencyBonus = parseInt(record?.data?.proficiencyBonus || '0', 10);
    const proficiency = record?.data?.[`${skill}Prof`] || 'false';
    const isHalfProficient = proficiency === 'half';
    const isExpertise = proficiency === 'expertise';
    const isProficient = proficiency === 'true';

    modifiers.push({
      name: ability,
      value: abilityMod,
      active: true,
    });

    if (isHalfProficient) {
      modifiers.push({
        name: 'Half Proficiency',
        value: Math.floor(proficiencyBonus / 2),
        active: true,
      });
    }
    else if (isExpertise) {
      modifiers.push({
        name: 'Expertise',
        value: proficiencyBonus * 2,
        active: true,
      });
    }
    else if (isProficient) {
      modifiers.push({
        name: 'Proficient',
        value: proficiencyBonus,
        active: true,
      });
    }

    // Get any bonus or penalties for abilities and skills
    const checkModifiers = getEffectsAndModifiers(['abilityBonus', 'abilityPenalty'], ability);
    checkModifiers.forEach(modifier => {
      modifiers.push(modifier);
    });

    const skillModifiers = getEffectsAndModifiers(['skillBonus', 'skillPenalty'], skill);
    skillModifiers.forEach(modifier => {
      modifiers.push(modifier);
    });

    const metadata = {
      "rollName": `${camelToNormal(skill)}`,
      "tooltip": `${camelToNormal(ability)} (${camelToNormal(skill)}) Check`,
      "dc": 0,
    }
    api.promptRoll(`${camelToNormal(ability)} (${camelToNormal(skill)}) Check`, "1d20", modifiers, metadata, 'ability');
  }
</script>
