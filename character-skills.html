<script>
  function capitalize(string) {
    if (!string || typeof string !== 'string') return '';
    return string.charAt(0).toUpperCase() + string.slice(1);
  }

  function getAbilityFromSkill(skill) {
    switch (skill) {
      case 'acrobatics':
        return 'dexterity';
      case 'animalHandling':
        return 'wisdom';
      case 'arcana':
        return 'intelligence';
      case 'athletics':
        return 'strength';
      case 'deception':
        return 'charisma';
      case 'history':
        return 'intelligence';
      case 'insight':
        return 'wisdom';
      case 'intimidation':
        return 'charisma';
      case 'investigation':
        return 'intelligence';
      case 'medicine':
        return 'wisdom';
      case 'nature':
        return 'intelligence';
      case 'perception':
        return 'wisdom';
      case 'performance':
        return 'charisma';
      case 'persuasion':
        return 'charisma';
      case 'religion':
        return 'intelligence';
      case 'sleightOfHand':
        return 'dexterity';
      case 'stealth':
        return 'dexterity';
      case 'survival':
        return 'wisdom';
      default:
        return 'strength'; // Default to strength if no match
    }
  }

  function setProficiencyFor(skill, proficiencyValue, ability) {
    // Skills can be also be half, proficient, or expertise
    const proficiency = proficiencyValue || 'false';
    const isHalfProficient = proficiency === 'half';
    const isExpertise = proficiency === 'expertise';
    const isProficient = proficiency === 'true';
    const abilityMod = parseInt(record?.data?.[`${ability}Mod`] || '0', 10);
    const proficiencyBonus = parseInt(record?.data?.proficiencyBonus || '0', 10);
    let proficiencyMod = 0;

    const valuesToSet = {};

    if (isHalfProficient) {
      proficiencyMod = abilityMod + Math.floor(proficiencyBonus / 2);
      valuesToSet[`data.${skill}Mod`] = proficiencyMod;
    }
    else if (isExpertise) {
      proficiencyMod = abilityMod + (proficiencyBonus * 2);
      valuesToSet[`data.${skill}Mod`] = proficiencyMod;
    }
    else if (isProficient) {
      proficiencyMod = abilityMod + proficiencyBonus;
      valuesToSet[`data.${skill}Mod`] = proficiencyMod;
    }
    else {
      proficiencyMod = abilityMod;
      valuesToSet[`data.${skill}Mod`] = proficiencyMod;
    }

    // Set a hidden field for passivePerception if this is for perception
    if (skill === 'perception') {
      valuesToSet['data.passivePerception'] = proficiencyMod;
    }

    api.setValues(valuesToSet);
  }

  function setProficiency(value, skill) {
    const ability = record?.data?.[`${skill}Ability`] || getAbilityFromSkill(skill);
    setProficiencyFor(skill, value, ability);
  }

  function onAbilityChange(ability, skill) {
    const proficiency = record?.data?.[`${skill}Prof`] || 'false';
    setProficiencyFor(skill, proficiency, ability);
  }

  function rollCheck(skill) {
    const ability = record?.data?.[`${skill}Ability`] || getAbilityFromSkill(skill);
    const mod = `${ability}Mod`;

    const modifiers = [];
    let abilityMod = parseInt(record?.data?.[mod] || '0', 10);
    if (abilityMod === undefined || isNaN(abilityMod)) {
      abilityMod = 0;
    }

    const proficiencyBonus = parseInt(record?.data?.proficiencyBonus || '0', 10);
    const proficiency = record?.data?.[`${skill}Prof`] || 'false';
    const isHalfProficient = proficiency === 'half';
    const isExpertise = proficiency === 'expertise';
    const isProficient = proficiency === 'true';

    modifiers.push({
      name: ability,
      value: abilityMod,
      active: true,
    });

    if (isHalfProficient) {
      modifiers.push({
        name: 'Half Proficiency',
        value: Math.floor(proficiencyBonus / 2),
        active: true,
      });
    }
    else if (isExpertise) {
      modifiers.push({
        name: 'Expertise',
        value: proficiencyBonus * 2,
        active: true,
      });
    }
    else if (isProficient) {
      modifiers.push({
        name: 'Proficient',
        value: proficiencyBonus,
        active: true,
      });
    }

    const metadata = {
      "rollName": `${capitalize(skill)}`,
      "tooltip": `${capitalize(ability)} (${capitalize(skill)}) Check`,
      "dc": 0,
    }
    api.promptRoll(`${capitalize(ability)} (${capitalize(skill)}) Check`, "1d20", modifiers, metadata, 'ability');
  }
</script>
