<script>
  function setProficiencyFor(skill, proficiencyValue, ability) {
    // Skills can be also be half, proficient, or expertise
    const proficiency = proficiencyValue || "false";
    const isHalfProficient = proficiency === "half";
    const isExpertise = proficiency === "expertise";
    const isProficient = proficiency === "true";
    const abilityMod = parseInt(record?.data?.[`${ability}Mod`] || "0", 10);
    const proficiencyBonus = parseInt(
      record?.data?.proficiencyBonus || "0",
      10,
    );
    let proficiencyMod = 0;

    const valuesToSet = {};

    if (isHalfProficient) {
      proficiencyMod = abilityMod + Math.floor(proficiencyBonus / 2);
    } else if (isExpertise) {
      proficiencyMod = abilityMod + proficiencyBonus * 2;
    } else if (isProficient) {
      proficiencyMod = abilityMod + proficiencyBonus;
    } else {
      proficiencyMod = abilityMod;
    }

    setSkillModAndPassive(valuesToSet, record, skill, proficiencyMod);

    api.setValues(valuesToSet);
  }

  function backfillPassiveSkills() {
    const skills = ["perception", "investigation", "insight"];
    const valuesToSet = {};
    skills.forEach((skill) => {
      const passiveKey = `data.passive${skill.charAt(0).toUpperCase() + skill.slice(1)}`;
      const current =
        record?.data?.[
          `passive${skill.charAt(0).toUpperCase() + skill.slice(1)}`
        ];
      if (current === undefined || current === null) {
        const mod = parseInt(record?.data?.[`${skill}Mod`] || "0", 10) || 0;
        valuesToSet[passiveKey] = calcPassiveSkillFromMod(record, skill, mod);
      }
    });
    if (Object.keys(valuesToSet).length > 0) {
      api.setValues(valuesToSet);
    }
  }

  function onSkillModChange(value, skill) {
    let mod = parseInt(value, 10);
    if (mod === undefined || isNaN(mod)) {
      mod = 0;
    }
    api.setValue(
      `data.passive${skill.charAt(0).toUpperCase() + skill.slice(1)}`,
      calcPassiveSkillFromMod(record, skill, mod),
    );
  }

  function setProficiency(value, skill) {
    const ability =
      record?.data?.[`${skill}Ability`] || getAbilityFromSkill(skill);
    setProficiencyFor(skill, value, ability);
  }

  function onAbilityChange(ability, skill) {
    const proficiency = record?.data?.[`${skill}Prof`] || "false";
    setProficiencyFor(skill, proficiency, ability);
  }

  function rollCheck(skill) {
    const ability =
      record?.data?.[`${skill}Ability`] || getAbilityFromSkill(skill);
    const mod = `${ability}Mod`;

    let modifiers = [];
    let abilityMod = parseInt(record?.data?.[mod] || "0", 10);
    if (abilityMod === undefined || isNaN(abilityMod)) {
      abilityMod = 0;
    }

    const proficiencyBonus = parseInt(
      record?.data?.proficiencyBonus || "0",
      10,
    );
    const proficiency = record?.data?.[`${skill}Prof`] || "false";
    const isHalfProficient = proficiency === "half";
    const isExpertise = proficiency === "expertise";
    const isProficient = proficiency === "true";

    modifiers.push({
      name: ability,
      value: abilityMod,
      active: true,
    });

    if (isHalfProficient) {
      modifiers.push({
        name: "Half Proficiency",
        value: Math.floor(proficiencyBonus / 2),
        active: true,
      });
    } else if (isExpertise) {
      modifiers.push({
        name: "Expertise",
        value: proficiencyBonus * 2,
        active: true,
      });
    } else if (isProficient) {
      modifiers.push({
        name: "Proficient",
        value: proficiencyBonus,
        active: true,
      });
    }

    // Get any bonus or penalties for abilities and skills
    const checkModifiers = getEffectsAndModifiers(
      ["abilityBonus", "abilityPenalty"],
      ability,
    );
    checkModifiers.forEach((modifier) => {
      modifiers.push(modifier);
    });

    const skillModifiers = getEffectsAndModifiers(
      ["skillBonus", "skillPenalty"],
      skill,
    );
    skillModifiers.forEach((modifier) => {
      modifiers.push(modifier);
    });

    // If we're proficient, get bonues that apply only to proficient checks
    if (isProficient) {
      const proficientModifiers = getEffectsAndModifiers(
        ["skillBonus"],
        "proficient",
      );
      proficientModifiers.forEach((modifier) => {
        // Only add if not already in the array
        if (
          !modifiers.some(
            (m) =>
              m.name === modifier.name &&
              m.value === modifier.value &&
              m.active === modifier.active,
          )
        ) {
          modifiers.push(modifier);
        }
      });
    }

    const minRoll = getMinRollModifier(modifiers);
    // Filter these out of the modifiers array, we don't need them to be toggleable
    modifiers = modifiers.filter(
      (m) => !m.value.toString().startsWith("minroll"),
    );

    const metadata = {
      rollName: `${camelToNormal(skill)}`,
      tooltip: `${camelToNormal(ability)} (${camelToNormal(skill)}) Check`,
      dc: 0,
      minRoll: minRoll,
    };
    api.promptRoll(
      `${camelToNormal(ability)} (${camelToNormal(skill)}) Check`,
      "1d20",
      modifiers,
      metadata,
      "ability",
    );
  }
</script>
