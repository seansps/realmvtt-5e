<script>
	function getSaveValue(profBonus, prof, attribute) {
		const isProficient = prof === 'true';

		const modField = `${attribute}Mod`;
		const saveField = `${attribute}Save`;

		let modVal = parseInt(record?.data?.[modField] || '0', 10);
		if (isNaN(modVal)) {
			modVal = 0;
		}

		const savVal = isProficient ? modVal + profBonus : modVal;
		return {
			field: `data.${saveField}`,
			value: savVal
		};
	}

	// Collects all effects and modifiers for the record
	// If types is provided, it will only return effects of those types
	// If field is provided, it will only return effects that match that field
	function getEffectsAndModifiers(types = [], field = '') {
		let results = [];

		// First collect modifiers from effects
		const effects = record?.effects || [];
		effects.forEach((effect) => {
			const rules = effect.rules || [];
			rules.forEach((rule) => {
				const ruleType = rule?.type || '';
				const isPenalty = ruleType.toLowerCase().includes('penalty');
				let value = rule.value || '';
				if (rule.valueType === 'number') {
					value = parseInt(rule.value, 10);
					if (isNaN(value)) {
						value = 0;
					}
					if (isPenalty && value > 0) {
						value = -value;
					}
				}
				else if (rule.valueType === 'string' && !value.trim().startsWith('-') && isPenalty) {
					value = '-' + value;
				}
				if (value !== 0) {
					results.push({
						name: effect.name || 'Effect',
						value: value,
						active: true,
						modifierType: ruleType,
						field: rule?.field || '',
						valueType: rule.valueType,
						isPenalty: isPenalty
					});
				}
				else if (rule.valueType === 'api') {
					let value = parseInt(record?.effectValues?.[effect?._id] || '0', 10);
					if (isPenalty && value > 0) {
						value = -value;
					}
					if (value !== 0) {
						results.push({
							name: effect.name || 'Effect',
							value: value,
							active: true,
							modifierType: ruleType,
							field: rule?.field || '',
							valueType: rule.valueType,
							isPenalty: isPenalty
						});
					}
				}
				else if (rule.valueType === 'stack') {
					// The value is the number of times they have this effect
					let value = record?.effectIds?.filter(id => id === effect?._id).length;
					if (isPenalty && value > 0) {
						value = -value;
					}
					if (value !== 0) {
						results.push({
							name: effect.name || 'Effect',
							value: value,
							active: true,
							modifierType: ruleType,
							field: rule?.field || '',
							valueType: rule.valueType,
							isPenalty: isPenalty
						});
					}
				}
			});
		});

		// Now collect all modifiers from Features
		const features = record?.data?.features || [];
		features.forEach((feature) => {
			const modifiers = feature.data?.modifiers || [];
			modifiers.forEach((modifier) => {
				const ruleType = modifier.data?.type || '';
				const isPenalty = ruleType.toLowerCase().includes('penalty');
				let value = modifier.data?.value || '';
				if (modifier.data?.valueType === 'number') {
					value = parseInt(modifier.data?.value, 10);
					if (isNaN(value)) {
						value = 0;
					}
					if (isPenalty && value > 0) {
						value = -value;
					}
				}
				else if (modifier.data?.valueType === 'field') {
					const fieldToUse = modifier.data?.value || '';
					if (fieldToUse) {
						value = record?.data?.[fieldToUse] || '';
					}
				}
				else if (modifier.data?.valueType === 'string' && !value.trim().startsWith('-') && isPenalty) {
					value = '-' + value;
				}

				// Only relevant if it has a value
				if (value !== 0) {
					results.push({
						name: feature?.name || 'Feature',
						value: value,
						active: modifier.data?.active === true,
						modifierType: ruleType,
						field: modifier.data?.field || '',
						valueType: modifier.data?.valueType,
						isPenalty: isPenalty
					});
				}
			});
		});

		if (types && types.length > 0) {
			results = results.filter(r => types.includes(r.modifierType));
		}

		if (field && field !== '') {
			results = results.filter(r => r.field === field || r.field === 'all');
		}

		return results;
	}

	function updateHitPoints(newClass, newLevel, totalLevel, newHitDie, additionalPrompt) {
		// Here we update the characters HP and set a hidden value `hpByLevel` to track 
		// the HP received at each level
		// For levels > 1 we prompt the user to determine if they are rolling or taking the average
		const hpByLevel = record?.data?.hpByLevel || '[]';
		const hpByLevelArr = JSON.parse(hpByLevel);

		const callback = (values) => {
			if (values.length >= 1) {
				const value = values[0];
				// Here we set the HP by Level string for this level with the average roll
				// or trigger a roll of type hitpoints with the given roll
				if (value.startsWith('value-')) {
					// Add it to map for record keeping
					const addHp = parseInt(value.replace('value-', ''), 10);
					hpByLevelArr.push({
						className: newClass,
						level: newLevel,
						hitDie: newHitDie,
						hp: addHp
					});

					// Get CON mod
					const conMod = parseInt(record?.data?.constitutionMod || '0', 10);
					// Add addHP + conMod
					let hpToAdd = addHp + conMod;
					// Add rolled value min of 1 after CON MOD
					if (hpToAdd < 0) { hpToAdd = 1; }
					const curHp = parseInt(record?.data?.curhp || '0', 10);

					// Calculate current max HP
					let curHpMax = getHpForLevel(conMod, totalLevel, hpByLevelArr);

					const hpValuesToSet = {
						'data.curhp': curHp + hpToAdd,
						'data.hitpoints': curHpMax + hpToAdd,
						'data.hpByLevel': JSON.stringify(hpByLevelArr)
					};

					// Add a hitdie
					const hitDieField = `${newHitDie}HitDie`;
					const numHitDie = parseInt(record?.data?.[hitDieField] || '0', 10);
					hpValuesToSet[`data.${hitDieField}`] = numHitDie + 1;

					// Set values
					api.setValues(hpValuesToSet);

					// Send a Message
					const newHp = curHpMax + hpToAdd;
					const characterName = record?.name || 'New Character';
					const message = `Added 1 Level of ${newClass} to ${characterName}.\n\n[color=green]New Hit Point Total:[/color] ${newHp}`;
					api.sendMessage(message, undefined, [], []);
				}
				else {
					api.roll(newHitDie, {
						className: newClass,
						newLevel: newLevel,
						totalLevel: totalLevel,
						newHitDie: newHitDie
					}, 'hitpoints');
				}
			}

			if (additionalPrompt) {
				additionalPrompt();
			}
		}

		const hitDieValue = parseInt(newHitDie.replace('d', ''), 10);
		if (hitDieValue === 0 || isNaN(hitDieValue)) { return; }
		const avg = Math.floor(hitDieValue / 2) + 1;

		if (totalLevel > 1) {
			// Prompt for method
			const text = `Select Average or Roll...`;
			const options = [
				{
					label: `Average (${avg})`,
					value: `value-${avg}`,
				},
				{
					label: `Roll (${newHitDie})`,
					value: newHitDie
				}
			]
			api.showPrompt('New Level Hit Points', 'Select Hit Point Method', text, options, null, callback);
		}
		else {
			// Just call callback with max value
			callback([`value-${hitDieValue}`]);
		}
	}

	function setSave(prof, attribute) {
		const isProficient = prof === 'true';

		const modField = `${attribute}Mod`;
		const saveField = `${attribute}Save`;

		let proficiencyBonus = parseInt(record?.data?.['proficiencyBonus'] || '0', 10);
		if (isNaN(proficiencyBonus)) {
			proficiencyBonus = 0;
		}

		let modVal = parseInt(record?.data?.[modField] || '0', 10);
		if (isNaN(modVal)) {
			modVal = 0;
		}

		const savVal = isProficient ? modVal + proficiencyBonus : modVal;
		api.setValue(`data.${saveField}`, savVal);
	}

	// On update of PB, update Saves and Skills
	function updateProficiencies(value, recordOverride) {
		const thisRecord = recordOverride || record;
		const val = parseInt(value, 10);
		if (isNaN(val)) {
			return;
		}

		const valuesToSet = {};
		['strength', 'constitution', 'dexterity', 'intelligence', 'wisdom', 'charisma'].forEach((attribute) => {
			const isProficient = thisRecord?.data?.[`${attribute}Prof`] || 'false';
			const saveValue = getSaveValue(value, isProficient, attribute);
			valuesToSet[saveValue.field] = saveValue.value;
		});

		getSkills().forEach((skill) => {
			// Skills can be also be half, proficient, or expertise
			const proficiency = thisRecord?.data?.[`${skill.field}Prof`] || 'false';
			const isHalfProficient = proficiency === 'half';
			const isExpertise = proficiency === 'expertise';
			const isProficient = proficiency === 'true';
			// Get the ability being used for this skill, fallback to the skill's default
			const ability = thisRecord?.data?.[`${skill.field}Ability`] || skill.ability;
			const abilityMod = parseInt(thisRecord?.data?.[`${ability}Mod`] || '0', 10);
			if (isHalfProficient) {
				valuesToSet[`data.${skill.field}Mod`] = abilityMod + (Math.floor(value / 2));
			}
			else if (isExpertise) {
				valuesToSet[`data.${skill.field}Mod`] = abilityMod + (value * 2);
			}
			else if (isProficient) {
				valuesToSet[`data.${skill.field}Mod`] = abilityMod + value;
			}
			else {
				valuesToSet[`data.${skill.field}Mod`] = abilityMod;
			}
		});

		// Also update otherSkills
		const otherSkills = record?.data?.otherSkills || [];
		otherSkills.forEach((skill, index) => {
			const ability = skill?.data?.ability || 'strength';
			const abilityMod = parseInt(thisRecord?.data?.[`${ability}Mod`] || '0', 10);
			// Skills can be also be half, proficient, or expertise
			const proficiency = skill?.data?.skillProf || 'false';
			const isHalfProficient = proficiency === 'half';
			const isExpertise = proficiency === 'expertise';
			const isProficient = proficiency === 'true';
			if (isHalfProficient) {
				valuesToSet[`data.otherSkills.${index}.data.skillMod`] = abilityMod + (Math.floor(value / 2));
			}
			else if (isExpertise) {
				valuesToSet[`data.otherSkills.${index}.data.skillMod`] = abilityMod + (value * 2);
			}
			else if (isProficient) {
				valuesToSet[`data.otherSkills.${index}.data.skillMod`] = abilityMod + value;
			}
			else {
				valuesToSet[`data.otherSkills.${index}.data.skillMod`] = abilityMod;
			}
		});

		api.setValues(valuesToSet);
	}

	function getProficiencyBonus(level) {
		if (level <= 4) {
			return 2;
		}
		if (level <= 8) {
			return 3;
		}
		if (level <= 12) {
			return 4;
		}
		if (level <= 16) {
			return 5;
		}
		if (level <= 20) {
			return 6;
		}
		if (level <= 24) {
			return 7;
		}
		if (level <= 28) {
			return 8;
		}
		return 9;
	}

	// This function tries to guess the ability for a tool,
	// defaults to strength if we do not know
	function guessAbility(tool) {
		const lower = tool.toLowerCase();
		if (lower.includes("thieve")) {
			return 'dexterity';
		}
		if (lower.includes('alchemist')) {
			return 'intelligence';
		}
		if (lower === 'brewer') {
			return 'intelligence';
		}
		if (lower.includes('calligrapher')) {
			return 'dexterity';
		}
		if (lower.includes('carpenter')) {
			return 'strength';
		}
		if (lower.includes('cartographer')) {
			return 'wisdom';
		}
		if (lower.includes('cobbler')) {
			return 'dexterity';
		}
		if (lower.includes('cook')) {
			return 'wisdom';
		}
		if (lower.includes('glassblower')) {
			return 'intelligence';
		}
		if (lower.includes('jeweler')) {
			return 'intelligence';
		}
		if (lower.includes('leatherworker')) {
			return 'dexterity';
		}
		if (lower.includes('mason')) {
			return 'strength';
		}
		if (lower.includes('painter')) {
			return 'wisdom';
		}
		if (lower.includes('potter')) {
			return 'intelligence';
		}
		if (lower.includes('smith')) {
			return 'strength';
		}
		if (lower.includes('tinker')) {
			return 'dexterity';
		}
		if (lower.includes('weaver')) {
			return 'dexterity';
		}
		if (lower.includes('woodcarver')) {
			return 'dexterity';
		}
		if (lower.includes('disguise')) {
			return 'charisma';
		}
		if (lower.includes('forgery')) {
			return 'dexterity';
		}
		if (lower.includes('gaming')) {
			return 'wisdom';
		}
		if (lower.includes('herbalism')) {
			return 'intelligence';
		}
		if (lower.includes("navigator")) {
			return 'wisdom';
		}
		if (lower.includes('poisoner')) {
			return 'intelligence';
		}
		if (lower.includes('instrument') || lower.includes('lute') || lower.includes('harp')
			|| lower.includes('lyre') || lower.includes('flute') || lower.includes('drum')
			|| lower.includes('bagpipe') || lower.includes('dulcimer') || lower.includes('sing')) {
			return 'charisma';
		}

		return "strength";
	}

	}) {
		// Determine if we should hide/unhide spell slots and labels

			|| numSpellSlots3 > 0 || numSpellSlots4 > 0 ||

			numSpellSlots5 === 0 && numSpellSlots6 === 0 &&

	function getSkillChoices(classObj, isMulticlass) {
		// From the given class object, parse the options of skill choices
		// From the format: `Choose X: (Skill1, Skill2, Skill3)` OR `Y skill of your choice` where X is an int and Y is a spelled number 1-10
		const skillProficiencies = classObj?.data?.skillProficiencies || '';
		const skillProficienciesMulti = classObj?.data?.skillProficienciesMulti || '';

		// Regular expression to extract the number of choices and the skills list
		const choicePattern = /[Cc]hoose (\d+): ([^)]+)/;
		const choiceMatch = skillProficiencies.match(choicePattern);
		const choiceAnyPattern = /[Cc]hoose any (\d+) skills/;
		const choiceAnyMatch = skillProficiencies.match(choiceAnyPattern);

		let numChoices = 0;
		let skills = [];

		if (choiceMatch) {
			numChoices = parseInt(choiceMatch[1], 10); // Number of skills to choose
			skills = choiceMatch[2].split(',').map(s => s.trim().replace('or ', '')).filter(s => s !== ''); // Array of skill names
		}
		else if (choiceAnyMatch) {
			numChoices = parseInt(choiceAnyMatch[1], 10); // Number of skills to choose
			skills = getSkills().map(s => s.name);
		}

		// If we are multiclassing parse the number of choices we get
		if (isMulticlass) {
			// Handle the case where the format is "Y skill of your choice"
			const spelledNumberPattern = /(\w+) skill of your choice/;
			const spelledMatch = skillProficienciesMulti.toLowerCase().match(spelledNumberPattern);
			if (spelledMatch) {
				const numWords = {
					one: 1, two: 2, three: 3, four: 4, five: 5,
					six: 6, seven: 7, eight: 8, nine: 9, ten: 10
				};
				numChoices = numWords[spelledMatch[1].toLowerCase()] || 0;
			}
		}

		// Return null if no valid format is found
		return {
			numChoices,
			skills
		};
	}

	function normalToCamelCase(str) {
		return str.toLowerCase().replace(/\s+(.)/g, (match, char) => char.toUpperCase());
	}

	function promptSkillChoices(classObj, isMulticlass) {
		const skillChoices = getSkillChoices(classObj, isMulticlass);
		if (skillChoices.numChoices > 0 && skillChoices.skills.length > 0) {
			// Prompt the user to choose the skills, on callback, we set proficiencies 
			// on the chosen skills
			const skillSelection = (values) => {
				if (values.length > 0) {
					const proficiencyBonus = parseInt(api.getValue('data.proficiencyBonus') || '2', 10);

					const valuesToSet = {};
					values.forEach(skill => {
						valuesToSet[`data.${skill}Prof`] = 'true';
						// We also need to get the relavant ability score and set the proficiency
						const ability = api.getValue(`data.${skill}Ability`) || getDefaultAbilityForSkillField(skill);;
						const abilityMod = parseInt(api.getValue(`data.${ability}Mod`) || '0', 10);
						// Basic proficiency, so add the whole bonus to the modifier
						valuesToSet[`data.${skill}Mod`] = abilityMod + proficiencyBonus;
					});

					api.setValues(valuesToSet);
				}
			}

			// We need to prompt with options to select a subclass
			const options = skillChoices.skills.map(skill => ({
				label: skill,
				// In code we use camelCase, so we need to convert from normal to camelCase
				value: normalToCamelCase(skill)
			}));

			const adjective = isMulticlass ? 'Multiclass' : 'Starting';

			api.showPrompt(`Choose ${adjective} Skills`, 'Skills', `Select ${skillChoices.numChoices} Skills...`, options, null, skillSelection, 'OK', 'Cancel', skillChoices.numChoices);
		}
	}

	// Return a map of spell slot fields to set for the given list of 
	// current classes, subclasses, the class object for the new class,
	// and the total level of the character
	function getSpellSlotFields(classes, subclasses, classString, classObj, level, newClassLevel) {
		// If we're multiclasses, we use the multiclass settings
		const isMulticlass = classes.length > 1
			|| (classes.find(c => c._id !== classObj._id));

		const casterType = classObj?.data?.casterType || 'None';
		const fieldsToSet = {};
		let highestSpellLevel = undefined;

		// Also check if it requires a subclass
		const subclassOptions = (classObj?.data?.requiredSubclass || '').split(',').map(s => s.trim()).filter(s => s !== '');
		const requiredSubclass = subclassOptions.length > 0;
		let meetsRequirements = true;
		if (requiredSubclass) {
			meetsRequirements = subclasses.some(s => subclassOptions.includes(s?.name || ''));
		}

		if (!isMulticlass && casterType === 'Spellcasting' && meetsRequirements) {
			const spellSlots = [1, 2, 3, 4, 5, 6, 7, 8, 9].map(spellLevel => classObj?.data?.[`level${level}spell${spellLevel}`] || 0);
			fieldsToSet[`data.numSpellSlots1`] = spellSlots[0];
			fieldsToSet[`data.numSpellSlots2`] = spellSlots[1];
			fieldsToSet[`data.numSpellSlots3`] = spellSlots[2];
			fieldsToSet[`data.numSpellSlots4`] = spellSlots[3];
			fieldsToSet[`data.numSpellSlots5`] = spellSlots[4];
			fieldsToSet[`data.numSpellSlots6`] = spellSlots[5];
			fieldsToSet[`data.numSpellSlots7`] = spellSlots[6];
			fieldsToSet[`data.numSpellSlots8`] = spellSlots[7];
			fieldsToSet[`data.numSpellSlots9`] = spellSlots[8];
			// Calculate the highest spell level that has slots available
			highestSpellLevel = spellSlots.findIndex(slots => slots === 0);
			if (highestSpellLevel === -1) {
				highestSpellLevel = 9;
			}
		}
		else if (isMulticlass) {
			// Get total levels of all spellcasting classes
			let spellCasterLevel = 0;
			let allClasses = [...classes];
			if (!allClasses.find(c => c._id === classObj._id)) {
				allClasses.push(classObj);
			}
			allClasses.forEach(c => {
				const className = c?.name;
				const multiclassSetting = c?.data?.multiclassSpellcaster || 'No';
				// Use regex to safely escape special characters in className and match the level number
				if (multiclassSetting !== 'No') {
					const safeClassName = className.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
					const regex = new RegExp(`(${safeClassName}\\s+(\\d+))`, 'i');
					const classLevelMatch = classString.match(regex);
					if (classLevelMatch && classLevelMatch[2]) {
						const classLevel = parseInt(classLevelMatch[2], 10);
						if (multiclassSetting.toLowerCase().includes('each')) {
							spellCasterLevel += classLevel;
						}
						else if (multiclassSetting.toLowerCase().includes('half')) {
							spellCasterLevel += Math.ceil(classLevel / 2);
						}
						else if (multiclassSetting.toLowerCase().includes('third')) {
							// Check if subclass exists
							const subclasesToCheck = (c?.data?.multiclassSpellcasterSubclass || '').split(',').map(s => s.trim());
							if (subclasses.find(s => subclasesToCheck.includes(s?.name || ''))) {
								spellCasterLevel += Math.floor(classLevel / 3);
							}
						}
					}
				}
			});

			if (spellCasterLevel > 0) {
				const spellSlots = getSpellSlotCount(spellCasterLevel);
				fieldsToSet[`data.numSpellSlots1`] = spellSlots[0];
				fieldsToSet[`data.numSpellSlots2`] = spellSlots[1];
				fieldsToSet[`data.numSpellSlots3`] = spellSlots[2];
				fieldsToSet[`data.numSpellSlots4`] = spellSlots[3];
				fieldsToSet[`data.numSpellSlots5`] = spellSlots[4];
				fieldsToSet[`data.numSpellSlots6`] = spellSlots[5];
				fieldsToSet[`data.numSpellSlots7`] = spellSlots[6];
				fieldsToSet[`data.numSpellSlots8`] = spellSlots[7];
				fieldsToSet[`data.numSpellSlots9`] = spellSlots[8];
				highestSpellLevel = spellSlots.findIndex(slots => slots === 0);
				if (highestSpellLevel === -1) {
					highestSpellLevel = 9;
				}
			}
		}

		// If the Caster Type is Pact Magic, we just add the pact magic slots
		if (casterType === 'Pact Magic') {
			// Warlocks only use their own level, no multiclassing level
			const pactSlots = [1, 2, 3, 4, 5, 6, 7, 8, 9].map(spellLevel => parseInt(classObj?.data?.[`level${newClassLevel}spell${spellLevel}`] || '0', 10));
			fieldsToSet[`data.numPactMagic1`] = pactSlots[0];
			fieldsToSet[`data.numPactMagic2`] = pactSlots[1];
			fieldsToSet[`data.numPactMagic3`] = pactSlots[2];
			fieldsToSet[`data.numPactMagic4`] = pactSlots[3];
			fieldsToSet[`data.numPactMagic5`] = pactSlots[4];
			fieldsToSet[`data.numPactMagic6`] = pactSlots[5];
			fieldsToSet[`data.numPactMagic7`] = pactSlots[6];
			fieldsToSet[`data.numPactMagic8`] = pactSlots[7];
			fieldsToSet[`data.numPactMagic9`] = pactSlots[8];

			let highestPactLevel = pactSlots.findIndex(slots => slots === 0);
			if (highestPactLevel === -1) {
				highestPactLevel = 9;
			}
			if (highestPactLevel > (highestSpellLevel || 0)) {
				highestSpellLevel = highestPactLevel;
			}
		}

		if (highestSpellLevel !== 0 && highestSpellLevel !== undefined) {
			showSpellLevels(highestSpellLevel);

			// Show or hide spell slots based on the fields we're setting
			showHideSpellSlots({
				numSpellSlots1: fieldsToSet[`data.numSpellSlots1`],
				numSpellSlots2: fieldsToSet[`data.numSpellSlots2`],
				numSpellSlots3: fieldsToSet[`data.numSpellSlots3`],
				numSpellSlots4: fieldsToSet[`data.numSpellSlots4`],
				numSpellSlots5: fieldsToSet[`data.numSpellSlots5`],
				numSpellSlots6: fieldsToSet[`data.numSpellSlots6`],
				numSpellSlots7: fieldsToSet[`data.numSpellSlots7`],
				numSpellSlots8: fieldsToSet[`data.numSpellSlots8`],
				numSpellSlots9: fieldsToSet[`data.numSpellSlots9`],
				numPactMagic1: fieldsToSet[`data.numPactMagic1`],
				numPactMagic2: fieldsToSet[`data.numPactMagic2`],
				numPactMagic3: fieldsToSet[`data.numPactMagic3`],
				numPactMagic4: fieldsToSet[`data.numPactMagic4`],
				numPactMagic5: fieldsToSet[`data.numPactMagic5`],
				numPactMagic6: fieldsToSet[`data.numPactMagic6`],
				numPactMagic7: fieldsToSet[`data.numPactMagic7`],
				numPactMagic8: fieldsToSet[`data.numPactMagic8`],
				numPactMagic9: fieldsToSet[`data.numPactMagic9`],
			});
		}

		if (highestSpellLevel !== undefined) {
			fieldsToSet['data.maxSpellLevel'] = `${highestSpellLevel}`;
		}

		return fieldsToSet;
	}

	// Add class and subclass features
	function addMissingClassFeatures(className, classObj, subclass, newLevel) {
		const additionalFieldsToSet = {};
		const curFeatures = (record?.data?.features || []).map(feature => `${className}-${feature.name}`);
		const features = classObj?.data?.feature_list || [];
		const subClassFeatures = subclass?.data?.feature_list || [];

		[...features, ...subClassFeatures].forEach(feature => {
			const level = feature?.data?.level || 0;
			let featureAddedOrUpdated = false;
			// If this feature is at the level we're adding, add or update it
			if (level === newLevel) {
				if (!curFeatures.includes(`${className}-${feature.name}`)) {
					// Add this feature
					api.addValue('data.features', {
						...feature
					});
					featureAddedOrUpdated = true;
				}
				else {
					// Update the existing feature if this one is a higher level
					curFeatures.forEach((curFeature, curFeatureIndex) => {
						const curFeatureLevel = curFeature?.data?.level || 0;
						if (curFeature === `${className}-${feature.name}` && curFeatureLevel < level) {
							additionalFieldsToSet[`data.features.${curFeatureIndex}`] = {
								...feature
							};
							featureAddedOrUpdated = true;
						}
					})
				}
			}
			// If a feature was added and had an AC calc modifier, recalc AC
			if (featureAddedOrUpdated) {
				const acCalculationMods = (feature?.data?.modifiers || []).filter(mod => mod.data.type === 'armorClassCalculation');
				if (acCalculationMods.length > 0) {
					// Get other mods
					const allAcCalculationMods = getEffectsAndModifiers(['armorClassCalculation']);
					acCalculationMods.forEach(mod => {
						allAcCalculationMods.push({
							name: feature.name || 'Feature',
							value: mod.data?.value || 0,
							field: mod.data?.field || '',
						});
					});
					const dexMod = parseInt(record?.data?.dexterityMod || '0', 10);
					let armorClass = 10 + dexMod;
					let calcBonus = 0;
					allAcCalculationMods.forEach(mod => {
						// We only benefit from the highest AC calculation modifier
						if (mod.field && mod.field !== 'dexterity') {
							const acBonus = parseInt(record?.data?.[`${mod.field}Mod`] || '0', 10);
							if (acBonus > calcBonus) {
								calcBonus = acBonus;
							}
						}
					});
					// Get general AC bonuses
					const acBonuses = getEffectsAndModifiers(['armorClassBonus']);
					acBonuses.forEach(mod => {
						if (mod.value) {
							const acBonus = parseInt(mod.value || '0', 10);
							if (!isNaN(acBonus)) {
								calcBonus += acBonus;
							}
						}
					});
					armorClass += calcBonus;
					additionalFieldsToSet['data.ac'] = armorClass;
				}

				// For each feature, we need to check for ability groups and add them if not there
				const abilityGroupName = feature?.data?.abilityGroupName || '';
				if (abilityGroupName !== '') {
					const abilityUsesPerDay = feature?.data?.maxDailyUses || 0;
					const abilityValue = feature?.data?.value || '';
					const abilityRestoresOn = feature?.data?.restoreOn || '';
					let abilityGroup = record?.data?.abilityGroups?.find(ag => ag?.name === abilityGroupName);
					// When the group is added, or found, we add abilities to it or set data on it
					const recordDataPath = record?.dataPath || '';
					const abilityAddedCallback = (record) => {
						const abilityGroupIndex = record?.data?.abilityGroups?.findIndex(ag => ag?.name === abilityGroupName);
						const fieldsToSet = {};
						if (abilityGroupIndex !== -1) {
							// Get the Ability to add if any
							const abilityIdToAdd = JSON.parse(feature?.data?.ability || '{}')?._id || '';
							if (abilityIdToAdd !== '') {
								api.getRecord('abilities', abilityIdToAdd, (abilityRecord) => {
									api.addValue(`data.abilityGroups.${abilityGroupIndex}.data.abilities`, abilityRecord);
								});
							}
							// If abilityUsesPerDay > 0, un hide the counter
							if (abilityUsesPerDay > 0) {
								// Update the record's number of uses if lower
								const curDailyUses = record.data?.abilityGroups?.[abilityGroupIndex]?.data.maxDailyUses || 0;
								if (curDailyUses < abilityUsesPerDay) {
									// If ability uses per day went up, update it
									fieldsToSet[`data.abilityGroups.${abilityGroupIndex}.data.maxDailyUses`] = abilityUsesPerDay;
								}
								const curValue = record.data?.abilityGroups?.[abilityGroupIndex]?.data.value || '';
								if (abilityValue) {
									// Update the ability value if it was previously set, as this might be a higher value now
									fieldsToSet[`data.abilityGroups.${abilityGroupIndex}.data.value`] = abilityValue;
								}
								fieldsToSet[`data.abilityGroups.${abilityGroupIndex}.fields.dailyUses.hidden`] = false;
							}
						}
						api.setValues(fieldsToSet);
					};
					if (!abilityGroup) {
						api.addValue('data.abilityGroups', {
							name: abilityGroupName,
							data: {
								abilities: [],
								maxDailyUses: abilityUsesPerDay,
								value: abilityValue,
								restore: abilityRestoresOn,
							}
						}, abilityAddedCallback);
					}
					else {
						abilityAddedCallback(record);
					}
				}
			}
		});
		return additionalFieldsToSet;
	}

	function addToolProficiency(proficienciesString) {
		const toolProficiencies = (proficienciesString || '').split(',').map(s => s.trim());
		toolProficiencies.forEach(tool => {
			if (tool !== 'None' && tool !== '') {
				const toolAbility = guessAbility(tool);
				const abilityMod = parseInt(record?.data?.[`${toolAbility}Mod`] || '0', 10);
				const proficiencyBonus = parseInt(record?.data?.proficiencyBonus || '2', 10);
				api.addValue('data.otherSkills', {
					name: tool,
					data: {
						// Proficient by default 
						skillProf: 'true',
						ability: toolAbility,
						skillMod: abilityMod + proficiencyBonus,
					}
				});
			}
		});
	};

	function onDropClass(type, recordLink) {
		// Check if already on Character
		const classes = record?.data?.classes || [];
		const className = recordLink.tooltip;

		const classObj = {
			...recordLink.value,
			'_id': className,
		};
		const hasClass = classes.find(classObj => classObj._id === className);

		// Add the class to the the classes list if needed
		if (!hasClass) {
			api.addValue('data.classes', classObj);
		}

		// Unhide the classes list
		api.setHidden('classes', false);

		// Update the class / level string
		let classLevels = record?.data?.classLevels || '';
		let newLevel = 1;
		let addingNewClass = false; // False meaning we're not adding a new multiclass level
		if (hasClass) {
			// Parse level from hidden string
			const regex = new RegExp(`(${className} (\\d+)(?=$| /))`, 'i');
			// Replace the found class and level with the incremented level
			classLevels = classLevels.replace(regex, (match, g1, g2) => {
				const currentLevel = parseInt(g2, 10);
				newLevel = currentLevel + 1;
				return `${className} ${newLevel}`;
			});
		}
		else {
			// Add the class 
			if (classLevels !== '') {
				classLevels += ' / ';
				// Indicate that we're adding a new multiclass level
				addingNewClass = true;
			}
			classLevels += `${className} ${newLevel}`;
		}

		// Map of values to set in bulk later
		let valuesToSet = {
			'data.classLevels': classLevels,
			'data.className': classLevels,
		};

		// Update the level total
		const level = getTotalLevel(classLevels);
		valuesToSet['data.level'] = level;

		// Set Next Level XP
		const nextLevelXp = getNextLevelXp(level);
		valuesToSet['data.xpNext'] = nextLevelXp;

		// If we're level 1, set the initial proficiencies
		let promptSkillChoicesLater = null;
		if (level === 1) {
			const saveProficiencies = classObj?.data?.saveProficiencies || [];
			saveProficiencies.forEach(proficiency => {
				valuesToSet[`data.${proficiency}Prof`] = "true";
			});
			let currentWeaponProficiencies = record?.data?.weaponProficiencies || '';
			let currentArmorTraining = record?.data?.armorTraining || '';
			if (currentWeaponProficiencies !== '') {
				if (currentWeaponProficiencies === 'None') {
					currentWeaponProficiencies = '';
				}
				else {
					currentWeaponProficiencies += ', ';
				}
			}
			currentWeaponProficiencies += classObj?.data?.weaponProficiencies || '';
			if (currentArmorTraining !== '') {
				if (currentArmorTraining === 'None') {
					currentArmorTraining = '';
				}
				else {
					currentArmorTraining += ', ';
				}
			}
			currentArmorTraining += classObj?.data?.armorTraining || '';
			valuesToSet[`data.weaponProficiencies`] = currentWeaponProficiencies;
			valuesToSet[`data.armorTraining`] = currentArmorTraining;

			// Set Tool Proficiencies as Skills in skills tab
			const toolProficiencies = (classObj?.data?.toolProficiencies || '');
			addToolProficiency(toolProficiencies);

			// Prompt Skill choices
			promptSkillChoices(classObj, false);
		}
		else if (addingNewClass) {
			// Multiclass do not get save proficiencies
			// Weapon Proficiencies / Armor Training for the multiclass class
			let currentWeaponProficiencies = record?.data?.weaponProficiencies || '';
			let currentArmorTraining = record?.data?.armorTraining || '';
			const newWeaponProficiencies = classObj?.data?.weaponProficienciesMulti || '';
			const newArmorTraining = classObj?.data?.armorTrainingMulti || '';
			if (newWeaponProficiencies !== '' && newWeaponProficiencies !== 'None') {
				if (currentWeaponProficiencies !== '') {
					if (currentWeaponProficiencies === 'None') {
						currentWeaponProficiencies = '';
					}
					else {
						currentWeaponProficiencies += ', ';
					}
				}
				currentWeaponProficiencies += newWeaponProficiencies;
			}
			if (newArmorTraining !== '' && newArmorTraining !== 'None') {
				if (currentArmorTraining !== '') {
					if (currentArmorTraining === 'None') {
						currentArmorTraining = '';
					}
					else {
						currentArmorTraining += ', ';
					}
				}
				currentArmorTraining += newArmorTraining;
			}

			valuesToSet[`data.weaponProficiencies`] = currentWeaponProficiencies;
			valuesToSet[`data.armorTraining`] = currentArmorTraining;

			// Set Tool Proficiencies as Skills in skills tab
			const toolProficiencies = (classObj?.data?.toolProficienciesMulti || '');
			addToolProficiency(toolProficiencies);

			// Prompt Skill choices (we throw it in a function so we can call it later after they select their multiclass HP method)
			promptSkillChoicesLater = () => {
				promptSkillChoices(classObj, true);
			}
		}

		const subclasses = record?.data?.subclasses || [];
		const spellSlotFieldsToSet = getSpellSlotFields(classes, subclasses, classLevels, classObj, level, newLevel);
		valuesToSet = { ...valuesToSet, ...spellSlotFieldsToSet };

		// Update proficiencies based on Level
		const bonus = getProficiencyBonus(level);
		valuesToSet['data.proficiencyBonus'] = bonus;

		// Set all the values including new proficiencies, then we update the proficiency modifiers
		api.setValues(valuesToSet, (record) => {
			// After data is updated, update the proficiency modifiers
			updateProficiencies(bonus, record);
		});

		// Prompt for subclass (If level 3 in THIS class) - pass as additional prompt to updateHitPoints
		let promptSubclass = newLevel === 3 ? () => {
			const subclassSelection = (values) => {
				if (values.length > 0) {
					const subclass = values[0];
					api.addValue('data.subclasses', {
						...subclass,
						icon: 'IconBadges'
					});
					// Add subclass features for level 3
					const additionalFieldsToSet = addMissingClassFeatures(className, recordLink.value, subclass, newLevel);
					// Get Spellcasting info for new subclass
					const subclasses = [...(record?.data?.subclasses || []), subclass];
					const spellSlotFieldsToSet = getSpellSlotFields(classes, subclasses, classLevels, classObj, level, newLevel);
					api.setValues({ ...additionalFieldsToSet, ...spellSlotFieldsToSet });
				}
			}

			// We need to prompt with options to select a subclass
			const optionsQuery = {
				type: "subclass",
				query: {
					"data.class": className
				}
			};
			api.showPrompt('Select Subclass', 'Subclass', 'Select a Subclass...', null, optionsQuery, subclassSelection);
		} : null;

		// Add class features for added class at the new level, using the chosen subclass for it (if one)
		const subclass = (record?.data?.subclasses || []).find(subclass => subclass.data.class === className);
		const additionalFieldsToSet = addMissingClassFeatures(className, recordLink.value, subclass, newLevel);

		api.setValues(additionalFieldsToSet);

		// Update HP and Hit Dice
		// Get class hit die
		const hitDie = recordLink?.value?.data?.hitDie;
		if (hitDie !== undefined && hitDie !== '') {
			const promptSubClassOrSkills = promptSubclass || promptSkillChoicesLater ? () => {
				// Subclasses are always level 3, so we don't need to do both
				if (promptSkillChoicesLater) {
					promptSkillChoicesLater();
				}
				else if (promptSubclass) {
					promptSubclass();
				}
			} : null;
			updateHitPoints(className, newLevel, level, hitDie, promptSubClassOrSkills);
		}
	}

	// Get the ability score increase from a feature (used for when Feats are added to a character 
	// after dropping a Background)
	function getAbilityScoreIncrease(feature) {
		const asi = feature?.data?.abilityScores || '';
		let max = 20;
		let scores = [];
		if (!asi) {
			return { max, scores, promptChoice: false, count: 0 };
		}

		// Parse the maximum value from the phrase
		const maxMatch = asi.toLowerCase().match(/to a maximum of (\d+)/);
		if (maxMatch) {
			max = parseInt(maxMatch[1], 10);
		}

		if (asi.toLowerCase().match(/one ability score of your choice/) && asi.toLowerCase().match(/or increase two ability scores/)) {
			return { max, scores: ['strength', 'dexterity', 'constitution', 'intelligence', 'wisdom', 'charisma'], promptChoice: true, count: 2 };
		}

		const abilityMatch = asi.toLowerCase().match(/strength|dexterity|constitution|intelligence|wisdom|charisma/g);
		if (abilityMatch) {
			scores = abilityMatch;
		}

		return { max, scores, promptChoice: scores.length > 1, count: 1 };
	}

	// Add abilities from a feat when added to a character
	// (Called after adding a Feat on Background Drop)
	function updateAbilitiesFromFeature(feature) {
		// If the feature has an ability, add it to the character
		// For each feature, we need to check for ability groups and add them if not there
		const abilityGroupName = feature?.data?.abilityGroupName || '';
		if (abilityGroupName !== '') {
			const abilityUsesPerDay = feature?.data?.maxDailyUses || 0;
			const abilityValue = feature?.data?.value || '';
			const abilityRestoresOn = feature?.data?.restoreOn || '';
			let abilityGroup = record?.data?.abilityGroups?.find(ag => ag?.name === abilityGroupName);
			// When the group is added, or found, we add abilities to it or set data on it
			const recordDataPath = record?.dataPath || '';
			const abilityAddedCallback = (record) => {
				const abilityGroupIndex = record?.data?.abilityGroups?.findIndex(ag => ag?.name === abilityGroupName);
				const fieldsToSet = {};
				if (abilityGroupIndex !== -1) {
					// Get the Ability to add if any
					const abilityIdToAdd = JSON.parse(feature?.data?.ability || '{}')?._id || '';
					if (abilityIdToAdd !== '') {
						api.getRecord('abilities', abilityIdToAdd, (abilityRecord) => {
							api.addValue(`data.abilityGroups.${abilityGroupIndex}.data.abilities`, abilityRecord);
						});
					}
					// If abilityUsesPerDay > 0, un hide the counter
					if (abilityUsesPerDay > 0) {
						// Update the record's number of uses if lower
						const curDailyUses = record.data?.abilityGroups?.[abilityGroupIndex]?.data.maxDailyUses || 0;
						if (curDailyUses < abilityUsesPerDay) {
							// If ability uses per day went up, update it
							fieldsToSet[`data.abilityGroups.${abilityGroupIndex}.data.maxDailyUses`] = abilityUsesPerDay;
						}
						const curValue = record.data?.abilityGroups?.[abilityGroupIndex]?.data.value || '';
						if (abilityValue) {
							// Update the ability value if it was previously set, as this might be a higher value now
							fieldsToSet[`data.abilityGroups.${abilityGroupIndex}.data.value`] = abilityValue;
						}
						fieldsToSet[`data.abilityGroups.${abilityGroupIndex}.fields.dailyUses.hidden`] = false;
					}
				}
				api.setValues(fieldsToSet);
			};
			if (!abilityGroup) {
				api.addValue('data.abilityGroups', {
					name: abilityGroupName,
					data: {
						abilities: [],
						maxDailyUses: abilityUsesPerDay,
						value: abilityValue,
						restore: abilityRestoresOn,
					}
				}, abilityAddedCallback);
			}
			else {
				abilityAddedCallback(record);
			}
		}
	}

	// Add a feat to the character, called on Background drop
	function addFeat(feat) {
		// We add feats to the features list so that
		// All modifiers and are parsed by the same functions
		const featToAdd = {
			...feat,
			data: {
				...feat?.data,
				// Set a field called featureType to 'feat' so that
				// So that we can show and filter the two features_list fields properly
				featureType: 'feat'
			}
		}

		api.addValue(`data.features`, featToAdd, (updatedRecord) => {
			// After adding the feat, we need to update abilities if one was attached to it
			updateAbilitiesFromFeature(featToAdd);
		});

		// Prompt the user to select ASIs or just add them all
		const abilityScoreSelection = (values) => {
			const fieldsToSet = {};
			values.forEach(curV => {
				// Get the current value
				let value = curV.split('-')[0];
				const curValue = record?.data?.[`${value}`] || 0;
				// If we haven't chosen it yet, increase the current value by 1
				if (fieldsToSet[`data.${value}`] === undefined) {
					if (curValue < abilityIncrease.max) {
						fieldsToSet[`data.${value}`] = curValue + 1;
					}
				}
				else {
					// Increase the value by 1 again
					if (fieldsToSet[`data.${value}`] < abilityIncrease.max) {
						fieldsToSet[`data.${value}`] = fieldsToSet[`data.${value}`] + 1;
					}
				}
			});

			// Set the attributes then...
			api.setValues(fieldsToSet, () => {
				// Use the setModifier function to set the modifiers, update proficiencies,
				// and other re-calculations of modifiers as needed
				Object.keys(fieldsToSet).forEach(key => {
					const value = fieldsToSet[key];
					const attribute = key.replace('data.', '');
					setModifier(value, attribute);
				});
			});
		}

		const abilityIncrease = getAbilityScoreIncrease(featToAdd);
		if (abilityIncrease.promptChoice) {
			const options = [];
			abilityIncrease.scores.forEach(score => {
				options.push({ label: capitalize(score), value: score });
			});
			// IF we allow more than one selection, add them again
			if (abilityIncrease.count > 1) {
				abilityIncrease.scores.forEach(score => {
					options.push({ label: `${capitalize(score)}`, value: `${score}-2` });
				});
			}

			api.showPrompt(`Choose Ability Scores to Raise`, 'Select Ability Scores', `Select ${abilityIncrease.count} Ability Score${abilityIncrease.count > 1 ? 's' : ''} to Raise (to a max of ${abilityIncrease.max})...`, options, null, abilityScoreSelection, 'OK', 'Cancel', abilityIncrease.count);
		}
		else if (abilityIncrease.scores.length > 0) {
			// Add all ASIs
			abilityScoreSelection(abilityIncrease.scores.map(score => score));
		}
	}

	function onDropBackground(type, recordLink) {
		// Check if already has a background
		const backgrounds = record?.data?.backgrounds || [];
		const backgroundName = recordLink.tooltip;

		const backgroundObj = {
			...recordLink.value,
			'_id': backgroundName,
		};
		const hasBackground = backgrounds.length > 0;

		const fieldsToSet = {};

		// Add the background to the the backgrounds list if needed
		if (!hasBackground) {
			api.addValue('data.backgrounds', backgroundObj);
		}
		else {
			// Remove first background and add the new one
			api.removeValue('data.backgrounds', 0, () => {
				api.addValue('data.backgrounds', backgroundObj);
			});
		}

		// After prompting for ASIs from Background and setting them, we will add the 
		// Feat (which technically could, but should not, also have ASIs)
		// And then set the tool and skill proficiencies
		const getAndAddFeat = () => {
			// Add the feat specified by the Background
			const feat = backgroundObj?.data?.feat;
			if (feat) {
				const featId = JSON.parse(feat)?._id || '';
				if (featId !== '') {
					api.getRecord('feats', featId, (featRecord) => {
						addFeat(featRecord);
					});
				}
			}
		}

		// Prompt for Ability Scores to raise
		let options = [];
		const abilityChoices = backgroundObj?.data?.abilityScores || [];
		// We list each one twice since you can only pick one more than once twice
		abilityChoices.forEach(ability => {
			options.push({
				label: capitalize(ability),
				// In code we use camelCase, so we need to convert from normal to camelCase
				value: normalToCamelCase(ability)
			});
		});
		abilityChoices.forEach(ability => {
			options.push({
				label: capitalize(ability),
				// In code we use camelCase, so we need to convert from normal to camelCase
				value: `${normalToCamelCase(ability)}-2`
			});
		});

		const abilityScoreSelection = (values) => {
			const fieldsToSet = {};
			values.forEach(curV => {
				// Get the current value
				let value = curV.split('-')[0];
				const curValue = record?.data?.[`${value}`] || 0;
				// If we haven't chosen it yet, increase the current value by 1
				if (fieldsToSet[`data.${value}`] === undefined) {
					if (curValue < 20) {
						fieldsToSet[`data.${value}`] = curValue + 1;
					}
				}
				else {
					// Increase the value by 1 again
					if (fieldsToSet[`data.${value}`] < 20) {
						fieldsToSet[`data.${value}`] = fieldsToSet[`data.${value}`] + 1;
					}
				}
			});

			// Add skill proficiencies to the fields we want to update
			const skillProficiencies = backgroundObj?.data?.skillProficiencies || [];
			const proficiencyBonus = parseInt(api.getValue('data.proficiencyBonus') || '2', 10);
			skillProficiencies.forEach(skill => {
				fieldsToSet[`data.${skill}Prof`] = 'true';
			});

			// Set the attributes then...
			api.setValues(fieldsToSet, () => {
				// Use the setModifier function to set the modifiers, update proficiencies,
				// and other re-calculations of modifiers as needed
				Object.keys(fieldsToSet).forEach(key => {
					// Ignore skill prof changes
					if (!key.includes('Prof')) {
						const value = fieldsToSet[key];
						const attribute = key.replace('data.', '');
						setModifier(value, attribute, fieldsToSet);
					}
				});

				// Add the feat and tool proficiencies last
				getAndAddFeat();
				const toolProficiencies = backgroundObj?.data?.toolProficiencies || '';
				addToolProficiency(toolProficiencies);
			});
		}

		api.showPrompt(`Choose Ability Scores to Raise`, 'Select Ability Scores', `Select 3 Ability Scores to Raise (to a max of 20)...`, options, null, abilityScoreSelection, 'OK', 'Cancel', 3);

		// Set the background name
		fieldsToSet['data.backgroundName'] = backgroundName;

		// Unhide the backagrounds list
		fieldsToSet['fields.backgrounds.hidden'] = false;

		// Set all values
		api.setValues(fieldsToSet);
	}

	function onDropSpecies(type, recordLink) {
		// Check if already has a species
		const species = record?.data?.species || [];
		const speciesName = recordLink.tooltip;

		const speciesObj = {
			...recordLink.value,
			'_id': speciesName,
		};
		const hasSpecies = species.length > 0;

		const fieldsToSet = {};

		// Add the species to the the species list if needed
		if (!hasSpecies) {
			api.addValue('data.species', speciesObj);
		}
		else {
			// Remove first species and add the new one
			api.removeValue('data.species', 0, () => {
				api.addValue('data.species', speciesObj);
			});
		}

		// Get creatureType, size, speed, and senses and update fields
		const creatureType = speciesObj?.data?.creatureType || '';
		const size = speciesObj?.data?.size || '';
		const speed = speciesObj?.data?.speed || '';
		const senses = speciesObj?.data?.senses || '';

		fieldsToSet['data.creatureType'] = creatureType;
		fieldsToSet['data.size'] = capitalize(size);
		fieldsToSet['data.speed'] = speed;
		fieldsToSet['data.senses'] = senses;

		// Set the species name
		fieldsToSet['data.speciesName'] = speciesName;

		// Unhide the species list
		fieldsToSet['fields.species.hidden'] = false;

		// Add features to the features list
		const features = speciesObj?.data?.feature_list || [];
		features.forEach(feature => {
			// Add this feature
			api.addValue('data.features', {
				...feature
			});
			// Check for AC calc mods
			const acCalculationMods = (feature?.data?.modifiers || []).filter(mod => mod.data.type === 'armorClassCalculation');
			if (acCalculationMods.length > 0) {
				// Get other mods
				const allAcCalculationMods = getEffectsAndModifiers(['armorClassCalculation']);
				acCalculationMods.forEach(mod => {
					allAcCalculationMods.push({
						name: feature.name || 'Feature',
						value: mod.data?.value || 0,
						field: mod.data?.field || '',
					});
				});
				const dexMod = parseInt(record?.data?.dexterityMod || '0', 10);
				let armorClass = 10 + dexMod;
				let calcBonus = 0;
				allAcCalculationMods.forEach(mod => {
					// We only benefit from the highest AC calculation modifier
					if (mod.field && mod.field !== 'dexterity') {
						const acBonus = parseInt(record?.data?.[`${mod.field}Mod`] || '0', 10);
						if (acBonus > calcBonus) {
							calcBonus = acBonus;
						}
					}
				});
				// Get general AC bonuses
				const acBonuses = getEffectsAndModifiers(['armorClassBonus']);
				acBonuses.forEach(mod => {
					if (mod.value) {
						const acBonus = parseInt(mod.value || '0', 10);
						if (!isNaN(acBonus)) {
							calcBonus += acBonus;
						}
					}
				});
				armorClass += calcBonus;
				fieldsToSet['data.ac'] = armorClass;
			}

			// For each feature, we need to check for ability groups and add them if not there
			const abilityGroupName = feature?.data?.abilityGroupName || '';
			if (abilityGroupName !== '') {
				const abilityUsesPerDay = feature?.data?.maxDailyUses || 0;
				const abilityValue = feature?.data?.value || '';
				const abilityRestoresOn = feature?.data?.restoreOn || '';
				let abilityGroup = record?.data?.abilityGroups?.find(ag => ag?.name === abilityGroupName);
				// When the group is added, or found, we add abilities to it or set data on it
				const recordDataPath = record?.dataPath || '';
				const abilityAddedCallback = (record) => {
					const abilityGroupIndex = record?.data?.abilityGroups?.findIndex(ag => ag?.name === abilityGroupName);
					const fieldsToSet = {};
					if (abilityGroupIndex !== -1) {
						// Get the Ability to add if any
						const abilityIdToAdd = JSON.parse(feature?.data?.ability || '{}')?._id || '';
						if (abilityIdToAdd !== '') {
							api.getRecord('abilities', abilityIdToAdd, (abilityRecord) => {
								api.addValue(`data.abilityGroups.${abilityGroupIndex}.data.abilities`, abilityRecord);
							});
						}
						// If abilityUsesPerDay > 0, un hide the counter
						if (abilityUsesPerDay > 0) {
							// Update the record's number of uses if lower
							const curDailyUses = record.data?.abilityGroups?.[abilityGroupIndex]?.data.maxDailyUses || 0;
							if (curDailyUses < abilityUsesPerDay) {
								// If ability uses per day went up, update it
								fieldsToSet[`data.abilityGroups.${abilityGroupIndex}.data.maxDailyUses`] = abilityUsesPerDay;
							}
							const curValue = record.data?.abilityGroups?.[abilityGroupIndex]?.data.value || '';
							if (abilityValue) {
								// Update the ability value if it was previously set, as this might be a higher value now
								fieldsToSet[`data.abilityGroups.${abilityGroupIndex}.data.value`] = abilityValue;
							}
							fieldsToSet[`data.abilityGroups.${abilityGroupIndex}.fields.dailyUses.hidden`] = false;
						}
					}
					api.setValues(fieldsToSet);
				};

				if (!abilityGroup) {
					api.addValue('data.abilityGroups', {
						name: abilityGroupName,
						data: {
							abilities: [],
							maxDailyUses: abilityUsesPerDay,
							value: abilityValue,
							restore: abilityRestoresOn,
						}
					}, abilityAddedCallback);
				}
				else {
					abilityAddedCallback(record);
				}
			}
		});

		// Set all values
		api.setValues(fieldsToSet);
	}

	function onDrop(type, recordLink) {
		if (type === 'class') {
			onDropClass(type, recordLink);
		}
		else if (type === 'backgrounds') {
			onDropBackground(type, recordLink);
		}
		else if (type === 'species') {
			onDropSpecies(type, recordLink);
		}
	}

	function onDeleteClass() {
		// Recalculate class name / level
		const classes = record?.data?.classes || [];
		const existingClasses = classes.map(classObj => classObj.name);

		let classLevels = record?.data?.classLevels || '';
		const classLevelsArr = classLevels.split('/');
		classLevelsArr.forEach(classLevel => {
			// Parse class name
			const regex = /(\w+) (\d+)/i;
			const found = classLevel.match(regex);
			const className = found[1];

			// If this class is NOT in existing classes, remove it
			if (!existingClasses.includes(className.trim())) {
				// Parse level from hidden string
				const regex = new RegExp(`(${className} (\\d+))`, 'i');
				// Replace the found class and level
				classLevels = classLevels.replace(regex, (match, g1, g2) => {
					const currentLevel = parseInt(g2, 10);
					return '';
				});
				// Replace leading or trailing /
				classLevels = classLevels.trim().replace(/\/$/, '').replace(/^\//, '').trim();
			}
		});

		// Update the class strings
		const valuesToSet = {
			'data.classLevels': classLevels,
			'data.className': classLevels,
		};

		// Remove subclasses for this class from `data.subclasses`
		const subclasses = record?.data?.subclasses || [];
		let newSubclasses = [...subclasses]
		newSubclasses.forEach((subclass, index) => {
			if (!existingClasses.includes(subclass.data.class)) {
				newSubclasses[index]._id = 'delete';
			}
		});
		newSubclasses = newSubclasses.filter(subclass => subclass._id !== 'delete');
		valuesToSet['data.subclasses'] = newSubclasses;

		// Update the level total
		const level = getTotalLevel(classLevels);
		valuesToSet['data.level'] = level;

		// Reset XP to next level
		const nextLevelXp = getNextLevelXp(level);
		valuesToSet['data.xpNext'] = nextLevelXp;

		//  Update HP and Hit Dice
		const hpByLevel = record?.data?.hpByLevel || '[]';
		const hpByLevelArr = JSON.parse(hpByLevel);

		// Remove all entries from hpByLevelArr where className no longer exists
		let newHpByLevel = [...hpByLevelArr];
		hpByLevelArr.forEach((hpLevel, index) => {
			if (!existingClasses.includes(hpLevel.className)) {
				newHpByLevel[index].className = 'delete';
			}
		});
		newHpByLevel = newHpByLevel.filter(hpLevel => hpLevel.className !== 'delete');

		// Set new hpByLevelArray
		valuesToSet['data.hpByLevel'] = JSON.stringify(newHpByLevel);

		// Get total HP from HP by level, amd CON Mod, and determine new HP totals
		const conMod = parseInt(record?.data?.constitutionMod || '0', 10);
		const curHp = parseInt(record?.data?.curhp || '0', 10);
		const curD6HitDie = parseInt(record?.data?.d6HitDie || '0', 10);
		const curD8HitDie = parseInt(record?.data?.d8HitDie || '0', 10);
		const curD10HitDie = parseInt(record?.data?.d10HitDie || '0', 10);
		const curD12HitDie = parseInt(record?.data?.d12HitDie || '0', 10);
		let newMaxHp = 0;
		let d6HitDie = 0;
		let d8HitDie = 0;
		let d10HitDie = 0;
		let d12HitDie = 0;
		newHpByLevel.forEach(hpLevel => {
			let hpToAdd = hpLevel.hp + conMod;
			if (hpToAdd < 1) { hpToAdd = 1; }
			newMaxHp += hpToAdd;
			if (hpLevel.hitDie === 'd6') {
				d6HitDie += 1;
			}
			else if (hpLevel.hitDie === 'd8') {
				d8HitDie += 1;
			}
			else if (hpLevel.hitDie === 'd10') {
				d10HitDie += 1;
			}
			else if (hpLevel.hitDie === 'd12') {
				d12HitDie += 1;
			}
		});
		// Set max hp and current
		if (curHp > newMaxHp) {
			valuesToSet['data.curhp'] = newMaxHp;
		}
		valuesToSet['data.hitpoints'] = newMaxHp;

		// Set new hitDie
		if (curD6HitDie != d6HitDie) {
			valuesToSet['data.d6HitDie'] = d6HitDie || null;
		}
		if (curD8HitDie != d8HitDie) {
			valuesToSet['data.d8HitDie'] = d8HitDie || null;
		}
		if (curD10HitDie != d10HitDie) {
			valuesToSet['data.d10HitDie'] = d10HitDie || null;
		}
		if (curD12HitDie != d12HitDie) {
			valuesToSet['data.d12HitDie'] = d12HitDie || null;
		}

		// If this was the last class, hide the classes list
		if (classes.length === 0) {
			valuesToSet['fields.classes.hidden'] = true;
		}

		const bonus = getProficiencyBonus(level);
		valuesToSet['data.proficiencyBonus'] = bonus;

		// Set values then update proficiencies based on Level
		api.setValues(valuesToSet, (record) => {
			updateProficiencies(bonus, record);
		});
	}

	function onDeleteBackground() {
		// Update background text
		api.setValues({
			'data.backgroundName': '',
			'fields.backgrounds.hidden': true
		});
	}

	function onDeleteSpecies() {
		// Update species text
		api.setValues({
			'data.speciesName': '',
			'fields.species.hidden': true
		});
	}

	function getTotalLevel(inputString) {
		// Regular expression to find all class levels
		const regex = /\d+/g;
		let totalLevel = 0;

		// Extract all levels and sum them
		const levels = inputString.match(regex);
		if (levels) {
			levels.forEach(level => {
				totalLevel += parseInt(level, 10);
			});
		}

		return totalLevel;
	}

	function capitalize(string) {
		if (!string || typeof string !== 'string') return '';
		return string.charAt(0).toUpperCase() + string.slice(1);
	}

	function rollCheck(ability) {
		const mod = `${ability}Mod`;

		const modifiers = [];
		let abilityMod = parseInt(record?.data?.[mod] || '0', 10);
		if (abilityMod === undefined || isNaN(abilityMod)) {
			abilityMod = 0;
		}
		if (abilityMod !== 0) {
			modifiers.push({
				name: ability,
				value: abilityMod,
				active: true,
			});
		}
		const metadata = {
			"rollName": `${capitalize(ability)}`
		}

		const checkModifiers = getEffectsAndModifiers(['abilityBonus', 'abilityPenalty'], ability);
		checkModifiers.forEach(modifier => {
			modifiers.push(modifier);
		});

		api.promptRoll(`${capitalize(ability)} Check`, "1d20", modifiers, metadata, 'ability');
	}

	function rollSave(save) {
		const mod = `${save}Save`;
		const modifiers = [];
		let saveMod = record?.data?.[mod] || '0';
		if (saveMod === undefined) {
			saveMod = 0;
		}

		if (saveMod !== '0') {
			modifiers.push({
				name: `${capitalize(save)} Save Modifier`,
				value: saveMod,
				active: true,
			});
		}

		// Check effects for all save bonuses and penalties for saves
		const saveModifiers = getEffectsAndModifiers(['saveBonus', 'savePenalty'], save);
		saveModifiers.forEach(modifier => {
			modifiers.push(modifier);
		});

		const metadata = {
			"rollName": `${capitalize(save)} Save`,
			"tooltip": `${capitalize(save)} Saving Throw`,
			"dc": 0
		}

		api.promptRoll(`${capitalize(save)} Save`, '1d20', modifiers, metadata, 'save');
	}

	function rollHitDie(hitdie) {
		const hitDieField = `${hitdie}HitDie`;
		const hitDieRemaining = parseInt(record?.data?.[hitDieField] || '0', 10);

		if (hitDieRemaining > 0) {
			// We add the constitution modifier to the roll
			const conMod = parseInt(record?.data?.constitutionMod || '0', 10);
			const modifiers = [
				{
					name: 'Constitution',
					value: conMod,
					active: true,
				}
			];
			const metadata = {
				"rollName": 'Hit Die',
				"tooltip": `Recovering HP with a ${hitdie} Hit Die`,
				"hitDieField": hitDieField,
				"hitDieRemaining": hitDieRemaining
			}

			api.promptRoll(`Roll ${hitdie} Hit Die`, `${hitdie}`, modifiers, metadata, 'hitdie');
		}
		else {
			api.showNotification(`No ${hitdie} Hit Dice Remaining`, 'red', 'No Hit Dice');
		}
	}

	function shortRest() {
		const message = 'Taking a Short Rest.';

		// If we have pactmagic slots, we restore them
		// Also reset death save failures / successes (we can assume they healed at this point)
		const valuesToSet = {
			'data.pactMagic1': 0,
			'data.pactMagic2': 0,
			'data.pactMagic3': 0,
			'data.pactMagic4': 0,
			'data.pactMagic5': 0,
			'data.pactMagic6': 0,
			'data.pactMagic7': 0,
			'data.pactMagic8': 0,
			'data.pactMagic9': 0,
			'data.deathSaveFailures': 0,
			'data.deathSaveSuccesses': 0,
		};

		// Check for all actions that restore on short rest and restore daily uses
		const abilityListGroups = record?.data?.abilityGroups || [];
		abilityListGroups.forEach((abilityGroup, index) => {
			const restoreOn = abilityGroup?.data?.restore || '';
			if (restoreOn === 'shortrest') {
				const dailyUses = abilityGroup?.data?.dailyUses || 0;
				valuesToSet[`data.abilityGroups.${index}.data.dailyUses`] = 0;
			}
		});

		api.setValues(valuesToSet);
		api.sendMessage(message, undefined, [], []);
	}

	function longRest() {
		const valuesToSet = {};
		// Restore HP and Hit Die, clear Temp HP, and reset death save failures / successes
		valuesToSet['data.curhp'] = record?.data?.hitpoints || 0;
		valuesToSet['data.tempHp'] = 0;
		valuesToSet['data.deathSaveFailures'] = 0;
		valuesToSet['data.deathSaveSuccesses'] = 0;

		// Restore all Hit Die per 2024 rules
		const hpByLevel = record?.data?.hpByLevel || '[]';
		const hpByLevelArr = JSON.parse(hpByLevel);
		let d6HitDie = 0;
		let d8HitDie = 0;
		let d10HitDie = 0;
		let d12HitDie = 0;
		hpByLevelArr.forEach(hpLevel => {
			if (hpLevel.hitDie === 'd6') {
				d6HitDie += 1;
			}
			else if (hpLevel.hitDie === 'd8') {
				d8HitDie += 1;
			}
			else if (hpLevel.hitDie === 'd10') {
				d10HitDie += 1;
			}
			else if (hpLevel.hitDie === 'd12') {
				d12HitDie += 1;
			}
		});
		valuesToSet['data.d6HitDie'] = d6HitDie > 0 ? d6HitDie : null;
		valuesToSet['data.d8HitDie'] = d8HitDie > 0 ? d8HitDie : null;
		valuesToSet['data.d10HitDie'] = d10HitDie > 0 ? d10HitDie : null;
		valuesToSet['data.d12HitDie'] = d12HitDie > 0 ? d12HitDie : null;

		// Restore all spell slots and pact magic
		valuesToSet['data.spellSlots1'] = 0;
		valuesToSet['data.spellSlots2'] = 0;
		valuesToSet['data.spellSlots3'] = 0;
		valuesToSet['data.spellSlots4'] = 0;
		valuesToSet['data.spellSlots5'] = 0;
		valuesToSet['data.spellSlots6'] = 0;
		valuesToSet['data.spellSlots7'] = 0;
		valuesToSet['data.spellSlots8'] = 0;
		valuesToSet['data.spellSlots9'] = 0;
		valuesToSet['data.pactMagic1'] = 0;
		valuesToSet['data.pactMagic2'] = 0;
		valuesToSet['data.pactMagic3'] = 0;
		valuesToSet['data.pactMagic4'] = 0;
		valuesToSet['data.pactMagic5'] = 0;
		valuesToSet['data.pactMagic6'] = 0;
		valuesToSet['data.pactMagic7'] = 0;
		valuesToSet['data.pactMagic8'] = 0;
		valuesToSet['data.pactMagic9'] = 0;

		// Restore any Spells that have Daily Uses
		const spellLists = ['cantrips', 'spells1', 'spells2', 'spells3', 'spells4', 'spells5', 'spells6', 'spells7', 'spells8', 'spells9'];
		spellLists.forEach((spellList, index) => {
			const spells = record?.data?.[spellList] || [];
			spells.forEach((spell, index) => {
				if (spell?.data?.dailyUses > 0) {
					valuesToSet[`data.${spellList}.${index}.data.dailyUses`] = 0;
				}
			});
		});

		// Check for all actions that restore on long rest and restore daily uses
		const abilityListGroups = record?.data?.abilityGroups || [];
		abilityListGroups.forEach((abilityGroup, index) => {
			const restoreOn = abilityGroup?.data?.restore || '';
			// Assume that longrest includes shortrest too
			if (restoreOn === 'longrest' || restoreOn === 'shortrest') {
				const dailyUses = abilityGroup?.data?.dailyUses || 0;
				valuesToSet[`data.abilityGroups.${index}.data.dailyUses`] = 0;
			}
		});

		api.setValues(valuesToSet);

		// Output to chat
		api.sendMessage('Taking a Long Rest.', undefined, [], []);
	}

	function rollDeathSave() {
		const modifiers = [];
		const metadata = {
			"rollName": 'Death Save',
		}

		api.promptRoll(`Death Save`, "1d20", modifiers, metadata, 'deathsave');
	}

	// On Change of Attributes, Set the Relavant Mods
	function setModifier(value, attribute, skillProfOverrides = {}) {
		const modField = `${attribute}Mod`;
		const saveField = `${attribute}Save`;
		const saveProf = `${attribute}Prof`;

		const valuesToSet = {};

		const val = parseInt(value, 10);
		if (isNaN(val)) {
			return;
		}
		const modVal = Math.floor((val - 10) / 2);
		let modValStr = `${modVal}`;
		if (modVal >= 0) {
			modValStr = `+${modVal}`;
		}
		valuesToSet[`data.${modField}`] = modValStr;

		let proficiencyBonus = parseInt(record?.data?.['proficiencyBonus'] || '2', 10);
		if (isNaN(proficiencyBonus)) {
			proficiencyBonus = 0;
		}

		const isProficient = record?.data?.[saveProf] === 'true';
		const savVal = isProficient ? modVal + proficiencyBonus : modVal;
		valuesToSet[`data.${saveField}`] = savVal;

		// Update hit points if this is constitution
		if (attribute === 'constitution') {
			const level = parseInt(record?.data?.level || '0', 10);
			const hpByLevel = record?.data?.hpByLevel || '[]';
			const hpByLevelArr = JSON.parse(hpByLevel);
			const newHp = getHpForLevel(modVal, level, hpByLevelArr);
			if (level > 0 && newHp < 1) {
				// To a minimum of 1
				newHp = 1;
			}
			// Set our HP to be totalHp per level + conMod * level
			valuesToSet['data.hitpoints'] = newHp;
		}

		// Update AC calculation as needed
		const acCalculationMods = getEffectsAndModifiers(['armorClassCalculation']);
		const dexMod = attribute !== 'dexterity' ? parseInt(record?.data?.dexterityMod || '0', 10) : modVal;
		let armorClass = 10 + dexMod;
		let calcBonus = 0;
		acCalculationMods.forEach(mod => {
			// We only benefit from the highest AC calculation modifier
			if (mod.field && mod.field !== 'dexterity') {
				const acBonus = attribute !== mod.field ? parseInt(record?.data?.[`${mod.field}Mod`] || '0', 10) : modVal;
				if (acBonus > calcBonus) {
					calcBonus = acBonus;
				}
			}
		});
		// Get general AC bonuses
		const acBonuses = getEffectsAndModifiers(['armorClassBonus']);
		acBonuses.forEach(mod => {
			if (mod.value) {
				const acBonus = parseInt(mod.value || '0', 10);
				if (!isNaN(acBonus)) {
					calcBonus += acBonus;
				}
			}
		});
		armorClass += calcBonus;
		valuesToSet['data.ac'] = armorClass;

		getSkills().forEach(skill => {
			// Get the ability being used for this skill, fallback to the skill's default
			const ability = record?.data?.[`${skill.field}Ability`] || skill.ability;

			if (ability === attribute) {
				// Skills can be also be half, proficient, or expertise
				const proficiency = skillProfOverrides[`data.${skill.field}Prof`] || record?.data?.[`${skill.field}Prof`] || 'false';
				const isHalfProficient = proficiency === 'half';
				const isExpertise = proficiency === 'expertise';
				const isProficient = proficiency === 'true';
				if (isHalfProficient) {
					valuesToSet[`data.${skill.field}Mod`] = modVal + (Math.floor(proficiencyBonus / 2));
				}
				else if (isExpertise) {
					valuesToSet[`data.${skill.field}Mod`] = modVal + (proficiencyBonus * 2);
				}
				else if (isProficient) {
					valuesToSet[`data.${skill.field}Mod`] = modVal + proficiencyBonus;
				}
				else {
					valuesToSet[`data.${skill.field}Mod`] = modVal;
				}
			}
		});

		// Also update otherSkills
		const otherSkills = record?.data?.otherSkills || [];
		otherSkills.forEach((skill, index) => {
			if (skill?.data?.ability === attribute) {
				// Skills can be also be half, proficient, or expertise
				const proficiency = skill?.data?.skillProf || 'false';
				const isHalfProficient = proficiency === 'half';
				const isExpertise = proficiency === 'expertise';
				const isProficient = proficiency === 'true';
				if (isHalfProficient) {
					valuesToSet[`data.otherSkills.${index}.data.skillMod`] = modVal + (Math.floor(proficiencyBonus / 2));
				}
				else if (isExpertise) {
					valuesToSet[`data.otherSkills.${index}.data.skillMod`] = modVal + (proficiencyBonus * 2);
				}
				else if (isProficient) {
					valuesToSet[`data.otherSkills.${index}.data.skillMod`] = modVal + proficiencyBonus;
				}
				else {
					valuesToSet[`data.otherSkills.${index}.data.skillMod`] = modVal;
				}
			}
		});

		api.setValues(valuesToSet);
	}

	// On update of Constitution, update HP
	function getHpForLevel(conMod, newLevel, newHpLevelArray) {
		// Get the max HP we should have at our current level
		const hpByLevel = record?.data?.hpByLevel || '[]';
		const hpByLevelArr = JSON.parse(hpByLevel);
		let totalHp = 0;
		// Get all the HP we rolled or set for each level
		hpByLevelArr.forEach(hpLevel => {
			let thisLevel = hpLevel.hp + conMod;
			// Each time you level you roll or take average + CON MOD to a min of 1
			if (thisLevel < 1) {
				thisLevel = 1;
			}
			totalHp += thisLevel;
		});

		// Get HP Max modifier
		const hpMaxMods = getEffectsAndModifiers(['hitpoints']);
		hpMaxMods.forEach(mod => {
			// For string type in HP max, we'll use it as a field
			// with a special case for the `field` value to mean a specific class here
			if (mod.valueType === 'string') {
				// First check if it is in values we are setting
				let bonus = mod.value === 'level' ? newLevel : parseInt(record?.data?.[mod.value] || '0', 10);
				const relevantClass = mod.field;
				if (relevantClass && mod.value === 'level') {
					// Bonus = total level in the given class
					newHpLevelArray.forEach(hpLevel => {
						if (hpLevel.className === relevantClass) {
							bonus += 1;
						}
					});
				}
				if (!isNaN(bonus)) {
					totalHp += bonus;
				}
			}
			else if (mod.valueType === 'number') {
				const bonus = parseInt(mod.value || '0', 10);
				if (!isNaN(bonus)) {
					totalHp += bonus;
				}
			}
		});

		return totalHp;
	}
</script>
