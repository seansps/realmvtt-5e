<div style="margin-bottom: 4px">
  <divider label="Rolls"></divider>
</div>

<div style="margin-top: 4px">
  <checkbox
    size="md"
    textalign="right"
    field="rollOnUse"
    label="Roll on Use"
    description="When the ability is used, a roll is requested using the Ability List's value field."
  ></checkbox>
</div>

<div style="margin-top: 4px">
  <stringfield
    field="rollOverride"
    label="Roll Override"
    placeholder="Enter custom roll..."
    description="Override the Ability List's value with a custom roll"
  >
  </stringfield>
</div>

<div style="margin-top: 4px; display: flex; flex-direction: column; gap: 4px">
  <dropdown
    size="sm"
    width="100%"
    field="damageTypes"
    label="Damage Types"
    multiselect="5"
    description="Damage types that this ability can apply based on the roll"
    placeholder="Select damage types..."
    options='[{"label": "Acid", "value": "acid"}, {"label": "Bludgeoning", "value": "bludgeoning"}, {"label": "Cold", "value": "cold"}, {"label": "Fire", "value": "fire"}, {"label": "Force", "value": "force"}, {"label": "Lightning", "value": "lightning"}, {"label": "Necrotic", "value": "necrotic"}, {"label": "Piercing", "value": "piercing"}, {"label": "Poison", "value": "poison"}, {"label": "Psychic", "value": "psychic"}, {"label": "Radiant", "value": "radiant"}, {"label": "Slashing", "value": "slashing"}, {"label": "Thunder", "value": "thunder"}]'
  >
  </dropdown>
  <div style="margin-top: 4px">
    <checkbox
      size="md"
      textalign="right"
      field="showHalf"
      label="Show Half Damage"
      description="Show option to apply half damage"
    ></checkbox>
  </div>
  <div style="margin-top: 4px">
    <checkbox
      size="md"
      textalign="right"
      field="showHealing"
      label="Show Healing"
      description="Show option to apply healing"
    ></checkbox>
  </div>
  <div style="margin-top: 4px">
    <checkbox
      size="md"
      textalign="right"
      field="isMagical"
      label="Counts as Magical"
      description="This ability's damage counts as magical for bypassing resistances/immunities."
    ></checkbox>
  </div>
</div>

<div style="margin-top: 4px; margin-bottom: 4px">
  <divider label="Level Scaling"></divider>
</div>
<div style="margin-top: 4px">
  <label
    size="xs"
    textalign="left"
    label="Override the ability value at specific character levels (e.g. a die that grows by level)."
  ></label>
  <list
    listtype="level_scaling_list"
    field="levelScaling"
    variant="striped"
    allowadd=""
  ></list>
</div>

<div style="margin-top: 4px">
  <stringfield
    field="ongoingDamage"
    label="Ongoing Damage"
    placeholder="e.g. 1d10 fire"
    description="Damage applied each turn while the effect persists (adds a macro button to the chat message)."
  ></stringfield>
  <list
    listtype="level_scaling_list"
    field="ongoingDamageLevelScaling"
    variant="striped"
    allowadd=""
  ></list>
</div>

<div style="margin-top: 4px; margin-bottom: 4px">
  <divider label="Effects"></divider>
</div>

<div style="margin-top: 4px; margin-bottom: 4px">
  <dropdown
    size="sm"
    field="effects"
    label="Effects"
    searchable="true"
    multiselect="20"
    description="Effects that this ability can apply"
    optionsquery='{"type": "effects", "query": {}}'
    placeholder="Select Effects..."
  >
  </dropdown>
</div>

<div style="margin-top: 4px; margin-bottom: 4px">
  <divider label="Saving Throws"></divider>
</div>

<div style="display: flex; flex-direction: column; gap: 4px">
  <div style="display: flex; gap: 8px; align-items: center">
    <checkbox
      size="md"
      field="isSave"
      label="Has Save"
      textalign="right"
    ></checkbox>
    <dropdown
      size="xs"
      width="250px"
      field="savingThrows"
      placeholder="Select up to 2 Saving Throws..."
      multiselect="2"
      options='[{"label": "Strength", "value": "strength"}, {"label": "Dexterity", "value": "dexterity"}, {"label": "Constitution", "value": "constitution"}, {"label": "Intelligence", "value": "intelligence"}, {"label": "Wisdom", "value": "wisdom"}, {"label": "Charisma", "value": "charisma"}]'
    >
    </dropdown>
  </div>
  <div style="margin-top: 4px">
    <checkbox
      size="md"
      textalign="right"
      field="usesSpellDC"
      label="Use Spellcasting DC"
      description="Override the group's save DC calculation: use 8 + spellcasting modifier + proficiency bonus, plus any Spell DC Bonus modifiers."
    ></checkbox>
  </div>
</div>

<div style="margin-top: 4px; margin-bottom: 4px">
  <divider label="FX"></divider>
</div>

<div style="margin-top: 4px">
  <fxcontrol field="animation" label="Animation"></fxcontrol>
</div>
