<script>
  function updateCoinage() {
    updateTotalWeight(record);
  }

  function updateTotalWeight(record, setValue = true) {
    // Update total weight
    const items = record?.data?.inventory || [];
    let totalWeight = 0;
    items.forEach((item) => {
      if (item.data?.carried !== "dropped") {
        let weight = parseFloat(item.data?.weight || "0");
        let count = parseFloat(item.data?.count || "0");
        if (count === undefined || isNaN(count)) {
          count = 0;
        }
        if (weight !== undefined && !isNaN(weight)) {
          totalWeight += weight * count;
        }
      }
    });

    // Include coinage if set
    const includeCoinage = api.getSetting("coinWeight") === "yes";
    if (includeCoinage) {
      const totalCoins =
        (record?.data?.cp || 0) +
        (record?.data?.sp || 0) +
        (record?.data?.ep || 0) +
        (record?.data?.gp || 0) +
        (record?.data?.pp || 0);
      totalWeight += totalCoins / 50;
    }

    totalWeight = Math.round(totalWeight * 100) / 100;

    if (setValue) {
      api.setValue("data.totalWeight", totalWeight);
    } else {
      return totalWeight;
    }
  }

  function onDropItem(recordLink) {
    const item = recordLink?.value;

    const hasAttunement = item.data?.attunement || false;
    const isConsumable = item.data?.consumable || false;
    const hasUseBtn = item.data?.hasUseBtn || false;
    const isTwoHanded = item.data?.weaponProperties?.includes("Two-Handed");
    const isThrown = item.data?.weaponProperties?.includes("Thrown"); // Only thrown weapons can be toggled melee/range
    const isMelee = (item.data?.type || "").toLowerCase().includes("melee"); // Melee shown only melee icon

    // Add the item and set the attunement hidden field to visible if requires attunement
    const itemToAdd = {
      ...item,
      icon: "IconMoneybag",
      data: {
        ...item?.data,
        // Track old ID for count tracking
        fromId: item._id,
        // Default count to 1 unless otherwise specified
        count: item.data?.count || 1,
      },
      fields: {
        ...item?.fields,
        attuned: { hidden: !hasAttunement },
        useBtn: { hidden: !isConsumable && !hasUseBtn },
        handBtn: { hidden: isTwoHanded },
        // Show toggle button only for melee throwing weapons
        rangeToggleBtn: {
          hidden: !(isMelee && isThrown),
        },
        // Hide disabled range button for melee weapons or when toggle is showing
        rangeToggleBtnDisabled: {
          hidden: isMelee,
        },
        // Hide disabled melee button for ranged weapons or thrown melee weapons
        meleeToggleBtnDisabled: {
          hidden: !isMelee || (isMelee && isThrown),
        },
        ammo: { hidden: isMelee && !isThrown },
      },
    };

    // Determine if we are adding the item or adding count to an existing item
    const items = record?.data?.inventory || [];
    const index = items.findIndex((i) => i.data?.fromId === item._id);

    // If the item is an item pack, we're adding a list of items
    if (item.data?.type === "pack") {
      // Get the total weight of all items in the pack
      const itemsInPack = item.data?.items || [];
      const valuesToSet = {};
      // Add any currency in pack to character
      valuesToSet["data.cp"] = (record?.data?.cp || 0) + (item.data?.cp || 0);
      valuesToSet["data.sp"] = (record?.data?.sp || 0) + (item.data?.sp || 0);
      valuesToSet["data.ep"] = (record?.data?.ep || 0) + (item.data?.ep || 0);
      valuesToSet["data.gp"] = (record?.data?.gp || 0) + (item.data?.gp || 0);
      valuesToSet["data.pp"] = (record?.data?.pp || 0) + (item.data?.pp || 0);
      const itemsToAdd = itemsInPack
        .map((item) => {
          // If this is existing item, get the current count
          const thisIndex = items.findIndex((i) => i.data?.fromId === item._id);
          const existingItem = thisIndex !== -1 ? items[thisIndex] : undefined;
          const itemCount = parseFloat(item?.data?.count || "0");
          const hasAttunement = item.data?.attunement || false;
          const isConsumable = item.data?.consumable || false;
          const isTwoHanded =
            item.data?.weaponProperties?.includes("Two-Handed");
          const isThrown = item.data?.weaponProperties?.includes("Thrown"); // Only thrown weapons can be toggled melee/range
          const isMelee = (item.data?.type || "")
            .toLowerCase()
            .includes("melee"); // Melee shown only melee icon
          let curCount = parseFloat(existingItem?.data?.count || "0");
          if (!existingItem) {
            return {
              ...item,
              icon: "IconMoneybag",
              data: {
                ...item.data,
                fromId: item._id,
                count: itemCount,
              },
              fields: {
                ...item?.fields,
                attuned: { hidden: !hasAttunement },
                useBtn: { hidden: !isConsumable },
                handBtn: { hidden: isTwoHanded },
                rangeToggleBtn: { hidden: !(isMelee && isThrown) },
                rangeToggleBtnDisabled: { hidden: isMelee },
                meleeToggleBtnDisabled: {
                  hidden: !isMelee || (isMelee && isThrown),
                },
                ammo: { hidden: isMelee && !isThrown },
              },
            };
          } else {
            valuesToSet[`data.inventory.${thisIndex}.data.count`] =
              curCount + itemCount;
          }
        })
        .filter((i) => i);
      api.addValues(`data.inventory`, itemsToAdd, (record) => {
        if (Object.keys(valuesToSet).length > 0) {
          api.setValues(valuesToSet, (updatedRecord) => {
            // Update total weight after setting count values
            // Requery the record to get the latest data
            api.getRecord(record.recordType, record._id, (record2) => {
              updateTotalWeight(record2);
            });
          });
        } else {
          // Else just update the total weight
          // Requery the record to get the latest data
          api.getRecord(record.recordType, record._id, (record2) => {
            updateTotalWeight(record2);
          });
        }
      });
    } else {
      const existingItem = index !== -1 ? items[index] : undefined;
      const countToAdd = parseFloat(item.data?.count || "1");
      if (existingItem) {
        // Add count to existing item
        const count = parseFloat(existingItem.data?.count || "0");
        // Update the value
        api.setValue(
          `data.inventory.${index}.data.count`,
          count + countToAdd,
          (record) => {
            // Update total weight
            updateTotalWeight(record);
          }
        );
      } else {
        // Add the item to the list
        api.addValue(`data.inventory`, itemToAdd, (record) => {
          // Update total weight
          updateTotalWeight(record);
        });
      }
    }
  }

  function onDrop(type, recordLink, sourceInfo) {
    if (type === "items") {
      onDropItem(recordLink);
      if (sourceInfo) {
        if (sourceInfo?.type === "list") {
          // Query for the record first, then remove the item from the source list
          api.getRecord(
            sourceInfo.recordType,
            sourceInfo.recordId,
            (sourceRecord) => {
              api.removeValueFromRecord(
                sourceRecord,
                sourceInfo.dataPath,
                sourceInfo.index
              );
            }
          );
        } else if (sourceInfo?.type === "partysheet") {
          // Remove the item from party sheet
          api.removePartySheetItem(sourceInfo.itemId);
        }
      }
    }
  }

  function onItemDeleted() {
    // Fetch the character record again to get latest data
    api.getRecord(record.recordType, record._id, (record2) => {
      const valuesToSet = {};
      const totalWeight = updateTotalWeight(record2, false);
      valuesToSet["data.totalWeight"] = totalWeight;

      // Get the current ac due to armor and set it on the
      // record
      const bestEquippedArmor = getBestEquippedArmor();

      if (
        JSON.stringify(record2?.data?.armor || "{}") !==
        JSON.stringify(bestEquippedArmor)
      ) {
        valuesToSet["data.armor"] = bestEquippedArmor;
      }

      const totalAc = getArmorClass(bestEquippedArmor);
      if (record2?.data?.ac !== totalAc) {
        valuesToSet["data.ac"] = totalAc;
      }

      if (Object.keys(valuesToSet).length > 0) {
        api.setValues(valuesToSet);
      }
    });
  }

  function getLocations() {
    const inventory = record?.data?.inventory || [];
    const locations = inventory.map((item) => item.data?.location || "");
    // Filter out duplicates by creating a Set and converting back to array
    // Also filter out empty strings
    const uniqueLocations = [...new Set(locations)].filter(
      (location) => location !== ""
    );

    // Always include the "All" option at the beginning
    return [
      { value: "", label: "All" },
      ...uniqueLocations.map((location) => ({
        value: location,
        label: location,
      })),
    ];
  }

  function redistributeCurrency() {
    // Get current currency values
    let cp = record?.data?.cp || 0;
    let sp = record?.data?.sp || 0;
    let ep = record?.data?.ep || 0;
    let gp = record?.data?.gp || 0;
    let pp = record?.data?.pp || 0;

    // Convert EP to GP first (2 ep = 1 gp)
    const epToGp = Math.floor(ep / 2);
    gp += epToGp;
    ep = ep % 2;

    // Convert CP to SP (10 cp = 1 sp)
    const cpToSp = Math.floor(cp / 10);
    sp += cpToSp;
    cp = cp % 10;

    // Convert SP to GP (10 sp = 1 gp)
    const spToGp = Math.floor(sp / 10);
    gp += spToGp;
    sp = sp % 10;

    // Convert GP to PP (10 gp = 1 pp)
    const gpToPp = Math.floor(gp / 10);
    pp += gpToPp;
    gp = gp % 10;

    api.setValues(
      {
        "data.cp": cp,
        "data.sp": sp,
        "data.ep": ep,
        "data.gp": gp,
        "data.pp": pp,
      },
      updateCoinage
    );
  }

  function addCurrency() {
    // Requery the record to get the latest data
    api.getRecord(record.recordType, record._id, (record2) => {
      const addCp = parseInt(record2?.data?.addCp || "0") || 0;
      const addSp = parseInt(record2?.data?.addSp || "0") || 0;
      const addEp = parseInt(record2?.data?.addEp || "0") || 0;
      const addGp = parseInt(record2?.data?.addGp || "0") || 0;
      const addPp = parseInt(record2?.data?.addPp || "0") || 0;

      const newCp = (record2?.data?.cp || 0) + addCp;
      const newSp = (record2?.data?.sp || 0) + addSp;
      const newEp = (record2?.data?.ep || 0) + addEp;
      const newGp = (record2?.data?.gp || 0) + addGp;
      const newPp = (record2?.data?.pp || 0) + addPp;

      api.setValues(
        {
          "data.cp": newCp,
          "data.sp": newSp,
          "data.ep": newEp,
          "data.gp": newGp,
          "data.pp": newPp,
          "data.addCp": "",
          "data.addSp": "",
          "data.addEp": "",
          "data.addGp": "",
          "data.addPp": "",
        },
        updateCoinage
      );
    });
    api.closeOpenedPopovers();
  }

  function deductCurrency() {
    api.getRecord(record.recordType, record._id, (record2) => {
      const deductCp = parseInt(record2?.data?.deductCp || "0") || 0;
      const deductSp = parseInt(record2?.data?.deductSp || "0") || 0;
      const deductEp = parseInt(record2?.data?.deductEp || "0") || 0;
      const deductGp = parseInt(record2?.data?.deductGp || "0") || 0;
      const deductPp = parseInt(record2?.data?.deductPp || "0") || 0;

      // Convert everything to copper for easier calculation
      // 1 pp = 1000 cp, 1 gp = 100 cp, 1 ep = 50 cp, 1 sp = 10 cp
      let currentCp = record2?.data?.cp || 0;
      let currentSp = record2?.data?.sp || 0;
      let currentEp = record2?.data?.ep || 0;
      let currentGp = record2?.data?.gp || 0;
      let currentPp = record2?.data?.pp || 0;

      const totalCurrentInCp =
        currentCp +
        currentSp * 10 +
        currentEp * 50 +
        currentGp * 100 +
        currentPp * 1000;
      const totalDeductInCp =
        deductCp +
        deductSp * 10 +
        deductEp * 50 +
        deductGp * 100 +
        deductPp * 1000;

      if (totalDeductInCp > totalCurrentInCp) {
        api.showNotification(
          "Not enough currency!",
          "red",
          "Not Enough Currency"
        );
        return;
      }

      // Calculate remaining copper and convert back to denominations
      let remainingCp = totalCurrentInCp - totalDeductInCp;

      // Convert back to highest denominations first
      const newPp = Math.floor(remainingCp / 1000);
      remainingCp = remainingCp % 1000;

      const newGp = Math.floor(remainingCp / 100);
      remainingCp = remainingCp % 100;

      const newEp = Math.floor(remainingCp / 50);
      remainingCp = remainingCp % 50;

      const newSp = Math.floor(remainingCp / 10);
      remainingCp = remainingCp % 10;

      const newCp = remainingCp;

      api.setValues(
        {
          "data.cp": newCp,
          "data.sp": newSp,
          "data.ep": newEp,
          "data.gp": newGp,
          "data.pp": newPp,
          "data.deductCp": "",
          "data.deductSp": "",
          "data.deductEp": "",
          "data.deductGp": "",
          "data.deductPp": "",
        },
        updateCoinage
      );
      api.closeOpenedPopovers();
    });
  }
</script>
