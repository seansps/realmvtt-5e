<script>
  function useAbility() {
    // Get the spell by path to ensure most up-to-date value
    const abilityDataPath = dataPath.replace(".data.useBtn", "");
    const ability = api.getValue(abilityDataPath);

    const abilityName = ability?.name || "Unknown Ability";
    const abilityCost = parseInt(ability?.data?.cost || "0", 10);
    // Whether or not to prompt a roll for this ability
    const promptRoll = ability?.data?.rollOnUse || false;
    const abilityDescription = api.richTextToMarkdown(
      ability?.data?.description || ""
    );
    const abilityIcon = ability?.portrait
      ? `![${abilityName}](${assetUrl}${encodeURI(
          ability?.portrait
        )}?width=40&height=40) `
      : "";

    // To get the uses we need maxDailyUses and dailUses from the parent ability group list
    const abilityGroupListDataPath = dataPath.replace(
      /[.]data[.]abilities[.]\d+[.]data[.]useBtn/,
      ""
    );
    const abilityGroupList = api.getValue(abilityGroupListDataPath);

    let dailyUses = parseInt(abilityGroupList?.data?.dailyUses, 10) || 0;
    let maxDailyUses = parseInt(abilityGroupList?.data?.maxDailyUses, 10) || 1;

    if (dailyUses < maxDailyUses) {
      const dataPathToDaily = `${abilityGroupListDataPath}.data.dailyUses`;
      api.setValue(dataPathToDaily, dailyUses + abilityCost);
    }

    // Get the configured value for the ability group
    const abilityGroupValue = abilityGroupList?.data?.value || "";

    // Create macros for all effects that this spell can apply
    const effects = ability?.data?.effects || [];
    let effectButtons = getEffectMacrosFor(effects);

    // Create macros for all saving throws that this ability can apply
    let savingThrowButtons = "";
    if (ability?.data?.isSave) {
      const savingThrows = ability?.data?.savingThrows || [];
      // Save DC ability is set in the ability group list settings
      const saveDcAbility = abilityGroupList?.data?.savingThrowAbility || "";
      const altSaveDcAbility = abilityGroupList?.data?.altSavingThrowAbility || "";
      let abilityModifier = parseInt(
        record?.data?.[`${saveDcAbility}Mod`] || "0",
        10
      );
      if (altSaveDcAbility) {
        const altModifier = parseInt(
          record?.data?.[`${altSaveDcAbility}Mod`] || "0",
          10
        );
        abilityModifier = Math.max(abilityModifier, altModifier);
      }
      const proficiencyBonus = parseInt(
        record?.data?.proficiencyBonus || "0",
        10
      );
      // Optionally override with the character's spellcasting DC (8 + spell mod +
      // proficiency + any Spell DC Bonus modifiers).
      let spellDcBonus = 0;
      if (ability?.data?.usesSpellDC) {
        const spellAbility = getCharacterSpellcastingAbility(record);
        abilityModifier = parseInt(
          record?.data?.[`${spellAbility}Mod`] || "0",
          10
        );
        getEffectsAndModifiersForToken(record, ["spellDCBonus"]).forEach((m) => {
          const v = parseInt(m.value, 10);
          if (!isNaN(v)) spellDcBonus += v;
        });
      }
      const saveDc = 8 + abilityModifier + proficiencyBonus + spellDcBonus;
      savingThrows.forEach((savingThrow) => {
        // Look up saves of selected tokens and prompt roll for each
        const rollSaveButton = `\`\`\`Roll_${capitalize(savingThrow)}_Save
const selectedTokens = api.getSelectedOrDroppedToken();
selectedTokens.forEach(token => {
  let saveModifiers = [];
  const modifier = token?.data?.['${savingThrow}Save'] || 0;
  saveModifiers.push({
    name: '${capitalize(savingThrow)} Save',
    value: modifier,
    active: true,
  });

  const saveMods = getEffectsAndModifiersForToken(token, ['saveBonus', 'savePenalty'], '${savingThrow}');
  saveMods.forEach(mod => {
    saveModifiers.push(mod);
  });

  const minRoll = getMinRollModifier(saveModifiers);
  // Filter these out of the modifiers array, we don't need them to be toggleable
  saveModifiers = saveModifiers.filter(m => !m.value.toString().startsWith('minroll'));

  const metadata = {
    "rollName": '${capitalize(savingThrow)} Save',
    "tooltip": '${capitalize(savingThrow)} Saving Throw',
    "dc": ${saveDc},
    "minRoll": minRoll
  }

  api.promptRollForToken(token, '${capitalize(
    savingThrow
  )} Save', '1d20', saveModifiers, metadata, 'save');
});
\`\`\``;
        // Add the rollSaveButton to the savingThrowButtons
        savingThrowButtons += rollSaveButton + "\n";
      });
    }

    // Optional ongoing-damage macro button (with its own level scaling)
    let ongoingDamageButton = "";
    if (ability?.data?.ongoingDamage) {
      let ongoing = ability.data.ongoingDamage || "";
      const ongoingDamageLevelScaling =
        ability?.data?.ongoingDamageLevelScaling || [];
      if (ongoingDamageLevelScaling.length > 0) {
        const characterLevel = parseInt(record?.data?.level || "1", 10);
        let bestMatch = null;
        ongoingDamageLevelScaling.forEach((entry) => {
          const entryLevel = parseInt(entry?.data?.level || "0", 10);
          if (entryLevel <= characterLevel) {
            if (
              !bestMatch ||
              entryLevel > parseInt(bestMatch?.data?.level || "0", 10)
            ) {
              bestMatch = entry;
            }
          }
        });
        if (bestMatch?.data?.value) {
          ongoing = bestMatch.data.value;
        }
      }
      ongoing = checkForReplacements(ongoing, {}, record);
      ongoingDamageButton = `\`\`\`Roll_Ongoing_Damage
api.roll('${ongoing}', { rollName: 'Ongoing Damage' }, 'damage');
\`\`\`
`;
    }

    const message = `
#### ${abilityIcon}${abilityName}

---
${abilityDescription}

---
${effectButtons}
${savingThrowButtons}
${ongoingDamageButton}`;

    api.sendMessage(message, undefined, [], []);

    const ourToken = api.getToken();
    const targets = api.getTargets();
    const tokenId = ourToken?._id;
    const targetId = targets.length > 0 ? targets[0]?.token?._id : null;

    const metadata = {
      rollName: abilityName,
      tooltip: `${abilityName} Result`,
      damageTypes: ability?.data?.damageTypes || [],
      showHalf: ability?.data?.showHalf || false,
      showHealing: ability?.data?.showHealing || false,
      isMagical: ability?.data?.isMagical || false,
      tokenId: tokenId,
      targetId: targetId,
      animation: ability?.data?.animation || null,
    };

    // Ability-level scaling: use the highest entry whose level <= character level
    let scaledValue = abilityGroupValue;
    const levelScaling = ability?.data?.levelScaling || [];
    if (levelScaling.length > 0) {
      const characterLevel = parseInt(record?.data?.level || "1", 10);
      let bestMatch = null;
      levelScaling.forEach((entry) => {
        const entryLevel = parseInt(entry?.data?.level || "0", 10);
        if (entryLevel <= characterLevel) {
          if (
            !bestMatch ||
            entryLevel > parseInt(bestMatch?.data?.level || "0", 10)
          ) {
            bestMatch = entry;
          }
        }
      });
      if (bestMatch?.data?.value) {
        scaledValue = bestMatch.data.value;
      }
    }

    // Priority: levelScaling > rollOverride > abilityGroupValue
    let rollValue = abilityGroupValue || "1d20";
    if (ability?.data?.rollOverride) {
      rollValue = ability?.data?.rollOverride;
    }
    if (scaledValue && scaledValue !== abilityGroupValue) {
      // Level scaling found a match — it takes priority
      rollValue = scaledValue;
    }
    rollValue = checkForReplacements(rollValue, { Roll: abilityGroupValue });

    if (promptRoll) {
      api.promptRoll(abilityName, rollValue, undefined, metadata, "ability");
    } else if (ability?.data?.animation && tokenId) {
      api.playAnimation(ability?.data?.animation, tokenId, targetId);
    }
  }
</script>

<accordion
  size="xs"
  field="descriptionOpen"
  label="Description"
  variant="minimal"
  chevronposition="left"
>
  <accordion.control>
    <div style="display: column; gap: 2px; width: 100%">
      <div style="display: flex; gap: 2px; width: 100%; align-items: center;">
        <div
          style="width: 30px; height: 30px; min-width: 30px; min-height: 30px"
        >
          <portrait width="30px" height="30px" field="portrait"></portrait>
        </div>
        <div style="flex: 1; min-width: 0">
          <namefield
            size="xs"
            width="100%"
            variant="unstyled"
            field="namefield"
            placeholder="Ability Name..."
          ></namefield>
        </div>
        <div
          style="
            flex-shrink: 0;
            white-space: nowrap;
            display: flex;
            gap: 4px;
            align-items: center;
          "
        >
          <label
            color="dimmed"
            template="{value > 0 ? 'Cost: ' + value + (item.data.actionType ? '&nbsp;|&nbsp;' : '') : ''}"
            field="cost"
            size="xs"
            hideifempty="true"
          ></label>
          <label color="dimmed" field="actionType" size="xs"></label>
        </div>
        <div style="margin-left: auto">
          <button
            size="xxs"
            field="useBtn"
            label="Use"
            onclick="useAbility();"
          ></button>
        </div>
      </div>
    </div>
  </accordion.control>
  <richtextfield
    disablecontrols="true"
    field="description"
    placeholder="Enter description..."
  ></richtextfield>
</accordion>
