<script>
  function applyMath(value, math) {
    // Trim spaces and split the string into operator and number
    const trimmedMath = math.trim();
    const operator = trimmedMath.charAt(0);
    const number = parseInt(trimmedMath.slice(1).trim(), 10);

    if (isNaN(number)) {
      return value;
    }

    switch (operator) {
      case '+':
        return value + number;
      case '-':
        return value - number;
      case '*':
        return value * number;
      case '/':
        return Math.floor(value / number); // Always round down
      default:
        return value;
    }
  }

  function getEffectsAndModifiersForToken(target, types = [], field = '', itemId = undefined) {
    if (!target) {
      return [];
    }
    let results = [];

    // First collect modifiers from effects
    const effects = target?.effects || [];
    effects.forEach((effect) => {
      const rules = effect.rules || [];
      rules.forEach((rule) => {
        const ruleType = rule?.type || '';
        const isPenalty = ruleType.toLowerCase().includes('penalty');
        let value = rule.value || '';
        if (rule.valueType === 'number') {
          value = parseInt(rule.value, 10);
          if (isNaN(value)) {
            value = 0;
          }
          if (isPenalty && value > 0) {
            value = -value;
          }
        }
        else if (rule.valueType === 'string' && !value.trim().startsWith('-') && isPenalty) {
          value = '-' + value;
        }
        if (value !== 0 && (rule.valueType === 'number' || rule.valueType === 'string')) {
          results.push({
            name: effect.name || 'Effect',
            value: value,
            active: true,
            modifierType: ruleType,
            field: rule?.field || '',
            valueType: rule.valueType,
            isPenalty: isPenalty
          });
        }
        else if (rule.valueType === 'api') {
          let value = parseInt(target?.effectValues?.[effect?._id] || '0', 10);
          if (isPenalty && value > 0) {
            value = -value;
          }
          if (value !== 0) {
            results.push({
              name: effect.name || 'Effect',
              value: value,
              active: true,
              modifierType: ruleType,
              field: rule?.field || '',
              valueType: rule.valueType,
              isPenalty: isPenalty
            });
          }
        }
        else if (rule.valueType === 'stack') {
          // The value is the number of times they have this effect
          let value = target?.effectIds?.filter(id => id === effect?._id).length;
          if (isPenalty && value > 0) {
            value = -value;
          }
          // Check if there is addtional math to apply to it
          const math = rule?.value || '';
          if (math) {
            value = applyMath(value, math);
          }
          if (isPenalty && value > 0) {
            value = -value;
          }
          if (value !== 0) {
            results.push({
              name: effect.name || 'Effect',
              value: value,
              active: true,
              modifierType: ruleType,
              field: rule?.field || '',
              valueType: rule.valueType,
              isPenalty: isPenalty
            });
          }
        }
      });
    });

    // Now collect all modifiers from Features and Items
    const features = target?.record?.data?.features || [];
    const items = target?.record?.data?.inventory || [];
    // Filter items that are not equipped or that require attunement and not attuned
    const equippedItems = items.filter(item => item.data?.carried === 'equipped'
      && (!item.data?.attunement || item.data?.attuned === 'true'));
    [...features, ...equippedItems].forEach((feature) => {
      const modifiers = feature.data?.modifiers || [];
      modifiers.forEach((modifier) => {
        const ruleType = modifier.data?.type || '';
        const isPenalty = ruleType.toLowerCase().includes('penalty');
        let value = modifier.data?.value || '';
        if (modifier.data?.valueType === 'number') {
          value = parseInt(modifier.data?.value, 10);
          if (isNaN(value)) {
            value = 0;
          }
          if (isPenalty && value > 0) {
            value = -value;
          }
        }
        else if (modifier.data?.valueType === 'field') {
          const fieldToUse = modifier.data?.value || '';
          if (fieldToUse) {
            value = target?.record?.data?.[fieldToUse] || '';
          }
        }
        else if (modifier.data?.valueType === 'string' && !value.trim().startsWith('-') && isPenalty) {
          value = '-' + value;
        }

        // Only relevant if it has a value
        if (value !== 0) {
          // Check if this only applies to equipped item and mark it with ID if so 
          const itemOnly = modifier.data?.itemOnly || false;
          results.push({
            name: feature?.name || 'Feature',
            value: value,
            active: modifier.data?.active === true,
            modifierType: ruleType,
            field: modifier.data?.field || '',
            valueType: modifier.data?.valueType,
            itemId: itemOnly ? feature?._id : undefined,
            isPenalty: isPenalty
          });
        }
      });
    });

    if (types && types.length > 0) {
      results = results.filter(r => types.includes(r.modifierType));
    }

    if (field && field !== '') {
      results = results.filter(r => r.field === field || r.field === 'all' || !r.field);
    }

    // Filter by itemId if provided
    results = results.filter(r => r.itemId === itemId || r.itemId === undefined);

    return results;
  }

  // Collects all effects and modifiers for the record
  // If types is provided, it will only return effects of those types
  // If field is provided, it will only return effects that match that field
  function getEffectsAndModifiers(types = [], field = '', itemId = undefined) {
    let results = [];

    // First collect modifiers from effects
    const effects = record?.effects || [];
    effects.forEach((effect) => {
      const rules = effect.rules || [];
      rules.forEach((rule) => {
        const ruleType = rule?.type || '';
        const isPenalty = ruleType.toLowerCase().includes('penalty');
        let value = rule.value || '';
        if (rule.valueType === 'number') {
          value = parseInt(rule.value, 10);
          if (isNaN(value)) {
            value = 0;
          }
          if (isPenalty && value > 0) {
            value = -value;
          }
        }
        else if (rule.valueType === 'string' && !value.trim().startsWith('-') && isPenalty) {
          value = '-' + value;
        }
        if (value !== 0 && (rule.valueType === 'number' || rule.valueType === 'string')) {
          results.push({
            name: effect.name || 'Effect',
            value: value,
            active: true,
            modifierType: ruleType,
            field: rule?.field || '',
            valueType: rule.valueType,
            isPenalty: isPenalty
          });
        }
        else if (rule.valueType === 'api') {
          let value = parseInt(record?.effectValues?.[effect?._id] || '0', 10);
          if (isPenalty && value > 0) {
            value = -value;
          }
          if (value !== 0) {
            results.push({
              name: effect.name || 'Effect',
              value: value,
              active: true,
              modifierType: ruleType,
              field: rule?.field || '',
              valueType: rule.valueType,
              isPenalty: isPenalty
            });
          }
        }
        else if (rule.valueType === 'stack') {
          // The value is the number of times they have this effect
          let value = record?.effectIds?.filter(id => id === effect?._id).length;
          if (isPenalty && value > 0) {
            value = -value;
          }
          // Check if there is addtional math to apply to it
          const math = rule?.value || '';
          if (math) {
            value = applyMath(value, math);
          }
          if (value !== 0) {
            results.push({
              name: effect.name || 'Effect',
              value: value,
              active: true,
              modifierType: ruleType,
              field: rule?.field || '',
              valueType: rule.valueType,
              isPenalty: isPenalty
            });
          }
        }
      });
    });

    // Now collect all modifiers from Features and Items
    const features = record?.data?.features || [];
    const items = record?.data?.inventory || [];
    // Filter items that are not equipped or that require attunement and not attuned
    const equippedItems = items.filter(item => item.data?.carried === 'equipped'
      && (!item.data?.attunement || item.data?.attuned === 'true'));
    [...features, ...equippedItems].forEach((feature) => {
      const modifiers = feature.data?.modifiers || [];
      modifiers.forEach((modifier) => {
        const ruleType = modifier.data?.type || '';
        const isPenalty = ruleType.toLowerCase().includes('penalty');
        let value = modifier.data?.value || '';
        if (modifier.data?.valueType === 'number') {
          value = parseInt(modifier.data?.value, 10);
          if (isNaN(value)) {
            value = 0;
          }
          if (isPenalty && value > 0) {
            value = -value;
          }
        }
        else if (modifier.data?.valueType === 'field') {
          const fieldToUse = modifier.data?.value || '';
          if (fieldToUse) {
            value = record?.data?.[fieldToUse] || '';
          }
        }
        else if (modifier.data?.valueType === 'string' && !value.trim().startsWith('-') && isPenalty) {
          value = '-' + value;
        }

        // Only relevant if it has a value
        if (value !== 0) {
          // Check if this only applies to equipped item and mark it with ID if so 
          const itemOnly = modifier.data?.itemOnly || false;
          results.push({
            name: feature?.name || 'Feature',
            value: value,
            active: modifier.data?.active === true,
            modifierType: ruleType,
            field: modifier.data?.field || '',
            valueType: modifier.data?.valueType,
            itemId: itemOnly ? feature?._id : undefined,
            isPenalty: isPenalty
          });
        }
      });
    });

    if (types && types.length > 0) {
      results = results.filter(r => types.includes(r.modifierType));
    }

    if (field && field !== '') {
      results = results.filter(r => r.field === field || r.field === 'all' || !r.field);
    }

    // Filter by itemId if provided
    results = results.filter(r => r.itemId === itemId || r.itemId === undefined);

    return results;
  }

  function getDamageType(rollString) {
    const regex = /(\d+d\d+)(?:\s*\+\s*\d+)?(?:\s+(\w+))?/;
    const match = rollString.match(regex);
    return match && match[2] ? match[2] : "untyped";
  }

  function getArmorClassForToken(token) {
    const record = token?.record;
    const acCalculationMods = getEffectsAndModifiersForToken(token, ['armorClassCalculation']);
    const dexMod = parseInt(record?.data?.dexterityMod || '0', 10);
    let armorClass = 10 + dexMod;
    let calcBonus = 0;
    acCalculationMods.forEach(mod => {
      // We only benefit from the highest AC calculation modifier
      if (mod.field && mod.field !== 'dexterity') {
        const acBonus = attribute !== mod.field ? parseInt(record?.data?.[`${mod.field}Mod`] || '0', 10) : modVal;
        if (acBonus > calcBonus) {
          calcBonus = acBonus;
        }
      }
    });
    // Get general AC bonuses
    const acBonuses = getEffectsAndModifiersForToken(token, ['armorClassBonus', 'armorClassPenalty']);
    acBonuses.forEach(mod => {
      if (mod.value) {
        const acBonus = parseInt(mod.value || '0', 10);
        if (!isNaN(acBonus)) {
          calcBonus += acBonus;
        }
      }
    });
    armorClass += calcBonus;
    return armorClass;
  }

  function handleRoll() {
    const attackDataPath = dataPath.replace('.data.rollBtn', '');
    const attack = api.getValue(attackDataPath);

    let name = attack?.name || 'New Item';
    if (attack?.identified === false) {
      name = attack?.unidentifiedName || 'Unidentified Item';
    }

    const dexMod = parseInt(record?.data?.dexterityMod || '0', 10);
    const strMod = parseInt(record?.data?.strengthMod || '0', 10);
    let dexOrStr = 'Strength';
    let modToUse = strMod;


    const atkRoll = '1d20';
    const modifiers = getEffectsAndModifiers(['attackBonus', 'attackPenalty'], undefined, attack._id);

    let ranged = false;
    // Always ranged attack for ranged weapons
    if (attack?.data?.type?.includes('ranged')) {
      ranged = true;
    }
    // If this is a thrown weapon, check the rangeToggleBtn
    if (attack?.data?.weaponProperties?.includes('Thrown')) {
      ranged = attack?.data?.rangeToggleBtn === 'ranged';
    }

    // Ranged is always dexterity
    dexOrStrMod = attack?.data?.type?.includes('ranged') ? 'Dexterity' : 'Strength';
    // If not ranged, check if it has Finesse property and default to dexterity unless strength is higher
    if (attack?.data?.weaponProperties?.includes('Finesse')) {
      dexOrStrMod = strMod > dexMod ? 'Strength' : 'Dexterity';
    }
    if (dexOrStrMod === 'Dexterity') {
      modToUse = dexMod;
    }

    // Add the modifier to the modifiers array
    if (modToUse !== 0) {
      modifiers.push({
        name: dexOrStrMod,
        value: modToUse,
        active: true
      });
    }

    let icon = 'IconSword';
    if (ranged) {
      icon = 'IconBow';
    }

    // If ranged, deduct 1 ammo if set
    if (ranged && attack?.data?.ammo) {
      const newAmmo = parseInt(attack?.data?.ammo || '0', 10) - 1;
      if (newAmmo >= 0) {
        api.setValue(`${attackDataPath}.data.ammo`, newAmmo);
      }
    }

    const normalRange = parseInt(attack?.data?.normalRange || '0', 10);
    const maxRange = parseInt(attack?.data?.maxRange || '0', 10);

    // If ranged, you have Disadvantage on the roll if you are within 5 feet of an enemy who can see you and doesn’t have the Incapacitated condition
    // Get range to all other tokens
    let disDueToProximity = false;
    if (ranged) {
      const ourToken = api.getToken();
      api.getOtherTokens().forEach(token => {
        if (disDueToProximity) {
          // Short circuit if we already have disadvantage due to proximity
          return;
        }
        if (token?.faction !== 'neutral' && token?.faction !== ourToken?.faction) {
          // Check if they have incapacitated condition
          const hasIncapacitated = (token?.effects || []).some(eff => eff.name === 'Incapacitated');
          if (!hasIncapacitated) {
            // Check distance
            const distance = api.getDistance(ourToken, token);
            if (distance <= 5) {
              disDueToProximity = true;
            }
          }
        }
      });
    }

    let damage = attack?.data?.damage || '1d4';

    // Check for versatile property and use 2-handed damage if 2handed is set
    if (attack?.data?.weaponProperties?.includes('Versatile') && attack?.data?.handBtn === 'two') {
      damage = attack?.data?.versatileDamage || damage;
    }

    let damageModifiers = getEffectsAndModifiers(['damageBonus', 'damagePenalty'], undefined, attack._id);
    // Get the default damage type of the attack and apply that to damage modifiers
    const damageType = getDamageType(damage);
    damageModifiers = damageModifiers.map(mod => {
      return {
        ...mod,
        type: damageType
      }
    });

    // Add dex or str mod to damage as required unless the damage roll has no dice (e.g. 1) and is not "Unarmed Strike"
    if (damage.includes('d') && !name.toLowerCase().includes('unarmed')) {
      // The modifier is inactive by default if this was an off-hand attack, unless the modifier is a penalty
      let active = true;
      if (attack?.data?.handBtn === 'off' && modToUse > 0) {
        active = false;
      }
      damageModifiers.push({
        name: dexOrStrMod,
        type: damageType,
        value: modToUse,
        active: active
      });
    }

    const targets = api.getTargets();
    targets.forEach(target => {
      // Get calculated AC from modifiers - use if any
      const targetAc = getArmorClassForToken(target?.token);
      const targetName = target?.token?.identified === false ? target?.token?.record?.unidentifiedName : target?.token?.record?.name;
      const targetDistance = target?.distance || 0;

      // If the target is beyond normal range, and normal range is > 0, add a disadvantage modifier
      // and if it was greater than the max, make it apparent in the roll prompt
      if (ranged && targetDistance > maxRange && maxRange > 0) {
        modifiers.push({
          name: 'Target is Beyond Max Range',
          value: 'disadvantage',
          active: true
        });
      }
      else if (ranged && targetDistance > normalRange && normalRange > 0) {
        modifiers.push({
          name: 'Target is Beyond Normal Range',
          value: 'disadvantage',
          active: true
        });
      }

      if (disDueToProximity) {
        modifiers.push({
          name: 'Enemy is Within 5 Feet',
          value: 'disadvantage',
          active: true
        });
      }

      const diceRoll = '1d20';
      const metadata = {
        "rollName": 'Attack',
        "attack": `${name}`,
        "icon": icon,
        "targetName": targetName,
        "tooltip": `Attack Roll for ${name}`,
        "dc": targetAc,
        "damage": damage,
        "damageModifiers": damageModifiers
      }
      api.promptRoll(`${name} Attack`, diceRoll, modifiers, metadata, 'attack');
    });

    if (!targets.length) {
      const diceRoll = '1d20';
      const metadata = {
        "rollName": 'Attack',
        "attack": `${name}`,
        "icon": icon,
        "tooltip": `Attack Roll for ${name}`,
        "dc": 0,
        "damage": damage,
        "damageModifiers": damageModifiers
      }
      api.promptRoll(`Attack ${name}`, diceRoll, modifiers, metadata, 'attack');
    }
  }

  function rollDamage() {
    const dmgRoll = record.data.damage;
    const name = record.name;

    const damage = (record.data?.damage || '');
    const damageType = getDamageType(damage);

    const modifiers = [];

    parentRecord.effects.forEach((eff) => {
      eff.rules.forEach(rule => {
        if (rule.type === "damage_bonus") {
          let baseValue = parseInt(rule.value, 10);
          let adjustedValue = baseValue;
          if (rule.valueType === "stack") {
            adjustedValue = parentRecord.effectIds.reduce((count, current) => {
              return count + (current === eff._id ? 1 : 0);
            }, 0);
          }
          let mod = {
            name: eff.name,
            type: damageType,
            value: adjustedValue,
            active: true
          };
          modifiers.push(mod);
        }
        else if (rule.type === "damage_penalty") {
          let baseValue = parseInt(rule.value, 10);
          let adjustedValue = baseValue;
          if (rule.valueType === "stack") {
            adjustedValue = parentRecord.effectIds.reduce((count, current) => {
              return count + (current === eff._id ? 1 : 0);
            }, 0);
          }
          if (adjustedValue > 0) {
            adjustedValue *= -1;
          }
          let mod = {
            name: eff.name,
            type: damageType,
            value: adjustedValue,
            active: true
          };
          modifiers.push(mod);
        }
      });
    });

    api.promptRoll(`Damage (${name})`, dmgRoll, modifiers, {}, "damage");
  }
</script>
