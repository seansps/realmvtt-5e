<script>
  // Build the ammo-select dropdown options from Ammunition items in inventory.
  function ammoOptions() {
    const inventory = record.data?.inventory || [];
    return inventory
      .filter((item) => item.data?.subtype === "Ammunition")
      .map((ammo) => ({
        value: ammo._id,
        label:
          ammo.identified !== false
            ? ammo.name
            : ammo.unidentifiedName || ammo.name,
      }));
  }

  // When the user links an ammo item to this weapon, seed the weapon's ammo
  // count from the selected ammo item's current count.
  function onAmmoSelectChange(value) {
    const inventory = record.data?.inventory || [];
    const ammo = inventory.find((item) => item._id === value);
    const attackDataPath = getNearestParentDataPath(dataPath);
    api.setValues({
      [`${attackDataPath}.data.ammo`]: ammo?.data?.count || 0,
    });
  }

  // When the weapon's ammo count is edited directly, push the new count back to
  // the linked ammo item (and any sibling weapons sharing the same ammo). Thrown
  // weapons are their own ammo, so they sync to their own inventory count.
  function onAmmoChange() {
    const attackDataPath = getNearestParentDataPath(dataPath);
    const attack = api.getValue(attackDataPath);
    const isThrown = (attack?.data?.weaponProperties || []).includes("Thrown");
    let ammoSelected = attack?.data?.ammoSelect;
    const newAmmoCount = attack?.data?.ammo;

    if (isThrown && !ammoSelected) {
      ammoSelected = attack._id;
    }
    if (!ammoSelected) return;

    const inventory = record.data?.inventory || [];
    const valuesToSet = {};

    inventory.forEach((item, index) => {
      if (item._id === ammoSelected) {
        valuesToSet[`data.inventory.${index}.data.count`] = newAmmoCount;
      }
      if (item.data?.ammoSelect === ammoSelected && item._id !== attack._id) {
        valuesToSet[`data.inventory.${index}.data.ammo`] = newAmmoCount;
      }
    });

    if (Object.keys(valuesToSet).length > 0) {
      api.setValues(valuesToSet);
    }
  }

  // Does a weaponFinesse modifier's `field` apply to this attack? Supports:
  //   - an exact weaponType (e.g. "Unarmed", "Longsword")
  //   - one or more category clauses joined by "and"/"," — each
  //     "(Simple|Martial) [Melee|Ranged] weapons [that have|that don't have the
  //      X or Y property]". A clause matches if the weapon's subtype contains the
  //     category (and melee/ranged if given) and the property qualifier holds.
  //   e.g. "Simple weapons and Martial weapons that have the Light property"
  //        = any Simple weapon OR a Martial weapon with the Light property.
  function matchesWeaponFinesseField(field, attack) {
    const f = (field || "").toLowerCase().trim();
    if (!f) return false;
    const weaponType = (attack?.data?.weaponType || "").toLowerCase().trim();
    const subtype = (attack?.data?.subtype || "").toLowerCase();
    const props = (attack?.data?.weaponProperties || []).map((p) =>
      String(p).toLowerCase().trim(),
    );

    const clauses = f
      .split(/\s+and\s+|,\s*/)
      .map((c) => c.trim())
      .filter(Boolean);

    return clauses.some((clause) => {
      // Exact weapon-type match (e.g. "unarmed")
      if (clause === weaponType) return true;

      // Category clause: "(simple|martial) [melee|ranged] weapons [qualifier]"
      const catMatch = clause.match(
        /^(simple|martial)(?:\s+(melee|ranged))?\s+weapons?(?:\s+(.+))?$/,
      );
      if (!catMatch) return false;
      const category = catMatch[1];
      const meleeRanged = catMatch[2];
      const qualifier = (catMatch[3] || "").trim();

      if (!subtype.includes(category)) return false;
      if (meleeRanged && !subtype.includes(meleeRanged)) return false;
      if (!qualifier) return true;

      // "that have the X [or Y] property" — weapon has ANY of the listed props
      const have = qualifier.match(
        /^that\s+have\s+the\s+(.+?)\s+propert(?:y|ies)$/,
      );
      if (have) {
        return have[1]
          .split(/\s+or\s+|,\s*/)
          .map((p) => p.trim())
          .filter(Boolean)
          .some((p) => props.includes(p));
      }
      // "that don't have the X [or Y] property" — weapon has NONE of them
      const dont = qualifier.match(
        /^that\s+(?:don'?t|do\s+not)\s+have\s+the\s+(.+?)\s+propert(?:y|ies)$/,
      );
      if (dont) {
        return !dont[1]
          .split(/\s+or\s+|,\s*/)
          .map((p) => p.trim())
          .filter(Boolean)
          .some((p) => props.includes(p));
      }
      return false;
    });
  }

  // Parse profciencies and determine from weapon subtype if proficient with it
  function getIsProficient(attack) {
    const weaponSubtype = attack?.data?.subtype || "simple";
    const weaponName = (attack?.name || "").trim().toLowerCase();
    const weaponProperties = (attack?.data?.weaponProperties || [])
      .map((p) => p.trim().toLowerCase())
      .filter((p) => p !== "");

    const weaponProficiencies = record?.data?.weaponProficiencies || "";
    // Convert the string to an array of proficiencies
    const proficienciesArray = weaponProficiencies
      .split(/,| and /)
      .map((p) => p.trim().toLowerCase())
      .filter((p) => p !== "");

    let isProficient = false;

    let martialOrSimple = "simple";
    if (weaponSubtype.toLowerCase().includes("martial")) {
      martialOrSimple = "martial";
    }

    proficienciesArray.forEach((prof) => {
      // If it requires a trait, check trait, check for string `that have the X or Y property`
      if (prof.includes("that have the") && prof.includes(martialOrSimple)) {
        weaponProperties.forEach((wp) => {
          if (prof.includes(wp)) {
            isProficient = true;
          }
        });
      } else if (prof.includes(martialOrSimple)) {
        isProficient = true;
      } else if (prof.includes(weaponName)) {
        isProficient = true;
      }
    });

    return isProficient;
  }

  function handleRoll() {
    const attackDataPath = dataPath.replace(".data.rollBtn", "");
    const attack = api.getValue(attackDataPath);

    if (!attack) {
      console.error("Attack is undefined at path:", attackDataPath);
      return;
    }

    let name = attack?.name || "New Item";
    if (attack?.identified === false) {
      name = attack?.unidentifiedName || "Unidentified Item";
    }

    const dexMod = parseInt(record?.data?.dexterityMod || "0", 10);
    const strMod = parseInt(record?.data?.strengthMod || "0", 10);
    const proficiencyBonus = parseInt(
      record?.data?.proficiencyBonus || "2",
      10,
    );

    let dexOrStr = "Strength";
    let modToUse = strMod;

    const atkRoll = "1d20";

    let ranged = false;
    // Always ranged attack for ranged weapons
    if (attack?.data?.type?.includes("ranged")) {
      ranged = true;
    }
    // If this is a thrown melee weapon, check the rangeToggleBtn
    if (attack?.data?.weaponProperties?.includes("Thrown") && !ranged) {
      ranged = attack?.data?.rangeToggleBtn === "ranged";
    }

    // Get modifiers for this type of attack
    let modifiers = getEffectsAndModifiers(
      ["attackBonus", "attackPenalty"],
      ranged ? "ranged" : "melee",
      attack._id,
    );

    // If bloodied, look for bloodied modifiers
    const curhp = record?.data?.curhp || 0;
    const maxhp = record?.data?.hitpoints || 0;
    if (maxhp > 0 && curhp <= Math.floor(maxhp / 2)) {
      const bloodiedMods = getEffectsAndModifiers(
        ["attackBonus", "attackPenalty"],
        "bloodied",
        attack._id,
      );
      bloodiedMods.forEach((mod) => {
        if (
          !modifiers.some(
            (m) =>
              m.name === mod.name &&
              m.type === mod.type &&
              m.value === mod.value,
          )
        ) {
          modifiers.push(mod);
        }
      });
    }

    // We also get modifiers that apply only to attacks with the specific weapon properties or weapon type
    const specialModifierTypes = [
      ...(attack?.data?.weaponProperties || [])
        .map((p) => p.toLowerCase())
        .filter((p) => p !== "thrown" || ranged),
      (attack?.data?.weaponType || "untyped").toLowerCase(),
    ];
    specialModifierTypes.forEach((type) => {
      const specialModifiers = getEffectsAndModifiers(
        ["attackBonus", "attackPenalty"],
        type,
        attack._id,
      );
      specialModifiers.forEach((mod) => {
        // Don't add duplicate modifiers
        if (
          !modifiers.some(
            (m) =>
              m.name === mod.name &&
              m.value === mod.value &&
              m.modifierType === mod.modifierType,
          )
        ) {
          modifiers.push(mod);
        }
      });
    });

    // Ranged is always dexterity
    dexOrStrMod = attack?.data?.type?.includes("ranged")
      ? "Dexterity"
      : "Strength";
    // If not ranged, check if it has Finesse property and default to dexterity unless strength is higher
    if (attack?.data?.weaponProperties?.includes("Finesse")) {
      dexOrStrMod = strMod > dexMod ? "Strength" : "Dexterity";
    }
    // weaponFinesse modifier: grants Finesse-like STR/DEX choice to weapons whose
    // type matches the modifier's field (e.g. "Unarmed", "Simple weapons and
    // Martial weapons that have the Light property").
    const weaponFinesseMods = getEffectsAndModifiers(["weaponFinesse"]);
    if (
      weaponFinesseMods.some((m) => matchesWeaponFinesseField(m.field, attack))
    ) {
      dexOrStrMod = strMod > dexMod ? "Strength" : "Dexterity";
    }
    if (dexOrStrMod === "Dexterity") {
      modToUse = dexMod;
    }
    // Check for attack calculation modifier
    const attackCalculationMod = getEffectsAndModifiers(
      ["attackCalculation"],
      undefined,
      attack._id,
    );
    // If we have an attack calculation modifier, use the field defined instead
    // of the above
    if (attackCalculationMod.length) {
      const attackCalculation =
        attackCalculationMod[attackCalculationMod.length - 1]?.field;
      if (attackCalculation) {
        dexOrStrMod = capitalize(attackCalculation);
        modToUse = parseInt(
          record?.data?.[`${attackCalculation.toLowerCase()}Mod`] || "0",
          10,
        );
      }
    }

    // Add the modifier to the modifiers array
    if (modToUse !== 0) {
      modifiers.push({
        name: dexOrStrMod,
        value: modToUse,
        active: true,
      });
    }

    const isProficient = getIsProficient(attack);
    if (isProficient) {
      modifiers.push({
        name: "Proficient",
        value: proficiencyBonus,
        active: true,
      });
    }

    let icon = "IconSword";
    if (ranged) {
      icon = "IconBow";
    }

    // If ranged, deduct 1 ammo and keep linked ammo / sibling weapons in sync.
    // Ranged (non-Thrown) deducts from the weapon, its linked ammo item, and any
    // sibling weapons sharing that ammo. Thrown weapons are their own ammo, so
    // they deduct from the weapon and its own inventory count.
    if (ranged && attack?.data?.ammo) {
      const currentAmmo = parseInt(attack?.data?.ammo || "0", 10);
      const isThrown = (attack?.data?.weaponProperties || []).includes("Thrown");
      const ammoSelected = attack?.data?.ammoSelect;
      // Only enforce out-of-ammo when tracking is actually linked (a selected
      // ammo item, or a thrown weapon whose count we manage) — stay lenient
      // otherwise so untracked ranged weapons still fire.
      if ((ammoSelected || isThrown) && currentAmmo <= 0) {
        api.showNotification("You are out of ammo!", "red", "Out of Ammo");
        return;
      }
      const newAmmo = currentAmmo - 1;
      if (newAmmo >= 0) {
        const ammoValuesToSet = {};
        ammoValuesToSet[`${attackDataPath}.data.ammo`] = newAmmo;
        const inventory = record.data?.inventory || [];
        if (!isThrown && ammoSelected) {
          inventory.forEach((item, index) => {
            if (item._id === ammoSelected) {
              ammoValuesToSet[`data.inventory.${index}.data.count`] = newAmmo;
            }
            if (
              item.data?.ammoSelect === ammoSelected &&
              item._id !== attack._id
            ) {
              ammoValuesToSet[`data.inventory.${index}.data.ammo`] = newAmmo;
            }
          });
        } else if (isThrown) {
          inventory.forEach((item, index) => {
            if (item._id === attack._id) {
              ammoValuesToSet[`data.inventory.${index}.data.count`] = newAmmo;
            }
          });
        }
        api.setValues(ammoValuesToSet);
      }
    }

    // weaponRangeBonus modifiers extend a weapon's range (field "normal" or "long")
    let normalRangeBonus = 0;
    let longRangeBonus = 0;
    getEffectsAndModifiers(["weaponRangeBonus"], undefined, attack._id).forEach(
      (mod) => {
        const v = parseInt(mod.value, 10);
        if (isNaN(v)) return;
        if ((mod.field || "").toLowerCase() === "long") longRangeBonus += v;
        else normalRangeBonus += v;
      },
    );
    const normalRange =
      parseInt(attack?.data?.normalRange || "0", 10) + normalRangeBonus;
    const maxRange = parseInt(attack?.data?.maxRange || "0", 10) + longRangeBonus;

    // If ranged, you have Disadvantage on the roll if you are within 5 feet of an enemy who can see you and doesn’t have the Incapacitated condition
    // Get range to all other tokens
    let disDueToProximity = false;
    const ourToken = api.getToken();
    if (ranged && ourToken) {
      api.getOtherTokens().forEach((token) => {
        if (disDueToProximity) {
          // Short circuit if we already have disadvantage due to proximity
          return;
        }
        if (
          token?.faction !== "neutral" &&
          token?.faction !== ourToken?.faction
        ) {
          // Check if you have the Invisible condition
          const hasInvisible = (ourToken?.effects || []).some((eff) =>
            eff.name.toLowerCase().includes("invisible"),
          );
          // Check if they have incapacitated condition or are blinded
          const hasIncapacitated = (token?.effects || []).some(
            (eff) =>
              eff.name.toLowerCase().includes("incapacitated") ||
              eff.name.toLowerCase().includes("stunned") ||
              eff.name.toLowerCase().includes("paralyzed") ||
              eff.name.toLowerCase().includes("unconscious") ||
              eff.name.toLowerCase().includes("petrified") ||
              eff.name.toLowerCase().includes("dead") ||
              eff.name.toLowerCase().includes("blinded"),
          );
          if (!hasIncapacitated && !hasInvisible) {
            // Check distance
            const distance = api.getDistance(ourToken, token);
            if (distance !== undefined && distance !== null && distance <= 5) {
              disDueToProximity = true;
            }
          }
        }
      });
    }

    let damage = attack?.data?.damage || "1d4";
    // Apply unarmed/weapon damage overrides + Martial Arts die
    damage = applyDamageOverrides(damage, attack);

    // Check for versatile property and use 2-handed damage if 2handed is set
    if (
      attack?.data?.weaponProperties?.includes("Versatile") &&
      attack?.data?.handBtn === "two"
    ) {
      damage = attack?.data?.versatileDamage || damage;
    }

    let damageModifiers = getEffectsAndModifiers(
      ["damageBonus", "damagePenalty"],
      ranged ? "ranged" : "melee",
      attack._id,
    );

    // We also get modifiers that apply only to damage of a specific weapon type or property
    const specialDamageModifierTypes = [
      ...(attack?.data?.weaponProperties || [])
        .map((p) => p.toLowerCase())
        .filter((p) => p !== "thrown" || ranged),
      (attack?.data?.weaponType || "untyped").toLowerCase(),
    ];
    specialDamageModifierTypes.forEach((type) => {
      const specialModifiers = getEffectsAndModifiers(
        ["damageBonus", "damagePenalty"],
        type,
        attack._id,
      );
      specialModifiers.forEach((mod) => {
        // Don't add duplicate modifiers
        if (
          !damageModifiers.some(
            (m) =>
              m.name === mod.name &&
              m.value === mod.value &&
              m.modifierType === mod.modifierType,
          )
        ) {
          damageModifiers.push(mod);
        }
      });
    });

    // Get the default damage type of the attack and apply that to damage modifiers that have no type
    const damageType = getDamageType(damage);
    damageModifiers = damageModifiers.map((mod) => {
      const modType = getDamageType(mod?.value?.toString() || "");
      const type = modType === "untyped" ? mod?.type || damageType : "";
      return {
        ...mod,
        type: type,
      };
    });

    // Determine if we are making a damage roll that ignores resistances / immunities
    const damageIgnoresResistances = damageModifiers
      .filter(
        (mod) =>
          mod.valueType === "string" &&
          mod.value.trim().toLowerCase().startsWith("ignore") &&
          mod.value.trim().toLowerCase().includes("resistance"),
      )
      ?.map((mod) => mod.value.split(" ")[1])
      .join(",");
    const damageIgnoresImmunities = damageModifiers
      .filter(
        (mod) =>
          mod.valueType === "string" &&
          mod.value.trim().toLowerCase().startsWith("ignore") &&
          (mod.value.trim().toLowerCase().includes("immunities") ||
            mod.value.trim().toLowerCase().includes("immunity")),
      )
      ?.map((mod) => mod.value.split(" ")[1])
      .join(",");
    // Filter these out of the modifiers array, we don't need them to be toggleable
    damageModifiers = damageModifiers.filter(
      (m) => !m.value.toString().toLowerCase().includes("ignore"),
    );

    // Add dex or str mod to damage as required unless the damage roll has no dice (e.g. 1) and is not "Unarmed Strike"
    if (damage.includes("d") || name.toLowerCase().includes("unarmed")) {
      // The modifier is inactive by default if this was an off-hand attack, unless the modifier is a penalty
      let active = true;
      if (attack?.data?.handBtn === "off" && modToUse > 0) {
        active = false;
      }
      damageModifiers.push({
        name: dexOrStrMod,
        type: damageType,
        value: modToUse,
        active: active,
      });
    }

    // Get weapon masteries that the character has and check if this weapon is in the list
    const masteryProperties = [];
    const characterWeaponMasteries = record?.data?.weaponMasteries || [];
    const weaponType = attack?.data?.weaponType || "";
    let canUseAdditionalMasteries = false;
    if (characterWeaponMasteries.includes(weaponType)) {
      // Add the mastery property to the attack
      const masteryProperty = attack?.data?.weaponMastery || "";
      if (masteryProperty) {
        canUseAdditionalMasteries = true;
        masteryProperties.push(masteryProperty);
      }
    }
    // This modifier is used to grant additional weapon  masteries to the attack, if we're attacking
    // with a weapon that gives us one we don't already have
    if (canUseAdditionalMasteries) {
      const additionalMasteries = getEffectsAndModifiers(
        ["weaponMastery"],
        undefined,
        attack._id,
      );
      additionalMasteries.forEach((am) => {
        if (am?.value && !masteryProperties.includes(am.value)) {
          masteryProperties.push(am.value);
        }
      });
    }

    if (
      disDueToProximity &&
      getEffectsAndModifiers(["noCloseRangeDisadvantage"]).length === 0
    ) {
      modifiers.push({
        name: "Enemy is Within 5 Feet",
        value: "disadvantage",
        active: true,
      });
    }

    const targets = api.getTargets();

    let autoCritical = modifiers.some((m) => m.value === "critical");

    // Check for crit on 19 or some other number
    const critOnMatch = /critical(\d+)/;
    const critOnMods = modifiers
      .map((m) => {
        const match = m.value.toString().match(critOnMatch);
        return match ? parseInt(match[1], 10) : null;
      })
      .filter((value) => value !== null);

    let critOn = null;
    if (critOnMods.length) {
      critOn = Math.min(...critOnMods);
    }
    // Filter these out of the modifiers array, we don't need them to be toggleable
    modifiers = modifiers.filter(
      (m) => !m.value.toString().startsWith("critical"),
    );

    const minRoll = getMinRollModifier(modifiers);
    // Filter these out of the modifiers array, we don't need them to be toggleable
    modifiers = modifiers.filter(
      (m) => !m.value.toString().startsWith("minroll"),
    );

    targets.forEach((target) => {
      // Get calculated AC from modifiers - use if any
      const targetAc = getArmorClassForToken(target?.token);
      const targetName =
        target?.token?.identified === false
          ? target?.token?.record?.unidentifiedName
          : target?.token?.record?.name;
      const targetDistance = target?.distance || 0;

      // If the target is beyond normal range, and normal range is > 0, add a disadvantage modifier
      // and if it was greater than the max, make it apparent in the roll prompt
      if (ranged && targetDistance > maxRange && maxRange > 0) {
        modifiers.push({
          name: "Target is Beyond Max Range",
          value: "disadvantage",
          active: true,
        });
      } else if (
        ranged &&
        targetDistance > normalRange &&
        normalRange > 0 &&
        getEffectsAndModifiers(["noLongRangeDisadvantage"]).length === 0
      ) {
        modifiers.push({
          name: "Target is Beyond Normal Range",
          value: "disadvantage",
          active: true,
        });
      }

      // Get effects and modifiers for the target
      const targetEffects = getAttackModifiersForTarget(
        target?.token,
        targetDistance,
      );
      let hasNoAdvantage = false;
      targetEffects.forEach((r) => {
        if (r.value === "critical") {
          autoCritical = true;
        } else if (r.value === "noAdvantage") {
          // "Attacks Targeting You" = noAdvantage: attacks against this target
          // can't benefit from Advantage — strip advantage modifiers below.
          hasNoAdvantage = true;
        } else {
          modifiers.push(r);
        }
      });

      // Re-collect our own attack modifiers that need target context, so
      // predicates like target:effect:<slug> / attacker:effect:<slug> resolve
      // against the creature being attacked. Crit/minroll values are applied via
      // metadata, not shown as toggles, so they're excluded from the prompt list.
      const predicateContext = {
        attackerToken: target?.token,
        targetToken: target?.token,
        targetCreatureType: target?.token?.data?.creatureType || "",
      };
      const contextMods = getEffectsAndModifiers(
        ["attackBonus", "attackPenalty"],
        ranged ? "ranged" : "melee",
        attack._id,
        undefined,
        predicateContext,
      );
      contextMods.forEach((mod) => {
        const existing = modifiers.find(
          (m) => m.name === mod.name && m.value === mod.value,
        );
        if (existing) {
          existing.active = mod.active;
        } else if (
          !mod.value.toString().startsWith("critical") &&
          !mod.value.toString().startsWith("minroll")
        ) {
          modifiers.push(mod);
        }
      });

      // Get damage effects for the target
      const targetDamageEffects = getDamageEffectsForTarget(
        ourToken,
        target?.token,
      );
      targetDamageEffects.forEach((r) => {
        damageModifiers.push(r);
      });

      const diceRoll = "1d20";
      const metadata = {
        rollName: "Attack",
        attack: `${name}`,
        icon: icon,
        portrait: attack?.portrait,
        targetName: targetName,
        tokenId: ourToken?._id,
        targetId: target?.token?._id,
        tooltip: `Attack Roll for ${name}`,
        autoCritical: autoCritical,
        critOn: critOn,
        dc: targetAc,
        damage: damage,
        damageModifiers: damageModifiers,
        damageIgnoresResistances: damageIgnoresResistances,
        damageIgnoresImmunities: damageIgnoresImmunities,
        masteryProperties: masteryProperties,
        attackerProficiencyBonus: proficiencyBonus,
        minRoll: minRoll,
        isRanged: ranged,
        animation: attack?.data?.animation?.animationName
          ? attack?.data?.animation
          : undefined,
      };
      const rollModifiers = hasNoAdvantage
        ? modifiers.filter((m) => m.value !== "advantage")
        : modifiers;
      api.promptRoll(
        `${name} Attack`,
        diceRoll,
        rollModifiers,
        metadata,
        "attack",
      );
    });

    if (!targets.length) {
      const diceRoll = "1d20";
      const metadata = {
        rollName: "Attack",
        attack: `${name}`,
        icon: icon,
        portrait: attack?.portrait,
        tooltip: `Attack Roll for ${name}`,
        dc: 0,
        damage: damage,
        tokenId: ourToken?._id,
        damageModifiers: damageModifiers,
        masteryProperties: masteryProperties,
        attackerProficiencyBonus: proficiencyBonus,
        damageIgnoresResistances: damageIgnoresResistances,
        damageIgnoresImmunities: damageIgnoresImmunities,
        critOn: critOn,
        minRoll: minRoll,
        isRanged: ranged,
        animation: attack?.data?.animation?.animationName
          ? attack?.data?.animation
          : undefined,
      };
      api.promptRoll(`Attack ${name}`, diceRoll, modifiers, metadata, "attack");
    }
  }

  // An unarmedDamageOverride modifier replaces the unarmed strike's base damage
  // (e.g. a feature that sets it to "1d8"). Last active override wins. Runs before
  // applyMartialArtsDie so the die can still be upgraded.
  //
  // Versatile syntax "1d6/1d8 bludgeoning": the first token holds two dice
  // separated by "/". Reuses the existing two-hand toggle — the die AFTER the
  // slash is used when the attack is set to Two-Handed (handBtn "two", i.e. not
  // holding a weapon or shield), the die BEFORE it otherwise. E.g. Unarmed
  // Fighting: 1d6 + STR, becoming 1d8 with both hands free. A value with no "/"
  // is used verbatim, exactly as before.
  function applyUnarmedDamageOverride(damage, attack) {
    const overrideMods = getEffectsAndModifiers(["unarmedDamageOverride"]);
    if (overrideMods.length === 0) return damage;
    let override = (overrideMods[overrideMods.length - 1].value ?? "")
      .toString()
      .trim();
    if (!override) return damage;

    const parts = override.split(/\s+/);
    if (parts[0].includes("/")) {
      const [oneHandDie, twoHandDie] = parts[0].split("/");
      if (oneHandDie && twoHandDie) {
        const chosen =
          attack?.data?.handBtn === "two" ? twoHandDie : oneHandDie;
        const rest = parts.slice(1).join(" ");
        override = (rest ? `${chosen} ${rest}` : chosen).trim();
      }
    }
    return override || damage;
  }

  // A weaponDamageTypeOverride modifier swaps a weapon's damage type (e.g.
  // "1d8 piercing" → "1d8 radiant"). Modifiers may live on a feature/effect or on
  // the selected ammo (passed via attack._id). Last active override wins.
  function applyWeaponDamageTypeOverride(damage, attack) {
    const overrideMods = getEffectsAndModifiers(
      ["weaponDamageTypeOverride"],
      undefined,
      attack?._id,
    );
    const active = overrideMods.filter((m) => m.active !== false);
    if (active.length === 0) return damage;
    const newType = (active[active.length - 1].value ?? "")
      .toString()
      .trim()
      .toLowerCase();
    if (!newType) return damage;
    const primaryType = getDamageType(damage);
    if (primaryType === newType) return damage;
    if (!primaryType || primaryType === "untyped") return `${damage} ${newType}`;
    return damage.replace(new RegExp(primaryType, "gi"), newType);
  }

  // Applies the damage-string overrides in order: weapon damage-type override
  // (any weapon), then — for unarmed strikes only — unarmed damage override and
  // the Martial Arts die.
  function applyDamageOverrides(damage, attack) {
    damage = applyWeaponDamageTypeOverride(damage, attack);
    if ((attack?.data?.weaponType || "").toLowerCase() === "unarmed") {
      damage = applyUnarmedDamageOverride(damage, attack);
      damage = applyMartialArtsDie(damage);
    }
    return damage;
  }

  // Upgrades a weapon/unarmed damage string to the character's Martial Arts die
  // when a martialArtsDie modifier is present. The modifier's `field` holds the
  // level:die thresholds (e.g. "1:1d6,5:1d8,11:1d10,17:1d12"); the die scales by
  // the level of the class that granted the modifier (via the feature's source).
  function applyMartialArtsDie(damage) {
    const martialArtsMods = getEffectsAndModifiers(["martialArtsDie"]);
    if (martialArtsMods.length === 0) return damage;
    const martialModName = martialArtsMods[0].name || "";
    const martialFeature = (record?.data?.features || []).find(
      (f) =>
        f.name === martialModName &&
        (f.data?.modifiers || []).some(
          (m) => m.data?.type === "martialArtsDie",
        ),
    );
    const martialSource = martialFeature?.data?.source || "";
    let classLevel = parseInt(record?.data?.level || "1", 10);
    if (martialSource) {
      const classLevels = record?.data?.classLevels || "";
      const safeSource = martialSource.replace(/[-\/\\^$*+?.()|[\]{}]/g, "\\$&");
      const classLevelMatch = classLevels.match(
        new RegExp(`${safeSource}\\s+(\\d+)`, "i"),
      );
      if (classLevelMatch) classLevel = parseInt(classLevelMatch[1], 10);
    }
    const thresholds = (martialArtsMods[0].field || "")
      .split(",")
      .map((entry) => {
        const [lvl, die] = entry.split(":");
        return { level: parseInt(lvl, 10), die: (die || "").trim() };
      })
      .filter((t) => !isNaN(t.level) && t.die);
    let martialDie = null;
    thresholds.forEach((t) => {
      if (classLevel >= t.level) martialDie = t.die;
    });
    if (!martialDie) return damage;
    const dieOrder = { d4: 4, d6: 6, d8: 8, d10: 10, d12: 12 };
    const currentDieMatch = damage.match(/(\d+)(d\d+)/);
    if (currentDieMatch) {
      const martialDieType = (martialDie.match(/d\d+/) || [martialDie])[0];
      if (
        (dieOrder[martialDieType] || 0) > (dieOrder[currentDieMatch[2]] || 0)
      ) {
        damage = damage.replace(
          currentDieMatch[0],
          `${currentDieMatch[1]}${martialDieType}`,
        );
      }
    } else {
      // No dice in damage (e.g. "1 bludgeoning") — use the martial arts die
      const martialDieType = (martialDie.match(/d\d+/) || [martialDie])[0];
      damage = damage.replace(/^\d+/, `1${martialDieType}`);
    }
    return damage;
  }

  function rollDamage(isCritical) {
    const attackDataPath = isCritical
      ? dataPath.replace(".data.critBtn", "")
      : dataPath.replace(".data.damageBtn", "");
    const attack = api.getValue(attackDataPath);

    let name = attack?.name || "New Item";
    if (attack?.identified === false) {
      name = attack?.unidentifiedName || "Unidentified Item";
    }

    const dexMod = parseInt(record?.data?.dexterityMod || "0", 10);
    const strMod = parseInt(record?.data?.strengthMod || "0", 10);

    let dexOrStr = "Strength";
    let modToUse = strMod;

    let ranged = false;

    // Always ranged attack for ranged weapons
    if (attack?.data?.type?.includes("ranged")) {
      ranged = true;
    }
    // If this is a thrown weapon, check the rangeToggleBtn
    if (attack?.data?.weaponProperties?.includes("Thrown")) {
      ranged = attack?.data?.rangeToggleBtn === "ranged";
    }

    // Ranged is always dexterity
    dexOrStrMod = attack?.data?.type?.includes("ranged")
      ? "Dexterity"
      : "Strength";
    // If not ranged, check if it has Finesse property and default to dexterity unless strength is higher
    if (attack?.data?.weaponProperties?.includes("Finesse")) {
      dexOrStrMod = strMod > dexMod ? "Strength" : "Dexterity";
    }
    // weaponFinesse modifier: grants Finesse-like STR/DEX choice to weapons whose
    // type matches the modifier's field (e.g. "Unarmed", "Simple weapons and
    // Martial weapons that have the Light property").
    const weaponFinesseMods = getEffectsAndModifiers(["weaponFinesse"]);
    if (
      weaponFinesseMods.some((m) => matchesWeaponFinesseField(m.field, attack))
    ) {
      dexOrStrMod = strMod > dexMod ? "Strength" : "Dexterity";
    }
    if (dexOrStrMod === "Dexterity") {
      modToUse = dexMod;
    }
    // Check for attack calculation modifier
    const attackCalculationMod = getEffectsAndModifiers(
      ["attackCalculation"],
      undefined,
      attack._id,
    );
    // If we have an attack calculation modifier, use the field defined instead
    // of the above
    if (attackCalculationMod.length) {
      const attackCalculation =
        attackCalculationMod[attackCalculationMod.length - 1]?.field;
      if (attackCalculation) {
        dexOrStrMod = capitalize(attackCalculation);
        modToUse = parseInt(
          record?.data?.[`${attackCalculation.toLowerCase()}Mod`] || "0",
          10,
        );
      }
    }

    let damage = attack?.data?.damage || "1d4";
    // Apply unarmed/weapon damage overrides + Martial Arts die
    damage = applyDamageOverrides(damage, attack);

    // Check for versatile property and use 2-handed damage if 2handed is set
    if (
      attack?.data?.weaponProperties?.includes("Versatile") &&
      attack?.data?.handBtn === "two"
    ) {
      damage = attack?.data?.versatileDamage || damage;
    }

    if (isCritical) {
      damage = doubleDamageDice(damage);
    }

    let damageModifiers = getEffectsAndModifiers(
      ["damageBonus", "damagePenalty"],
      ranged ? "ranged" : "melee",
      attack._id,
    );

    // We also get modifiers that apply only to damage of a specific weapon type or property
    const specialDamageModifierTypes = [
      ...(attack?.data?.weaponProperties || [])
        .map((p) => p.toLowerCase())
        .filter((p) => p !== "thrown" || ranged),
      (attack?.data?.weaponType || "untyped").toLowerCase(),
    ];
    specialDamageModifierTypes.forEach((type) => {
      const specialModifiers = getEffectsAndModifiers(
        ["damageBonus", "damagePenalty"],
        type,
        attack._id,
      );
      specialModifiers.forEach((mod) => {
        // Don't add duplicate modifiers
        if (
          !damageModifiers.some(
            (m) =>
              m.name === mod.name &&
              m.value === mod.value &&
              m.modifierType === mod.modifierType,
          )
        ) {
          damageModifiers.push(mod);
        }
      });
    });

    // Get damage effects for the target
    const targets = api.getTargets();
    const ourToken = api.getToken();
    targets.forEach((target) => {
      // Get damage effects for the target
      const targetDamageEffects = getDamageEffectsForTarget(
        ourToken,
        target?.token,
      );
      targetDamageEffects.forEach((r) => {
        damageModifiers.push(r);
      });
    });

    // Get the default damage type of the attack and apply that to damage modifiers that have no type
    const damageType = getDamageType(damage);
    damageModifiers = damageModifiers.map((mod) => {
      const modType = getDamageType(mod?.value?.toString() || "");
      const type = modType === "untyped" ? mod?.type || damageType : "";
      return {
        ...mod,
        // If this is a critical hit, double the dice
        value: isCritical ? doubleDamageDice(mod.value) : mod.value,
        type: type,
      };
    });

    // Determine if we are making a damage roll that ignores resistances / immunities
    const damageIgnoresResistances = damageModifiers
      .filter(
        (mod) =>
          mod.valueType === "string" &&
          mod.value.trim().toLowerCase().startsWith("ignore") &&
          mod.value.trim().toLowerCase().includes("resistance"),
      )
      ?.map((mod) => mod.value.split(" ")[1])
      .join(",");
    const damageIgnoresImmunities = damageModifiers
      .filter(
        (mod) =>
          mod.valueType === "string" &&
          mod.value.trim().toLowerCase().startsWith("ignore") &&
          (mod.value.trim().toLowerCase().includes("immunities") ||
            mod.value.trim().toLowerCase().includes("immunity")),
      )
      ?.map((mod) => mod.value.split(" ")[1])
      .join(",");
    // Filter these out of the modifiers array, we don't need them to be toggleable
    damageModifiers = damageModifiers.filter(
      (m) => !m.value.toString().toLowerCase().includes("ignore"),
    );

    // Reliable-style minimum damage die: a damage modifier whose value is
    // "minrollN" makes every damage die count as at least N (e.g. Great Weapon
    // Fighting / similar features). Extract it, then drop the marker so it isn't
    // shown/applied as a flat togglable bonus.
    const minDamageRoll = getMinRollModifier(damageModifiers);
    damageModifiers = damageModifiers.filter(
      (m) => !m.value.toString().startsWith("minroll"),
    );

    const damageMetadata = {
      // This is so that our damage handler script can tell if it was from a critical hit
      // And is set if the Attack Roll was a critical hit, but not in the case of using the Damage Button
      critical: isCritical,
      // Header info for the damage chat message
      attack: name,
      icon: ranged ? "IconBow" : "IconSword",
      portrait: attack?.portrait,
      damageIgnoresResistances: damageIgnoresResistances,
      damageIgnoresImmunities: damageIgnoresImmunities,
      minDamageRoll: minDamageRoll,
    };

    // Add dex or str mod to damage as required unless the damage roll has no dice (e.g. 1) and is not "Unarmed Strike"
    if (damage.includes("d") || name.toLowerCase().includes("unarmed")) {
      // The modifier is inactive by default if this was an off-hand attack, unless the modifier is a penalty
      let active = true;
      if (attack?.data?.handBtn === "off" && modToUse > 0) {
        active = false;
      }
      damageModifiers.push({
        name: dexOrStrMod,
        type: damageType,
        value: modToUse,
        active: active,
      });
    }

    api.promptRoll(
      `${name} Damage`,
      damage,
      damageModifiers,
      damageMetadata,
      "damage",
    );
  }
</script>

<div style="display: flex; flex-direction: column">
  <!-- Main row for icon, name, buttons -->
  <div
    style="display: flex; flex-direction: row; gap: 4px; align-items: center"
  >
    <div style="width: 30px; height: 30px; min-width: 30px; min-height: 30px">
      <portrait width="30px" height="30px" field="portrait"></portrait>
    </div>
    <div style="width: 100%">
      <namefield
        field="namefield"
        variant="standard"
        placeholder="Item Name..."
      ></namefield>
    </div>
    <!--  A way to change to thrown if Throw type is there -->
    <iconbutton
      size="md"
      hidden="true"
      field="meleeToggleBtnDisabled"
      variant="default"
      options='[{"icon": "IconSword", "label": "Melee", "value": "melee"}]'
    >
    </iconbutton>
    <iconbutton
      size="md"
      hidden="true"
      field="rangeToggleBtnDisabled"
      variant="default"
      options='[{"icon": "IconBow", "label": "Ranged", "value": "ranged"}]'
    >
    </iconbutton>
    <iconbutton
      size="md"
      hidden="true"
      field="rangeToggleBtn"
      variant="default"
      options='[{"icon": "IconSword", "label": "Melee", "value": "melee"}, {"icon": "IconBow", "label": "Ranged", "value": "ranged"}]'
    >
    </iconbutton>
    <!-- Select Hand, hidden for two-handed weapons -->
    <iconbutton
      size="md"
      field="handBtn"
      variant="default"
      options='[{"icon": "IconCircleNumber1Filled", "label": "Main Hand", "value": "one"}, {"icon": "IconCircleNumber2Filled", "label": "Two-Handed", "value": "two"}, {"icon": "IconCircleLetterOFilled", "label": "Off Hand", "value": "off"}]'
    >
    </iconbutton>
    <!-- Roll Attack -->
    <iconbutton
      size="md"
      field="rollBtn"
      variant="outline"
      options='[{"icon": "D20", "label": "Roll Attack", "value": "roll"}]'
      onchange="() => {}"
      onclick="handleRoll()"
    >
    </iconbutton>
    <div>
      <!-- Roll Damage -->
      <button
        size="xxs"
        field="damageBtn"
        label="Damage"
        onclick="rollDamage(false)"
      ></button>
    </div>
    <!-- Roll Crit -->
    <div>
      <button
        size="xxs"
        field="critBtn"
        label="Critical"
        color="red"
        onclick="rollDamage(true)"
      ></button>
    </div>
  </div>
  <!-- Ammo row (own line, hidden by default; shown for ranged/thrown weapons) -->
  <box field="ammoRow" hidden="true">
    <div
      style="
        display: flex;
        flex-direction: row;
        gap: 4px;
        align-items: center;
        justify-content: flex-end;
      "
    >
      <label size="xs" variant="bold" label="Ammo"></label>
      <!-- Ammo Select dropdown for Ranged Weapons (not Thrown) -->
      <dropdown
        field="ammoSelect"
        width="120px"
        size="xs"
        hidden="true"
        placeholder="Select Ammo..."
        optionsFunction="return ammoOptions();"
        onchange="onAmmoSelectChange(value)"
      ></dropdown>
      <!-- Ammo Field for Ranged/Thrown Weapons -->
      <numberfield
        field="ammo"
        placeholder="0"
        minvalue="0"
        width="70px"
        variant="tooltip"
        label="Ammo Remaining"
        size="xs"
        onchange="onAmmoChange()"
      >
      </numberfield>
    </div>
  </box>
</div>
