<script>
  function onTypeChange(npcType) {
    const fieldsToHide = [];
    const fieldsToShow = [];
    if (npcType === "vehicle") {
      // Hide creature fields
      fieldsToHide.push("tempHp");
      fieldsToHide.push("creatureType");
      fieldsToHide.push("alignment");
      fieldsToHide.push("hitDice");
      fieldsToHide.push("senses");
      fieldsToHide.push("skills");
      fieldsToHide.push("skillsLabel");
      fieldsToHide.push("languages");
      // Show vehicle fields
      fieldsToShow.push("weight");
      fieldsToShow.push("crew");
      fieldsToShow.push("passengers");
      fieldsToShow.push("cargo");
      fieldsToShow.push("damageThreshold");
      fieldsToShow.push("cost");
      // Hide trap fields
      fieldsToHide.push("trapType");
    } else if (npcType === "trap") {
      // Hide creature fields
      fieldsToHide.push("tempHp");
      fieldsToHide.push("creatureType");
      fieldsToHide.push("alignment");
      fieldsToHide.push("hitDice");
      fieldsToHide.push("senses");
      fieldsToHide.push("skills");
      fieldsToHide.push("skillsLabel");
      fieldsToHide.push("languages");
      // Hide vehicle fields
      fieldsToHide.push("weight");
      fieldsToHide.push("crew");
      fieldsToHide.push("passengers");
      fieldsToHide.push("cargo");
      fieldsToHide.push("damageThreshold");
      // Show trap fields
      fieldsToShow.push("trapType");
      fieldsToShow.push("cost");
    } else {
      // Show creature fields
      fieldsToShow.push("tempHp");
      fieldsToShow.push("creatureType");
      fieldsToShow.push("alignment");
      fieldsToShow.push("hitDice");
      fieldsToShow.push("senses");
      fieldsToShow.push("skills");
      fieldsToShow.push("skillsLabel");
      fieldsToShow.push("languages");
      // Hide vehicle fields
      fieldsToHide.push("weight");
      fieldsToHide.push("crew");
      fieldsToHide.push("passengers");
      fieldsToHide.push("cargo");
      fieldsToHide.push("damageThreshold");
      fieldsToHide.push("cost");
      // Hide trap fields
      fieldsToHide.push("trapType");
    }
    api.setHidden(fieldsToHide, true, () => {
      // Do this in callback to avoid race condition
      api.setHidden(fieldsToShow, false);
    });
  }

  function updateCR(value) {
    // Update the level based on the challenge rating
    let level = 0;
    if (value.trim() === "1/8") {
      level = 1;
    } else if (value.trim() === "1/4") {
      level = 1;
    } else if (value.trim() === "1/2") {
      level = 1;
    } else {
      level = parseInt(value.trim(), 10);
    }

    const valuesToSet = {
      "data.level": level,
    };

    // Get PB for the level
    const pb = getProficiencyBonus(level);
    valuesToSet["data.proficiencyBonus"] = pb;

    // Get XP for the Challenge Rating
    const xp = getXPForCR(value.trim());
    valuesToSet["data.xp"] = xp;

    api.setValues(valuesToSet);
  }

  function setModifier(value, ability) {
    // Set the modifier and save modifier	(if not already set)
    const modifier = Math.floor((value - 10) / 2);
    const saveModifierDataPath = `data.${ability}Save`;
    const valuesToSet = {
      [`data.${ability}Mod`]: modifier,
    };
    valuesToSet[saveModifierDataPath] = modifier;
    api.setValues(valuesToSet);
  }

  function rollInitiative() {
    // Roll initiative for the npc
    const roll = "1d20";

    // Get modifiers for initiative, which is a dexterity check
    const modifiers = [];

    // Add initiative modifier, which is what NPCs use
    const initiativeMod = parseInt(record.data?.initiativeMod || "0", 10);
    modifiers.push({
      name: "Initiative Modifier",
      value: initiativeMod,
      active: true,
    });

    // Check effects for all initiative bonuses and penalties
    const initiativeModifiers = getEffectsAndModifiers([
      "initiativeBonus",
      "initiativePenalty",
    ]);
    initiativeModifiers.forEach((modifier) => {
      modifiers.push(modifier);
    });

    const dexterityCheckModifiers = getEffectsAndModifiers(
      ["abilityBonus", "abilityPenalty"],
      "dexterity"
    );
    dexterityCheckModifiers.forEach((modifier) => {
      modifiers.push(modifier);
    });

    api.promptRoll(
      "Initiative",
      roll,
      modifiers,
      {
        rollName: "Initiative",
        tooltip: "Initiative Roll",
        dc: 0,
      },
      "initiative"
    );
  }

  function rollCheck(ability) {
    const mod = `${ability}Mod`;

    const modifiers = [];
    let abilityMod = parseInt(record?.data?.[mod] || "0", 10);
    if (abilityMod === undefined || isNaN(abilityMod)) {
      abilityMod = 0;
    }
    if (abilityMod !== 0) {
      modifiers.push({
        name: ability,
        value: abilityMod,
        active: true,
      });
    }
    const metadata = {
      rollName: `${capitalize(ability)}`,
    };

    const checkModifiers = getEffectsAndModifiers(
      ["abilityBonus", "abilityPenalty"],
      ability
    );
    checkModifiers.forEach((modifier) => {
      modifiers.push(modifier);
    });

    api.promptRoll(
      `${capitalize(ability)} Check`,
      "1d20",
      modifiers,
      metadata,
      "ability"
    );
  }

  function rollSave(save) {
    const mod = `${save}Save`;
    const modifiers = [];
    let saveMod = record?.data?.[mod] || "0";
    if (saveMod === undefined) {
      saveMod = 0;
    }

    if (saveMod !== "0") {
      modifiers.push({
        name: `${capitalize(save)} Save Modifier`,
        value: saveMod,
        active: true,
      });
    }

    // Check effects for all save bonuses and penalties for saves
    const saveModifiers = getEffectsAndModifiers(
      ["saveBonus", "savePenalty"],
      save
    );
    saveModifiers.forEach((modifier) => {
      modifiers.push(modifier);
    });

    const metadata = {
      rollName: `${capitalize(save)} Save`,
      tooltip: `${capitalize(save)} Saving Throw`,
      dc: 0,
    };

    api.promptRoll(
      `${capitalize(save)} Save`,
      "1d20",
      modifiers,
      metadata,
      "save"
    );
  }

  function onHasTraitsChange() {
    // Toggle the visibility of the traits accordion
    api.setHidden(["featuresDivider", "features"], !record.data.hasTraits);
  }

  function onHasActionsChange() {
    // Toggle the visibility of the actions accordion
    api.setHidden(["actionsDivider", "actions"], !record.data.hasActions);
  }

  function onHasBonusActionsChange() {
    // Toggle the visibility of the bonus actions accordion
    api.setHidden(
      ["bonusActionsDivider", "bonusActions"],
      !record.data.hasBonusActions
    );
  }

  function onHasReactionsChange() {
    // Toggle the visibility of the reactions accordion
    // And set maxReactions 1 if it is undefined
    const valuesToSet = {};
    if (
      record?.data?.maxReactions === undefined &&
      record?.data?.hasReactions
    ) {
      valuesToSet["data.maxReactions"] = 1;
    }
    if (
      record?.data?.usedReactions === undefined &&
      record?.data?.hasReactions
    ) {
      valuesToSet["data.usedReactions"] = 0;
    }
    valuesToSet["fields.reactions.hidden"] = !record.data.hasReactions;
    valuesToSet["fields.reactionsDivider.hidden"] = !record.data.hasReactions;
    valuesToSet["fields.reactionsLabel.hidden"] = !record.data.hasReactions;
    valuesToSet["fields.usedReactions.hidden"] = !record.data.hasReactions;
    api.setValues(valuesToSet);
  }

  function onHasLairActionsChange() {
    // Toggle the visibility of the lair actions accordion
    api.setHidden(
      ["lairActionsDivider", "lairActions"],
      !record.data.hasLairActions
    );
  }
</script>

        placeholder="Speed..."
      >
      </stringfield>
      <stringfield
        width="100%"
        multiline="true"
        maxrows="2"
        size="xs"
        field="senses"
        label="Senses"
        placeholder="Senses..."
      ></stringfield>
      <!-- Vehicle fields -->
      <stringfield
        hidden="true"
        size="xs"
        width="100%"
        field="crew"
        label="Crew"
        placeholder="Crew..."
      >
      </stringfield>
    </div>

    <div
      style="
        display: flex;
        flex-direction: row;
        gap: 4px;
        align-items: flex-end;
      "
    >
      <stringfield
        width="100%"
        size="xs"
        multiline="true"
        maxrows="2"
        field="languages"
        label="Languages"
        placeholder="Enter Languages..."
      >
      </stringfield>
      <!-- Vehicle fields -->
      <stringfield
        hidden="true"
        size="xs"
        width="100%"
        field="passengers"
        label="Passengers"
        placeholder="Passengers..."
      >
      </stringfield>
      <stringfield
        hidden="true"
        size="xs"
        width="100%"
        field="cargo"
        label="Cargo"
        placeholder="Cargo..."
      >
      </stringfield>
    </div>

    <div
      style="
        display: flex;
        flex-direction: row;
        gap: 4px;
        align-items: flex-end;
      "
    >
      <stringfield
        width="100%"
        size="xs"
        field="challengeRating"
        label="CR"
        placeholder="Enter Challenge Rating..."
        onchange="updateCR(value);"
      >
      </stringfield>
      <stringfield
        width="100%"
        size="xs"
        field="xp"
        label="XP"
        placeholder="Enter XP..."
      >
      </stringfield>
      <numberfield
        showsign="true"
        width="100%"
        size="xs"
        field="proficiencyBonus"
        label="PB"
        placeholder="+2"
      >
      </numberfield>
      <!-- Hidden field to store level for spell casting -->
      <numberfield
        size="xs"
        field="level"
        label="Level"
        placeholder="0"
        hidden="true"
      ></numberfield>
    </div>

    <div
      style="
        width: 100%;
        margin-top: 4px;
        margin-bottom: 4px;
        display: flex;
        flex-direction: row;
        gap: 4px;
      "
    >
      <stringfield
        width="33%"
        size="xs"
        multiline="true"
        maxrows="2"
        field="vulnerabilities"
        label="Vulnerabilities"
        placeholder="None"
      >
      </stringfield>
      <stringfield
        width="33%"
        size="xs"
        multiline="true"
        maxrows="2"
        field="resistances"
        label="Resistances"
        placeholder="None"
      >
      </stringfield>
      <stringfield
        width="33%"
        size="xs"
        multiline="true"
        maxrows="2"
        field="immunities"
        label="Immunities"
        placeholder="None"
      >
      </stringfield>
    </div>

    <divider
      hideonlocked="true"
      color="pink"
      label="Subsection Settings"
      field="settingsDivider"
      textalign="center"
    >
    </divider>

    <div style="display: flex; flex-direction: row; gap: 18px; flex-wrap: wrap">
      <checkbox
        hideonlocked="true"
        field="hasTraits"
        label="Has Traits"
        size="sm"
        onchange="onHasTraitsChange()"
      >
      </checkbox>

      <checkbox
        hideonlocked="true"
        field="hasActions"
        label="Has Actions"
        size="sm"
        onchange="onHasActionsChange()"
      >
      </checkbox>

      <checkbox
        hideonlocked="true"
        field="hasBonusActions"
        label="Has Bonus Actions"
        size="sm"
        onchange="onHasBonusActionsChange()"
      >
      </checkbox>

      <checkbox
        hideonlocked="true"
        field="hasReactions"
        label="Has Reactions"
        size="sm"
        onchange="onHasReactionsChange()"
      ></checkbox>

      <checkbox
        hideonlocked="true"
        field="hasLairActions"
        label="Has Lair Actions"
        size="sm"
        onchange="onHasLairActionsChange()"
      >
      </checkbox>
    </div>

    <divider
      hidden="true"
      color="pink"
      label="Traits"
      field="featuresDivider"
      textalign="center"
    ></divider>

    <div style="width: 100%">
      <list hidden="true" listtype="npc_traits_list" field="features"></list>
    </div>

    <divider
      hidden="true"
      color="pink"
      label="Actions"
      field="actionsDivider"
      textalign="center"
    ></divider>

    <!-- We'll list spell slots here, if they have them -->
    <div style="margin-top: 8px">
      <label
        hidden="true"
        variant="bold"
        field="spellSlotsLabel"
        label="Spell Slots"
        size="sm"
        textalign="center"
      ></label>
    </div>
    <div
      style="
        display: flex;
        flex-direction: row;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 4px;
        justify-content: center;
      "
    >
      <counter
        field="spellSlots1"
        hidden="true"
        maxvaluefield="numSpellSlots1"
        label="Level 1"
        size="xs"
        textalign="center"
        color="violet"
      ></counter>
      <counter
        field="spellSlots2"
        hidden="true"
        maxvaluefield="numSpellSlots2"
        label="Level 2"
        size="xs"
        textalign="center"
        color="blue"
      ></counter>
      <counter
        field="spellSlots3"
        hidden="true"
        maxvaluefield="numSpellSlots3"
        label="Level 3"
        size="xs"
        textalign="center"
        color="cyan"
      ></counter>
      <counter
        field="spellSlots4"
        hidden="true"
        maxvaluefield="numSpellSlots4"
        label="Level 4"
        size="xs"
        textalign="center"
        color="teal"
      ></counter>
      <counter
        field="spellSlots5"
        hidden="true"
        maxvaluefield="numSpellSlots5"
        label="Level 5"
        size="xs"
        textalign="center"
        color="green"
      ></counter>
      <counter
        field="spellSlots6"
        hidden="true"
        maxvaluefield="numSpellSlots6"
        label="Level 6"
        size="xs"
        textalign="center"
        color="lime"
      ></counter>
      <counter
        field="spellSlots7"
        hidden="true"
        maxvaluefield="numSpellSlots7"
        label="Level 7"
        size="xs"
        textalign="center"
        color="yellow"
      ></counter>
      <counter
        field="spellSlots8"
        hidden="true"
        maxvaluefield="numSpellSlots8"
        label="Level 8"
        size="xs"
        textalign="center"
        color="orange"
      ></counter>
      <counter
        field="spellSlots9"
        hidden="true"
        maxvaluefield="numSpellSlots9"
        label="Level 9"
        size="xs"
        textalign="center"
        color="red"
      ></counter>
    </div>

    <div style="width: 100%">
      <list hidden="true" listtype="npc_actions_list" field="actions"></list>
    </div>

    <!-- Bonus Actions -->
    <divider
      hidden="true"
      color="pink"
      label="Bonus Actions"
      field="bonusActionsDivider"
      textalign="center"
    ></divider>

    <div style="width: 100%">
      <list
        hidden="true"
        listtype="npc_actions_list"
        field="bonusActions"
      ></list>
    </div>

    <!-- Reactions -->
    <divider
      hidden="true"
      color="pink"
      label="Reactions"
      field="reactionsDivider"
      textalign="center"
    ></divider>

    <div style="margin-top: 8px">
      <label
        hidden="true"
        variant="bold"
        field="reactionsLabel"
        label="Reactions"
        size="sm"
        textalign="center"
      ></label>
    </div>
    <div
      style="
        display: flex;
        flex-direction: row;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 4px;
        justify-content: center;
      "
    >
      <counter
        hidden="true"
        field="usedReactions"
        size="xs"
        maxvaluefield="maxReactions"

      ></counter>
    </div>

    <div style="width: 100%">
      <list hidden="true" listtype="npc_actions_list" field="reactions"></list>

    <!-- Lair Actions -->
    <divider

    <div style="width: 100%">
      <list
        hidden="true"

      ></list>
    </div>
  </div>
